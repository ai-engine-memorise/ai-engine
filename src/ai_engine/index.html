<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AI Engine Search Demo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Leaflet CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNH6tF8Vt3yZkT2LXVhZ8M5Z1iP6A="
    crossorigin=""
  />

  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      padding: 0;
      background: #f5f5f5;
      color: #222;
    }

    header {
      padding: 1rem 1.5rem;
      background: #111827;
      color: #f9fafb;
    }

    header h1 {
      margin: 0;
      font-size: 1.3rem;
    }

    main {
      padding: 1rem 1.5rem 2rem;
      max-width: 1100px;
      margin: 0 auto;
    }

    .card {
      background: white;
      border-radius: 0.5rem;
      padding: 1rem 1.25rem;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      margin-bottom: 1rem;
    }

    .controls {
      display: grid;
      grid-template-columns: minmax(0, 2fr) minmax(0, 3fr);
      gap: 1rem;
      margin-bottom: 1rem;
    }

    .field {
      margin-bottom: 0.75rem;
    }

    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 0.25rem;
    }

    input[type="text"],
    input[type="number"] {
      width: 100%;
      padding: 0.4rem 0.5rem;
      border-radius: 0.375rem;
      border: 1px solid #d1d5db;
      font-size: 0.9rem;
    }

    .btn-row {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-top: 0.5rem;
    }

    button {
      border: none;
      border-radius: 9999px;
      padding: 0.4rem 0.9rem;
      font-size: 0.9rem;
      cursor: pointer;
      background: #111827;
      color: #f9fafb;
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
    }

    button.secondary {
      background: #6b7280;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    #map {
      height: 380px;
      border-radius: 0.5rem;
      overflow: hidden;
      border: 1px solid #d1d5db;
    }

    .radius-label {
      font-size: 0.85rem;
      color: #4b5563;
    }

    input[type="range"] {
      width: 100%;
    }

    #results {
      margin-top: 1rem;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 0.75rem;
    }

    .item-detail-overlay {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.75);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      z-index: 1000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 150ms ease-out;
    }

    .item-detail-overlay.open {
      opacity: 1;
      pointer-events: auto;
    }

    .item-detail-card {
      background: white;
      width: min(640px, 100%);
      max-height: 90vh;
      overflow-y: auto;
      border-radius: 0.75rem;
      box-shadow: 0 25px 60px rgba(15, 23, 42, 0.35);
      position: relative;
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .detail-close {
      position: absolute;
      top: 0.6rem;
      right: 0.75rem;
      border: none;
      background: transparent;
      font-size: 1.5rem;
      cursor: pointer;
      color: #4b5563;
    }

    .detail-image {
      width: 100%;
      border-radius: 0.5rem;
      object-fit: cover;
      background: #e5e7eb;
      max-height: 320px;
    }

    .detail-title {
      margin: 0;
      font-size: 1.3rem;
    }

    .detail-meta {
      display: grid;
      grid-template-columns: max-content 1fr;
      gap: 0.35rem 0.75rem;
      font-size: 0.9rem;
      color: #4b5563;
    }

    .detail-meta dt {
      font-weight: 600;
    }

    .detail-link {
      align-self: flex-start;
      border-radius: 999px;
      padding: 0.4rem 0.9rem;
      background: #111827;
      color: #f9fafb;
      text-decoration: none;
      font-size: 0.9rem;
    }

    .item-card {
      background: white;
      border-radius: 0.5rem;
      border: 1px solid #e5e7eb;
      padding: 0.6rem 0.75rem;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .item-header {
      display: flex;
      gap: 0.5rem;
    }

    .item-image {
      width: 70px;
      height: 70px;
      border-radius: 0.375rem;
      object-fit: cover;
      background: #e5e7eb;
      flex-shrink: 0;
    }

    .item-title {
      font-size: 0.95rem;
      font-weight: 600;
      margin: 0;
    }

    .item-text {
      font-size: 0.85rem;
      color: #4b5563;
      margin: 0.25rem 0 0;
    }

    .item-footer {
      margin-top: 0.3rem;
    }

    .item-link {
      font-size: 0.8rem;
      color: #2563eb;
      text-decoration: none;
    }

    .item-link:hover {
      text-decoration: underline;
    }

    .status {
      font-size: 0.8rem;
      color: #6b7280;
      margin-top: 0.5rem;
    }

    @media (max-width: 800px) {
      .controls {
        grid-template-columns: minmax(0, 1fr);
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>AI Engine Search Demo</h1>
  </header>

  <main>
    <div class="card">
      <div class="controls">
        <!-- Left column: text search -->
        <div>
          <div class="field">
            <label for="searchQuery">Search text</label>
            <input
              type="text"
              id="searchQuery"
              placeholder="e.g. Bergen-Belsen"
            />
          </div>
          <div class="btn-row">
            <button id="btnTextSearch">Text search</button>
          </div>
        </div>

        <!-- Right column: map + radius -->
        <div>
          <div class="field">
            <label>Location & radius (for /api/search/geo)</label>
            <div id="map"></div>
          </div>
          <div class="field">
            <label for="radiusInput">Radius (meters)</label>
            <input
              type="range"
              id="radiusInput"
              min="500"
              max="20000"
              step="500"
              value="5000"
            />
            <div class="radius-label">
              Current radius:
              <span id="radiusValue">5000</span> m
            </div>
          </div>
          <div class="btn-row">
            <button id="btnGeoSearch">Geo search</button>
            <button class="secondary" id="btnClearLocation" type="button">
              Clear location
            </button>
          </div>
          <div class="status" id="locationStatus">
            Click on the map to select a location.
          </div>
        </div>
      </div>

      <div class="status" id="statusMessage"></div>
    </div>

    <div id="results"></div>
    <div
      class="item-detail-overlay"
      id="itemDetailOverlay"
      aria-hidden="true"
    >
      <div class="item-detail-card" role="dialog" aria-modal="true">
        <button class="detail-close" id="detailCloseBtn" aria-label="Close detail view">&times;</button>
        <img id="detailImage" class="detail-image" alt="">
        <h2 id="detailTitle" class="detail-title"></h2>
        <p id="detailCreator" class="detail-creator"></p>
        <p id="detailText" class="detail-text"></p>
        <dl id="detailMeta" class="detail-meta"></dl>
        <a id="detailLink" class="detail-link" href="#" target="_blank" rel="noopener noreferrer">Open record</a>
      </div>
    </div>
  </main>

  <!-- Leaflet JS -->
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>

  <script>
    // If your FastAPI runs on same origin, this stays empty.
    // If it's on another host/port, set API_BASE = "http://localhost:8000" etc.
    const API_BASE = "http://localhost:8000";

    const ACTIVE_USER_ID = 11;

    const searchInput = document.getElementById("searchQuery");
    const btnTextSearch = document.getElementById("btnTextSearch");
    const btnGeoSearch = document.getElementById("btnGeoSearch");
    const btnClearLocation = document.getElementById("btnClearLocation");
    const radiusInput = document.getElementById("radiusInput");
    const radiusValue = document.getElementById("radiusValue");
    const statusMessage = document.getElementById("statusMessage");
    const locationStatus = document.getElementById("locationStatus");
    const resultsContainer = document.getElementById("results");
    const detailOverlay = document.getElementById("itemDetailOverlay");
    const detailCloseBtn = document.getElementById("detailCloseBtn");
    const detailImage = document.getElementById("detailImage");
    const detailTitleEl = document.getElementById("detailTitle");
    const detailCreatorEl = document.getElementById("detailCreator");
    const detailTextEl = document.getElementById("detailText");
    const detailMetaEl = document.getElementById("detailMeta");
    const detailLinkEl = document.getElementById("detailLink");

    let selectedLatLon = null;
    let marker = null;
    let circle = null;
    let activeInteraction = null;

    // Initialize map (center on your example coords)
    const map = L.map("map").setView([52.7579, 9.9048], 12);

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 18,
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a>'
    }).addTo(map);

    function updateLocationDisplay() {
      if (!selectedLatLon) {
        locationStatus.textContent = "Click on the map to select a location.";
      } else {
        const { lat, lon } = selectedLatLon;
        locationStatus.textContent = `Selected location: ${lat.toFixed(5)}, ${lon.toFixed(5)}`;
      }
    }

    function updateRadiusCircle() {
      if (!selectedLatLon) return;
      const radius = Number(radiusInput.value);

      if (!circle) {
        circle = L.circle([selectedLatLon.lat, selectedLatLon.lon], {
          radius
        }).addTo(map);
      } else {
        circle.setLatLng([selectedLatLon.lat, selectedLatLon.lon]);
        circle.setRadius(radius);
      }
    }

    // Map click handler
    map.on("click", (e) => {
      selectedLatLon = { lat: e.latlng.lat, lon: e.latlng.lng };

      if (!marker) {
        marker = L.marker(e.latlng).addTo(map);
      } else {
        marker.setLatLng(e.latlng);
      }

      updateRadiusCircle();
      updateLocationDisplay();
    });

    // Radius slider change
    radiusInput.addEventListener("input", () => {
      radiusValue.textContent = radiusInput.value;
      updateRadiusCircle();
    });

    btnClearLocation.addEventListener("click", () => {
      selectedLatLon = null;
      if (marker) {
        map.removeLayer(marker);
        marker = null;
      }
      if (circle) {
        map.removeLayer(circle);
        circle = null;
      }
      updateLocationDisplay();
    });

    function toNumberLike(value) {
      if (typeof value === "number" && Number.isFinite(value)) {
        return value;
      }
      if (typeof value === "string" && value.trim() !== "") {
        const parsed = Number.parseFloat(value);
        if (Number.isFinite(parsed)) {
          return parsed;
        }
      }
      return null;
    }

    function findLatLon(candidate) {
      if (!candidate) return null;

      if (Array.isArray(candidate)) {
        for (const entry of candidate) {
          const found = findLatLon(entry);
          if (found) return found;
        }
        return null;
      }

      if (typeof candidate === "string") {
        const parts = candidate.split(/[,;]/).map((p) => p.trim());
        if (parts.length >= 2) {
          const lat = toNumberLike(parts[0]);
          const lon = toNumberLike(parts[1]);
          if (lat !== null && lon !== null) {
            return { lat, lon };
          }
        }
        return null;
      }

      if (typeof candidate === "object") {
        const latKeys = ["lat", "latitude", "lat_deg"];
        const lonKeys = ["lon", "lng", "longitude", "lon_deg"];

        let lat = null;
        let lon = null;

        for (const key of latKeys) {
          if (lat === null && key in candidate) {
            lat = toNumberLike(candidate[key]);
          }
        }
        for (const key of lonKeys) {
          if (lon === null && key in candidate) {
            lon = toNumberLike(candidate[key]);
          }
        }

        if (lat !== null && lon !== null) {
          return { lat, lon };
        }

        if ("coordinates" in candidate) {
          const coords = findLatLon(candidate.coordinates);
          if (coords) return coords;
        }

        if ("point" in candidate) {
          const point = findLatLon(candidate.point);
          if (point) return point;
        }

        return null;
      }

      return null;
    }

    function extractLatLonFromItem(raw) {
      const payload = raw?.payload || raw || {};
      return (
        findLatLon(payload.locations) ||
        findLatLon(payload.geo_metadata) ||
        findLatLon(payload.location) ||
        findLatLon({ lat: payload.lat, lon: payload.lon })
      );
    }

    function getItemId(raw) {
      if (!raw) return null;
      const payload = raw.payload || raw;
      return payload.id ?? raw.id ?? payload.item_id ?? null;
    }

    // Normalize result item to {title, text, previewText, imageUrl, publicUrl, creator}
    function normalizeItem(raw) {
      // Sometimes your API might return bare Items,
      // sometimes Qdrant hits like { id, payload: { ...Item... } }
      const payload = raw.payload || raw;

      const title = payload.title || "(untitled)";
      const text = payload.text || "";
      const creator = payload.creator || "";
      const publicUrl = payload.public_url || payload.publicUrl || null;

      let imageUrl = null;
      const files = payload.files_url || payload.filesUrl || [];
      if (Array.isArray(files) && files.length > 0) {
        imageUrl = files[0];
      } else if (publicUrl && /\.(jpg|jpeg|png|gif|webp)$/i.test(publicUrl)) {
        imageUrl = publicUrl;
      }

      const previewText =
        text && text.length > 200 ? text.slice(0, 200) + "…" : text || "";

      return { title, text, previewText, imageUrl, publicUrl, creator };
    }

    function renderResults(items) {
      resultsContainer.innerHTML = "";

      let list = items;
      if (!Array.isArray(list)) {
        list = list?.items || [];
      }

      if (!list || list.length === 0) {
        resultsContainer.innerHTML = "<p>No results.</p>";
        return;
      }

      for (const raw of list) {
        const { title, previewText, imageUrl, publicUrl } = normalizeItem(raw);

        const card = document.createElement("div");
        card.className = "item-card";

        const header = document.createElement("div");
        header.className = "item-header";

        if (imageUrl) {
          const img = document.createElement("img");
          img.src = imageUrl;
          img.alt = title;
          img.className = "item-image";
          header.appendChild(img);
        }

        const info = document.createElement("div");
        const titleEl = document.createElement("h3");
        titleEl.className = "item-title";
        titleEl.textContent = title;

        info.appendChild(titleEl);

        if (previewText) {
          const textEl = document.createElement("p");
          textEl.className = "item-text";
          textEl.textContent = previewText;
          info.appendChild(textEl);
        }

        header.appendChild(info);
        card.appendChild(header);

        card.addEventListener("click", () => {
          handleResultClick(raw);
        });

        if (publicUrl) {
          const footer = document.createElement("div");
          footer.className = "item-footer";
          const link = document.createElement("a");
          link.href = publicUrl;
          link.target = "_blank";
          link.rel = "noopener noreferrer";
          link.className = "item-link";
          link.textContent = "Open item";
          link.addEventListener("click", (event) => {
            event.stopPropagation();
            hideItemDetailUI();
            finalizeActiveInteraction(getItemId(raw), { useBeacon: true });
          });
          footer.appendChild(link);
          card.appendChild(footer);
        }

        resultsContainer.appendChild(card);
      }
    }

    function hideItemDetailUI() {
      detailOverlay.classList.remove("open");
      detailOverlay.setAttribute("aria-hidden", "true");
      detailImage.src = "";
      detailLinkEl.style.display = "none";
    }

    function showItemDetail(raw) {
      const { title, text, imageUrl, publicUrl, creator } = normalizeItem(raw);
      const payload = raw.payload || raw || {};
      const metaItems = [];

      const coords = extractLatLonFromItem(raw);
      if (coords) {
        metaItems.push({
          label: "Location",
          value: `${coords.lat.toFixed(5)}, ${coords.lon.toFixed(5)}`
        });
      }

      if (payload.time_metadata?.dates_of_creation) {
        metaItems.push({
          label: "Date",
          value: Array.isArray(payload.time_metadata.dates_of_creation)
            ? payload.time_metadata.dates_of_creation.join(", ")
            : payload.time_metadata.dates_of_creation
        });
      }

      if (payload.score !== undefined) {
        const scoreText =
          typeof payload.score === "number"
            ? payload.score.toFixed(3)
            : payload.score;
        metaItems.push({ label: "Score", value: scoreText });
      }

      detailTitleEl.textContent = title;
      detailCreatorEl.textContent = creator ? `Creator: ${creator}` : "Creator unknown";
      detailTextEl.textContent = text || "No description provided.";

      if (imageUrl) {
        detailImage.src = imageUrl;
        detailImage.style.display = "block";
      } else {
        detailImage.style.display = "none";
      }

      if (publicUrl) {
        detailLinkEl.href = publicUrl;
        detailLinkEl.style.display = "inline-flex";
      } else {
        detailLinkEl.style.display = "none";
      }

      if (metaItems.length) {
        detailMetaEl.innerHTML = metaItems
          .map(
            (item) => `
              <dt>${item.label}</dt>
              <dd>${item.value}</dd>
            `
          )
          .join("");
      } else {
        detailMetaEl.innerHTML = "<dt>Details</dt><dd>No extra metadata.</dd>";
      }

      detailOverlay.classList.add("open");
      detailOverlay.setAttribute("aria-hidden", "false");
    }

    async function sendInteractionEvent(itemId, eventType, { useBeacon = false } = {}) {
      if (!itemId) return;
      const payload = {
        id: Date.now(),
        user_id: ACTIVE_USER_ID,
        item_id: itemId,
        event_type: eventType,
        ts: new Date().toISOString()
      };
      const endpoint = `${API_BASE}/db/events`;

      if (useBeacon && navigator.sendBeacon) {
        const blob = new Blob([JSON.stringify(payload)], { type: "application/json" });
        navigator.sendBeacon(endpoint, blob);
        return;
      }

      try {
        await fetch(endpoint, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
          keepalive: useBeacon
        });
      } catch (err) {
        console.error("Failed to log event", err);
      }
    }

    async function finalizeActiveInteraction(targetItemId = null, options = {}) {
      if (!activeInteraction) return;
      if (targetItemId && activeInteraction.itemId !== targetItemId) return;
      const { itemId } = activeInteraction;
      activeInteraction = null;
      await sendInteractionEvent(itemId, "end", options);
    }

    async function handleResultClick(raw) {
      await finalizeActiveInteraction();
      hideItemDetailUI();

      const coords = extractLatLonFromItem(raw);
      if (coords) {
        const targetZoom = Math.min(Math.max(map.getZoom(), 12) + 1.2, 16);
        map.flyTo([coords.lat, coords.lon], targetZoom, { duration: 0.6 });
      }

      const itemId = getItemId(raw);
      if (!itemId) return;

      activeInteraction = { itemId, startedAt: Date.now() };
      await sendInteractionEvent(itemId, "start");
      showItemDetail(raw);
    }

    function setStatus(msg, isError = false) {
      statusMessage.textContent = msg || "";
      statusMessage.style.color = isError ? "#b91c1c" : "#6b7280";
    }

    async function doTextSearch() {
      const q = searchInput.value.trim();
      if (!q) {
        setStatus("Please enter some text to search.", true);
        return;
      }

      setStatus("Searching…");
      try {
        const url = `${API_BASE}/api/search?q=${encodeURIComponent(q)}`;
        const res = await fetch(url);
        if (!res.ok) {
          throw new Error(`HTTP ${res.status}`);
        }
        const data = await res.json();
        await finalizeActiveInteraction();
        renderResults(data.result || []);
        setStatus(`Text search done. ${ (data.result || []).length } result(s).`);
      } catch (err) {
        console.error(err);
        setStatus("Error during text search. See console.", true);
      }
    }

    async function doGeoSearch() {
      if (!selectedLatLon) {
        setStatus("Select a location on the map first.", true);
        return;
      }

      const q = searchInput.value.trim() || null;
      const radius = Number(radiusInput.value);

      setStatus("Searching (geo)…");
      try {
        const params = new URLSearchParams();
        params.set("lat", selectedLatLon.lat);
        params.set("lon", selectedLatLon.lon);
        params.set("radius_meters", radius);
        if (q) params.set("q", q);

        const url = `${API_BASE}/api/search/geo?` + params.toString();
        const res = await fetch(url);
        if (!res.ok) {
          throw new Error(`HTTP ${res.status}`);
        }
        const data = await res.json();
        await finalizeActiveInteraction();
        renderResults(data.result || []);
        setStatus(
          `Geo search done. ${ (data.result || []).length } result(s).`
        );
      } catch (err) {
        console.error(err);
        setStatus("Error during geo search. See console.", true);
      }
    }

    btnTextSearch.addEventListener("click", (e) => {
      e.preventDefault();
      doTextSearch();
    });

    btnGeoSearch.addEventListener("click", (e) => {
      e.preventDefault();
      doGeoSearch();
    });

    // Also allow pressing Enter in the search box to trigger text search
    searchInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        e.preventDefault();
        doTextSearch();
      }
    });

    detailCloseBtn.addEventListener("click", () => {
      hideItemDetailUI();
      finalizeActiveInteraction();
    });

    detailOverlay.addEventListener("click", (event) => {
      if (event.target === detailOverlay) {
        hideItemDetailUI();
        finalizeActiveInteraction();
      }
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && detailOverlay.classList.contains("open")) {
        hideItemDetailUI();
        finalizeActiveInteraction();
      }
    });

    window.addEventListener("beforeunload", () => {
      if (!activeInteraction) return;
      const { itemId } = activeInteraction;
      activeInteraction = null;
      sendInteractionEvent(itemId, "end", { useBeacon: true });
    });

    // Initial state
    updateLocationDisplay();
    radiusValue.textContent = radiusInput.value;
    setStatus("");
    // Ensure the map tiles load correctly after the container is fully rendered
    // (Common fix for Leaflet rendering issues, e.g., in Flex/Grid layouts or on page load)
    setTimeout(() => {
        map.invalidateSize();
    }, 100);
  </script>
</body>
</html>
