<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Geo search demo with results</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Map viewer (Leaflet) + OpenStreetMap tiles -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    crossorigin=""
  />
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    crossorigin=""
  ></script>

  <style>
    :root {
      --bg: #020617;
      --card-bg: #020617;
      --accent: #38bdf8;
      --accent-soft: rgba(56, 189, 248, 0.12);
      --text: #e5e7eb;
      --muted: #9ca3af;
      --radius-xl: 1.5rem;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 16px;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top, #0f172a, #020617 50%),
        radial-gradient(circle at bottom, #0b1120, #020617 60%);
      color: var(--text);
    }

    .page {
      display: grid;
      grid-template-columns: minmax(0, 2.2fr) minmax(280px, 1fr); /* left big, right card */
      gap: 18px;
      height: calc(100vh - 32px);
    }

    .card {
      background: radial-gradient(circle at top left, #020617, #020617 50%);
      border-radius: var(--radius-xl);
      padding: 18px;
      border: 1px solid rgba(148, 163, 184, 0.25);
      box-shadow:
        0 24px 60px rgba(15, 23, 42, 0.95),
        0 0 0 1px rgba(15, 23, 42, 0.8) inset;
      backdrop-filter: blur(18px);
    }

    .section-title {
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 6px;
    }

    label {
      font-size: 13px;
      color: var(--muted);
      display: block;
      margin-bottom: 4px;
    }

    input[type="text"] {
      width: 100%;
      padding: 8px 10px;
      border-radius: 999px;
      border: 1px solid rgba(148, 163, 184, 0.4);
      background: rgba(15, 23, 42, 0.9);
      color: var(--text);
      font-size: 13px;
      outline: none;
    }

    input[type="text"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px rgba(56, 189, 248, 0.3);
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
    }

    .input-row input {
      flex: 1;
    }

    .btn {
      border-radius: 999px;
      border: 1px solid rgba(148, 163, 184, 0.5);
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 500;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      background: rgba(15, 23, 42, 0.9);
      color: var(--muted);
      transition:
        background 120ms ease-out,
        border-color 120ms ease-out,
        transform 80ms ease-out;
      white-space: nowrap;
    }

    .btn:hover {
      transform: translateY(-0.5px);
      border-color: var(--accent);
    }

    .btn-primary {
      background: linear-gradient(135deg, #22d3ee, #38bdf8, #6366f1);
      border-color: transparent;
      color: #0b1120;
    }

    .btn-primary:hover {
      background: linear-gradient(135deg, #06b6d4, #3b82f6);
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: default;
      transform: none;
    }

    #map {
      width: 100%;
      height: 320px;
      border-radius: 18px;
      border: 1px solid rgba(148, 163, 184, 0.35);
      overflow: hidden;
      margin-top: 8px;
    }

    .radius-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 10px 0 4px;
    }

    input[type="range"] {
      flex: 1;
    }

    .chip {
      font-size: 11px;
      padding: 4px 8px;
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.9);
      border: 1px solid rgba(148, 163, 184, 0.5);
      color: var(--muted);
      white-space: nowrap;
    }

    .controls-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }

    /* Results area */
    .results-panel {
      display: flex;
      flex-direction: column;
      gap: 10px;
      overflow: hidden;
    }

    .results-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .results-count {
      font-size: 12px;
      color: var(--muted);
    }

    .results-list {
      margin-top: 4px;
      border-radius: 18px;
      border: 1px solid rgba(148, 163, 184, 0.25);
      padding: 10px;
      background: radial-gradient(circle at top left, #020617, #020617 50%);
      overflow-y: auto;
      flex: 1;
    }

    .result-card {
      display: grid;
      grid-template-columns: 110px minmax(0, 1fr);
      gap: 10px;
      padding: 8px;
      border-radius: 14px;
      border: 1px solid rgba(148, 163, 184, 0.3);
      background: rgba(15, 23, 42, 0.85);
      margin-bottom: 8px;
    }

    .result-card:last-child {
      margin-bottom: 0;
    }

    .result-thumb {
      width: 100%;
      aspect-ratio: 4 / 3;
      border-radius: 10px;
      object-fit: cover;
      background: #020617;
      border: 1px solid rgba(148, 163, 184, 0.4);
    }

    .result-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 2px;
    }

    .result-creator {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .result-meta-bottom {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      margin-top: 4px;
    }

    .result-link {
      font-size: 12px;
      text-decoration: none;
      color: var(--accent);
      word-break: break-all;
    }

    .badge {
      font-size: 11px;
      padding: 3px 7px;
      border-radius: 999px;
      border: 1px solid rgba(148, 163, 184, 0.5);
      color: var(--muted);
    }

    .badge-geo {
      border-color: #4ade80;
      color: #bbf7d0;
    }

    .badge-text {
      border-color: #38bdf8;
      color: #bae6fd;
    }

    .empty-state {
      font-size: 13px;
      color: var(--muted);
      padding: 8px;
    }

    .item-detail-overlay {
      position: fixed;
      inset: 0;
      background: rgba(2, 6, 23, 0.82);
      backdrop-filter: blur(6px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      z-index: 1000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 160ms ease-out;
    }

    .item-detail-overlay.open {
      opacity: 1;
      pointer-events: auto;
    }

    .item-detail-card {
      background: #020617;
      border-radius: 20px;
      padding: 20px;
      width: min(640px, 100%);
      max-height: 90vh;
      overflow-y: auto;
      border: 1px solid rgba(148, 163, 184, 0.35);
      box-shadow: 0 30px 80px rgba(2, 6, 23, 0.6);
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .detail-close {
      position: absolute;
      top: 10px;
      right: 12px;
      border: none;
      background: transparent;
      color: var(--muted);
      font-size: 1.4rem;
      cursor: pointer;
    }

    .detail-image {
      width: 100%;
      max-height: 320px;
      object-fit: cover;
      border-radius: 14px;
      border: 1px solid rgba(148, 163, 184, 0.25);
      background: rgba(15, 23, 42, 0.6);
    }

    .detail-title {
      margin: 0;
      font-size: 1.3rem;
    }

    .detail-meta {
      display: grid;
      grid-template-columns: max-content 1fr;
      gap: 4px 12px;
      font-size: 0.9rem;
      color: var(--muted);
    }

    .detail-meta dt {
      font-weight: 600;
      color: var(--text);
    }

    .detail-link {
      align-self: flex-start;
      border-radius: 999px;
      padding: 8px 14px;
      border: 1px solid rgba(148, 163, 184, 0.5);
      color: var(--text);
      text-decoration: none;
    }

    @media (max-width: 900px) {
      .page {
        grid-template-columns: minmax(0, 1fr);
        height: auto;
      }
      .results-list {
        max-height: 320px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <!-- LEFT: results -->
    <div class="results-panel">
      <div class="results-header">
        <div class="section-title">Results</div>
        <div class="results-count" id="resultsCount">No results yet</div>
      </div>
      <div class="results-list" id="resultsList">
        <div class="empty-state">
          Run a text search or geo search to see items here.  
          We’ll show image, title, creator, and public link.
        </div>
      </div>
    </div>

    <!-- RIGHT: search + map card -->
    <div class="card">
      <div class="section-title">Text search</div>
      <div class="input-row">
        <input id="textQuery" type="text" placeholder="e.g. &quot;Bergen-Belsen&quot;" />
        <button class="btn btn-primary" id="btnTextSearch">Go</button>
      </div>

      <div class="section-title" style="margin-top: 10px;">Location search</div>
      <div class="input-row">
        <input id="locationQuery" type="text" placeholder="Search place by name…" />
        <button class="btn" id="btnLocate">Locate</button>
      </div>

      <small id="locStatus" style="font-size:11px;color:var(--muted);display:block;margin-bottom:4px;">
        Click on the map, a memorial marker, or search by name.
      </small>

      <div id="map"></div>

      <div class="radius-row">
        <label for="radiusSlider" style="margin: 0;">Radius (meters)</label>
        <span class="chip" id="radiusLabel">5000 m</span>
      </div>
      <input
        id="radiusSlider"
        type="range"
        min="10"
        max="1000"
        step="10"
        value="50"
      />

      <div class="controls-row">
        <button class="btn btn-primary" id="btnGeoSearch" disabled>Geo search</button>
        <button class="btn" id="btnClear">Clear</button>
        <span class="chip" id="coordChip">
          No location selected
        </span>
      </div>
    </div>
  </div>

  <div class="item-detail-overlay" id="itemDetailOverlay" aria-hidden="true">
    <div class="item-detail-card" role="dialog" aria-modal="true">
      <button class="detail-close" id="detailCloseBtn" aria-label="Close detail view">&times;</button>
      <img id="detailImage" class="detail-image" alt="" />
      <h2 id="detailTitle" class="detail-title"></h2>
      <p id="detailCreator" class="detail-creator"></p>
      <p id="detailText" class="detail-text"></p>
      <dl id="detailMeta" class="detail-meta"></dl>
      <a id="detailLink" class="detail-link" href="#" target="_blank" rel="noopener noreferrer">Open record ↗</a>
    </div>
  </div>

  <script>
    // --- Memorial hallmarks -------------------------------------------------
    // --- Map: OpenStreetMap tiles via Leaflet ------------------------------
    const ACTIVE_USER_ID = 10;

    const map = L.map('map'); // no setView yet, we'll do it after loading

    // --- Memorial hallmarks (loaded from memorials.json) --------------------
    let MEMORIALS = [];

    const defaultView = { lat: 52.75, lon: 9.9, zoom: 11 };

    fetch('/static/memorials.json')
      .then(res => res.json())
      .then(data => {
        MEMORIALS = data;
        addMemorialMarkers();

        // Set default view from the first memorial's viewpoint if available
        if (MEMORIALS.length > 0) {
          const first = MEMORIALS[0];
          defaultView.lat = first.view_lat ?? first.lat;
          defaultView.lon = first.view_lon ?? first.lon;
          defaultView.zoom = first.view_zoom ?? 15;
          map.setView([defaultView.lat, defaultView.lon], defaultView.zoom);
        } else {
          // fallback if no memorials
          map.setView([defaultView.lat, defaultView.lon], defaultView.zoom);
        }
      })
      .catch(err => {
        console.error('Error loading memorials.json:', err);
        // fallback view if loading fails
        map.setView([defaultView.lat, defaultView.lon], defaultView.zoom);
      });

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    const geoResultsLayer = L.layerGroup().addTo(map);
    let selectedLatLng = null;
    let marker = null;
    let circle = null;
    let radius = Number(document.getElementById('radiusSlider').value);

    const radiusLabel = document.getElementById('radiusLabel');
    const coordChip = document.getElementById('coordChip');
    const btnGeo = document.getElementById('btnGeoSearch');
    const btnClear = document.getElementById('btnClear');
    const radiusSlider = document.getElementById('radiusSlider');
    const locStatus = document.getElementById('locStatus');
    const detailOverlay = document.getElementById('itemDetailOverlay');
    const detailCloseBtn = document.getElementById('detailCloseBtn');
    const detailImage = document.getElementById('detailImage');
    const detailTitleEl = document.getElementById('detailTitle');
    const detailCreatorEl = document.getElementById('detailCreator');
    const detailTextEl = document.getElementById('detailText');
    const detailMetaEl = document.getElementById('detailMeta');
    const detailLinkEl = document.getElementById('detailLink');

    function updateRadiusLabel() {
      radiusLabel.textContent = radius.toLocaleString('en-US') + ' m';
    }

    function updateCircle() {
      if (!selectedLatLng) return;
      if (!circle) {
        circle = L.circle(selectedLatLng, {
          radius,
          color: '#38bdf8',
          weight: 2,
          fillOpacity: 0.12
        }).addTo(map);
      } else {
        circle.setLatLng(selectedLatLng);
        circle.setRadius(radius);
      }
    }

    function updateMarker() {
      if (!selectedLatLng) return;
      if (!marker) {
        marker = L.marker(selectedLatLng).addTo(map);
      } else {
        marker.setLatLng(selectedLatLng);
      }
    }

    function updateCoordDisplay(labelExtra) {
      if (!selectedLatLng) {
        coordChip.textContent = 'No location selected';
        btnGeo.disabled = true;
        return;
      }
      const base =
        `${selectedLatLng.lat.toFixed(5)}, ${selectedLatLng.lng.toFixed(5)} · ` +
        `r = ${radius.toLocaleString('en-US')} m`;
      coordChip.textContent = labelExtra ? `${labelExtra} · ${base}` : base;
      btnGeo.disabled = false;
    }

    map.on('click', (e) => {
      selectedLatLng = e.latlng;
      updateMarker();
      updateCircle();
      updateCoordDisplay();
      locStatus.textContent = 'Location set via map click.';
    });

    function addMemorialMarkers() {
      MEMORIALS.forEach(mem => {
        const m = L.circleMarker([mem.lat, mem.lon], {
          radius: 6,
          color: '#facc15',
          weight: 2,
          fillOpacity: 0.95
        }).addTo(map);

        m.bindPopup(`<strong>${mem.name}</strong><br>${mem.lat.toFixed(4)}, ${mem.lon.toFixed(4)}`);

        m.on('click', () => {
          selectedLatLng = m.getLatLng();
          updateMarker();
          updateCircle();
          updateCoordDisplay(mem.name);
          map.panTo(selectedLatLng);
          locStatus.textContent = `Location set from memorial: ${mem.name}`;
        });
      });
    }
    // addMemorialMarkers();

    function toNumberLike(value) {
      if (typeof value === 'number' && Number.isFinite(value)) return value;
      if (typeof value === 'string' && value.trim() !== '') {
        const parsed = Number.parseFloat(value);
        if (Number.isFinite(parsed)) return parsed;
      }
      return null;
    }

    function findLatLon(candidate) {
      if (!candidate) return null;

      if (Array.isArray(candidate)) {
        for (const entry of candidate) {
          const found = findLatLon(entry);
          if (found) return found;
        }
        return null;
      }

      if (typeof candidate === 'string') {
        const parts = candidate.split(/[,;]/).map(part => part.trim());
        if (parts.length >= 2) {
          const lat = toNumberLike(parts[0]);
          const lon = toNumberLike(parts[1]);
          if (lat !== null && lon !== null) {
            return { lat, lon };
          }
        }
        return null;
      }

      if (typeof candidate === 'object') {
        const latKeys = ['lat', 'latitude', 'lat_deg'];
        const lonKeys = ['lon', 'lng', 'longitude', 'lon_deg'];

        let lat = null;
        let lon = null;

        for (const key of latKeys) {
          if (lat === null && key in candidate) {
            lat = toNumberLike(candidate[key]);
          }
        }
        for (const key of lonKeys) {
          if (lon === null && key in candidate) {
            lon = toNumberLike(candidate[key]);
          }
        }

        if (lat !== null && lon !== null) {
          return { lat, lon };
        }

        if ('coordinates' in candidate) {
          const coords = candidate.coordinates;
          const coordsResult = findLatLon(coords);
          if (coordsResult) return coordsResult;
        }

        if ('point' in candidate) {
          const pointResult = findLatLon(candidate.point);
          if (pointResult) return pointResult;
        }

        return null;
      }

      return null;
    }

    function extractLatLonFromPayload(payload) {
      if (!payload || typeof payload !== 'object') return null;
      return (
        findLatLon(payload.locations) ||
        findLatLon(payload.geo_metadata) ||
        findLatLon(payload.location) ||
        findLatLon({ lat: payload.lat, lon: payload.lon })
      );
    }

    function plotGeoResultMarkers(items, { adjustView = true } = {}) {
      geoResultsLayer.clearLayers();
      if (!Array.isArray(items) || !items.length) return;

      const plotted = [];
      items.forEach(item => {
        const payload = item.payload || {};
        const coords = extractLatLonFromPayload(payload);
        if (!coords) return;

        const title = payload.title || '(No title)';
        L.circleMarker([coords.lat, coords.lon], {
          radius: 7,
          color: '#38bdf8',
          weight: 2,
          fillColor: '#38bdf8',
          fillOpacity: 0.8
        })
          .bindPopup(`<strong>${title}</strong><br>${coords.lat.toFixed(5)}, ${coords.lon.toFixed(5)}`)
          .addTo(geoResultsLayer);

        plotted.push([coords.lat, coords.lon]);
      });

      if (!plotted.length || !adjustView) return;

      const currentZoom = map.getZoom();
      const targetZoom = Math.min(currentZoom + 1.2, 16);

      if (plotted.length === 1) {
        map.flyTo(plotted[0], targetZoom, { duration: 0.5 });
        return;
      }

      const bounds = L.latLngBounds(plotted);
      if (bounds.isValid()) {
        map.flyToBounds(bounds, {
          padding: [50, 50],
          maxZoom: targetZoom,
        });
      }
    }

    radiusSlider.addEventListener('input', () => {
      radius = Number(radiusSlider.value);
      updateRadiusLabel();
      updateCircle();
      updateCoordDisplay();
    });
    updateRadiusLabel();

    btnClear.addEventListener('click', () => {
      selectedLatLng = null;
      if (marker) { map.removeLayer(marker); marker = null; }
      if (circle) { map.removeLayer(circle); circle = null; }
      updateCoordDisplay();
      locStatus.textContent = 'Location cleared.';
      plotGeoResultMarkers([]);
      map.setView([defaultView.lat, defaultView.lon], defaultView.zoom);
    });

    // --- Location search by name (OpenStreetMap Nominatim) ------------------
    const locationInput = document.getElementById('locationQuery');
    const btnLocate = document.getElementById('btnLocate');

    async function doLocate() {
      const q = locationInput.value.trim();
      if (!q) return;
      locStatus.textContent = 'Searching location…';

      try {
        const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q)}`;
        const res = await fetch(url, {
          headers: { 'Accept-Language': 'en' }
        });
        const data = await res.json();
        if (!data.length) {
          locStatus.textContent = 'No location found.';
          return;
        }
        const best = data[0];
        const lat = parseFloat(best.lat);
        const lon = parseFloat(best.lon);
        selectedLatLng = L.latLng(lat, lon);
        map.setView(selectedLatLng, 11);
        updateMarker();
        updateCircle();
        updateCoordDisplay(best.display_name.split(',')[0]);
        locStatus.textContent = `Location set: ${best.display_name}`;
      } catch (err) {
        locStatus.textContent = 'Error locating place.';
        console.error(err);
      }
    }

    btnLocate.addEventListener('click', doLocate);
    locationInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') doLocate();
    });

    // --- Results rendering --------------------------------------------------
    const resultsList = document.getElementById('resultsList');
    const resultsCount = document.getElementById('resultsCount');
    let activeInteraction = null;

    function normalizeResults(json) {
      // Our backend returns: { result: { items: [...] } }
      if (!json || typeof json !== 'object') return [];
      if (json.result && Array.isArray(json.result.items)) {
        return json.result.items;
      }
      // Fallbacks if you ever change the API later
      if (Array.isArray(json.items)) return json.items;
      if (Array.isArray(json)) return json;
      return [];
    }

    function getItemId(item) {
      if (!item) return null;
      const payload = item.payload || {};
      return item.id ?? payload.id ?? payload.item_id ?? null;
    }

    function hideItemDetailUI() {
      detailOverlay.classList.remove('open');
      detailOverlay.setAttribute('aria-hidden', 'true');
      detailImage.src = '';
      detailImage.style.display = 'none';
      detailLinkEl.style.display = 'none';
    }

    function showItemDetail(item) {
      const payload = item.payload || {};
      const title = payload.title || '(No title)';
      const text = payload.text || 'No description provided.';
      const creator = payload.creator || '';
      const imageUrl = payload.image_url || payload.imageUrl || '';
      const publicUrl = payload.public_url || payload.publicUrl || '';
      const coords = extractLatLonFromPayload(payload);
      const created = payload.time_metadata?.dates_of_creation;

      detailTitleEl.textContent = title;
      detailCreatorEl.textContent = creator ? `Creator: ${creator}` : 'Creator unknown';
      detailTextEl.textContent = text;

      if (imageUrl) {
        detailImage.src = imageUrl;
        detailImage.style.display = 'block';
      } else {
        detailImage.style.display = 'none';
      }

      if (publicUrl) {
        detailLinkEl.href = publicUrl;
        detailLinkEl.style.display = 'inline-flex';
      } else {
        detailLinkEl.style.display = 'none';
      }

      const metaParts = [];
      if (coords) {
        metaParts.push(`<dt>Location</dt><dd>${coords.lat.toFixed(5)}, ${coords.lon.toFixed(5)}</dd>`);
      }
      if (created) {
        const value = Array.isArray(created) ? created.join(', ') : created;
        metaParts.push(`<dt>Date</dt><dd>${value}</dd>`);
      }
      if (item.score !== undefined) {
        const score = typeof item.score === 'number' ? item.score.toFixed(3) : item.score;
        metaParts.push(`<dt>Score</dt><dd>${score}</dd>`);
      }

      detailMetaEl.innerHTML = metaParts.length ? metaParts.join('') : '<dt>Details</dt><dd>No extra metadata.</dd>';

      detailOverlay.classList.add('open');
      detailOverlay.setAttribute('aria-hidden', 'false');
    }

    async function sendInteractionEvent(itemId, eventType, { useBeacon = false } = {}) {
      if (!itemId) return;
      const payload = {
        id: Date.now(),
        user_id: ACTIVE_USER_ID,
        item_id: itemId,
        event_type: eventType,
        ts: new Date().toISOString()
      };

      if (useBeacon && navigator.sendBeacon) {
        const blob = new Blob([JSON.stringify(payload)], { type: 'application/json' });
        navigator.sendBeacon('/db/events', blob);
        return;
      }

      try {
        await fetch('/db/events', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
          keepalive: useBeacon
        });
      } catch (err) {
        console.error('Failed to log event', err);
      }
    }

    async function finalizeActiveInteraction(targetItemId = null, options = {}) {
      if (!activeInteraction) return;
      if (targetItemId && activeInteraction.itemId !== targetItemId) return;
      const { itemId } = activeInteraction;
      activeInteraction = null;
      await sendInteractionEvent(itemId, 'end', options);
    }

    async function handleResultClick(item) {
      await finalizeActiveInteraction();
      hideItemDetailUI();

      const payload = item.payload || {};
      const coords = extractLatLonFromPayload(payload);
      if (coords) {
        const targetZoom = Math.min(Math.max(map.getZoom(), 12) + 1.1, 16);
        map.flyTo([coords.lat, coords.lon], targetZoom, { duration: 0.5 });
      }

      const itemId = getItemId(item);
      if (!itemId) return;

      activeInteraction = { itemId, startedAt: Date.now() };
      await sendInteractionEvent(itemId, 'start');
      showItemDetail(item);
    }

    function renderResults(items, sourceLabel) {
      const typeBadgeClass = sourceLabel === 'Geo' ? 'badge badge-geo' : 'badge badge-text';

      if (!items.length) {
        resultsList.innerHTML = `<div class="empty-state">No results from ${sourceLabel} search.</div>`;
        resultsCount.textContent = '0 results';
        return;
      }

      resultsList.innerHTML = '';
      items.forEach(item => {
        const payload = item.payload || {};

        const title = payload.title || '(No title)';
        const creator = payload.creator || '';
        const imageUrl = payload.image_url || '';
        const publicUrl = payload.public_url || '';

        const card = document.createElement('div');
        card.className = 'result-card';

        const img = document.createElement('img');
        img.className = 'result-thumb';
        img.alt = title;
        if (imageUrl) {
          img.src = imageUrl;
        } else {
          // tiny transparent GIF as fallback
          img.src = 'data:image/gif;base64,R0lGODlhAQABAAD/ACw=';
        }

        const info = document.createElement('div');

        const titleEl = document.createElement('div');
        titleEl.className = 'result-title';
        titleEl.textContent = title;

        const creatorEl = document.createElement('div');
        creatorEl.className = 'result-creator';
        creatorEl.textContent = creator ? `Creator: ${creator}` : 'Creator unknown';

        const bottom = document.createElement('div');
        bottom.className = 'result-meta-bottom';

        const link = document.createElement('a');
        link.className = 'result-link';
        link.href = publicUrl || '#';
        link.target = '_blank';
        link.rel = 'noopener noreferrer';
        link.textContent = publicUrl ? 'Open record ↗' : 'No public URL';

        const badge = document.createElement('span');
        badge.className = typeBadgeClass;
        badge.textContent = sourceLabel === 'Geo' ? 'Geo' : 'Text';

        bottom.appendChild(link);
        bottom.appendChild(badge);

        info.appendChild(titleEl);
        info.appendChild(creatorEl);
        info.appendChild(bottom);

        card.appendChild(img);
        card.appendChild(info);
        card.addEventListener('click', () => handleResultClick(item));
        link.addEventListener('click', (event) => {
          event.stopPropagation();
          hideItemDetailUI();
          finalizeActiveInteraction(getItemId(item), { useBeacon: true });
        });
        resultsList.appendChild(card);
      });

      resultsCount.textContent =
        items.length + ' result' + (items.length !== 1 ? 's' : '');
    }

    // --- API calls ----------------------------------------------------------
    const btnTextSearch = document.getElementById('btnTextSearch');
    const textQueryInput = document.getElementById('textQuery');

    async function doGeoSearch() {
      if (!selectedLatLng) return;

      const params = new URLSearchParams({
        lat: selectedLatLng.lat,
        lon: selectedLatLng.lng,
        radius_meters: radius
      });

      resultsCount.textContent = 'Loading geo results…';

      try {
        const res = await fetch('/api/search/geo?' + params.toString());
        const json = await res.json();
        const items = normalizeResults(json);
        await finalizeActiveInteraction();
        hideItemDetailUI();
        renderResults(items, 'Geo');
        plotGeoResultMarkers(items, { adjustView: true });
      } catch (err) {
        console.error(err);
        resultsList.innerHTML = '<div class="empty-state">Error loading geo results.</div>';
        resultsCount.textContent = 'Error';
        plotGeoResultMarkers([]);
      }
    }

    async function doTextSearch() {
      const q = textQueryInput.value.trim();
      if (!q) return;

      resultsCount.textContent = 'Loading text results…';

      try {
        const params = new URLSearchParams({ q });
        const res = await fetch('/api/search?' + params.toString());
        const json = await res.json();
        const items = normalizeResults(json);
        await finalizeActiveInteraction();
        hideItemDetailUI();
        renderResults(items, 'Text');
        plotGeoResultMarkers(items, { adjustView: false });
      } catch (err) {
        console.error(err);
        resultsList.innerHTML = '<div class="empty-state">Error loading text results.</div>';
        resultsCount.textContent = 'Error';
        plotGeoResultMarkers([]);
      }
    }

    btnGeo.addEventListener('click', doGeoSearch);
    btnTextSearch.addEventListener('click', doTextSearch);
    textQueryInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') doTextSearch();
    });

    detailCloseBtn.addEventListener('click', () => {
      hideItemDetailUI();
      finalizeActiveInteraction();
    });

    detailOverlay.addEventListener('click', (event) => {
      if (event.target === detailOverlay) {
        hideItemDetailUI();
        finalizeActiveInteraction();
      }
    });

    document.addEventListener('keydown', (event) => {
      if (event.key === 'Escape' && detailOverlay.classList.contains('open')) {
        hideItemDetailUI();
        finalizeActiveInteraction();
      }
    });

    window.addEventListener('beforeunload', () => {
      if (!activeInteraction) return;
      const { itemId } = activeInteraction;
      activeInteraction = null;
      sendInteractionEvent(itemId, 'end', { useBeacon: true });
    });

    hideItemDetailUI();
  </script>
</body>
</html>
