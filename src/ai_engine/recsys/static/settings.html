<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>recsys · settings</title>
<style>
  :root { --bg:#0f1115; --panel:#171a21; --line:#262b36; --fg:#e6e8ec; --muted:#9aa3b2; --accent:#4f8cff; --ok:#3fb950; --err:#f85149; }
  * { box-sizing: border-box; }
  body { margin:0; background:var(--bg); color:var(--fg); font:14px/1.5 system-ui, sans-serif; }
  header { padding:16px 20px; border-bottom:1px solid var(--line); display:flex; gap:12px; align-items:center; flex-wrap:wrap; }
  h1 { font-size:16px; margin:0; font-weight:600; }
  main { padding:20px; max-width:880px; margin:0 auto; }
  .row { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
  input, select, button { font:inherit; color:var(--fg); background:var(--panel); border:1px solid var(--line); border-radius:6px; padding:6px 9px; }
  input[type=checkbox] { width:16px; height:16px; }
  button { cursor:pointer; background:var(--accent); border-color:var(--accent); color:#fff; font-weight:600; }
  button.ghost { background:var(--panel); border-color:var(--line); color:var(--fg); font-weight:500; }
  button:disabled { opacity:.5; cursor:not-allowed; }
  fieldset { border:1px solid var(--line); border-radius:8px; margin:14px 0; padding:12px 14px; }
  legend { color:var(--muted); padding:0 6px; text-transform:uppercase; font-size:11px; letter-spacing:.05em; }
  .field { display:grid; grid-template-columns:240px 1fr; gap:10px; align-items:center; padding:4px 0; }
  .field label { color:var(--muted); font-family:ui-monospace, monospace; font-size:12.5px; }
  .field input[type=text], .field input[type=number] { width:100%; max-width:320px; }
  #status { margin-left:auto; font-weight:600; }
  #status.ok { color:var(--ok); } #status.err { color:var(--err); }
  .hint { color:var(--muted); font-size:12px; }
  #key { width:300px; }
</style>
</head>
<body>
<header>
  <h1>recsys · settings</h1>
  <input id="key" type="password" placeholder="X-API-Key (INGEST_API_KEY)" />
  <button id="load" class="ghost">Load</button>
  <button id="save" disabled>Save &amp; apply</button>
  <button id="reset" class="ghost" disabled>Reset to baseline</button>
  <span id="status"></span>
</header>
<main>
  <p class="hint">Edits apply live (no redeploy) and persist to the Redis override layer. "Reset to baseline" drops the override and reverts to env/default config. The key is kept only in this tab (sessionStorage).</p>
  <form id="form"></form>
</main>
<script>
const $ = s => document.querySelector(s);
const keyEl = $("#key"), statusEl = $("#status"), form = $("#form");
keyEl.value = sessionStorage.getItem("recsys_key") || "";
keyEl.addEventListener("input", () => sessionStorage.setItem("recsys_key", keyEl.value));
let loaded = null;

function setStatus(msg, ok) { statusEl.textContent = msg; statusEl.className = ok === undefined ? "" : (ok ? "ok" : "err"); }
function headers() { return { "Content-Type": "application/json", "X-API-Key": keyEl.value }; }

function inputFor(path, value) {
  const id = "f:" + path;
  if (typeof value === "boolean") {
    return `<input type="checkbox" id="${id}" data-path="${path}" data-type="bool" ${value ? "checked" : ""}/>`;
  }
  if (typeof value === "number") {
    const step = Number.isInteger(value) ? "1" : "any";
    return `<input type="number" step="${step}" id="${id}" data-path="${path}" data-type="num" value="${value}"/>`;
  }
  if (Array.isArray(value) || (value && typeof value === "object")) {
    return `<input type="text" id="${id}" data-path="${path}" data-type="json" value='${JSON.stringify(value)}'/>`;
  }
  return `<input type="text" id="${id}" data-path="${path}" data-type="str" value="${value ?? ""}"/>`;
}

function render(cfg) {
  loaded = cfg;
  const scalars = [], groups = {};
  for (const [k, v] of Object.entries(cfg)) {
    if (v && typeof v === "object" && !Array.isArray(v)) groups[k] = v;
    else scalars.push([k, v]);
  }
  let html = `<fieldset><legend>general</legend>`;
  for (const [k, v] of scalars) html += `<div class="field"><label>${k}</label>${inputFor(k, v)}</div>`;
  html += `</fieldset>`;
  for (const [g, obj] of Object.entries(groups)) {
    html += `<fieldset><legend>${g}</legend>`;
    for (const [k, v] of Object.entries(obj)) html += `<div class="field"><label>${g}.${k}</label>${inputFor(g + "." + k, v)}</div>`;
    html += `</fieldset>`;
  }
  form.innerHTML = html;
  $("#save").disabled = false; $("#reset").disabled = false;
}

function collect() {
  const patch = {};
  for (const el of form.querySelectorAll("[data-path]")) {
    const parts = el.dataset.path.split(".");
    let v;
    if (el.dataset.type === "bool") v = el.checked;
    else if (el.dataset.type === "num") v = Number(el.value);
    else if (el.dataset.type === "json") { try { v = JSON.parse(el.value); } catch { setStatus("bad JSON in " + el.dataset.path, false); throw new Error("json"); } }
    else v = el.value;
    if (parts.length === 1) patch[parts[0]] = v;
    else { (patch[parts[0]] = patch[parts[0]] || {})[parts[1]] = v; }
  }
  return patch;
}

async function load() {
  setStatus("loading…");
  try {
    const r = await fetch("/api/config", { headers: headers() });
    if (!r.ok) return setStatus("HTTP " + r.status + (r.status === 401 || r.status === 503 ? " (check key)" : ""), false);
    render((await r.json()).result);
    setStatus("loaded", true);
  } catch (e) { setStatus("network error", false); }
}

async function save() {
  let patch; try { patch = collect(); } catch { return; }
  setStatus("saving…");
  const r = await fetch("/api/config", { method: "PUT", headers: headers(), body: JSON.stringify(patch) });
  const body = await r.json().catch(() => ({}));
  if (!r.ok) return setStatus("HTTP " + r.status + " " + (body.detail || ""), false);
  render(body.result); setStatus("applied", true);
}

async function reset() {
  if (!confirm("Drop the runtime override and revert to the env/default baseline?")) return;
  const r = await fetch("/api/config/reset", { method: "POST", headers: headers() });
  const body = await r.json().catch(() => ({}));
  if (!r.ok) return setStatus("HTTP " + r.status, false);
  render(body.result); setStatus("reset to baseline", true);
}

$("#load").onclick = load; $("#save").onclick = save; $("#reset").onclick = reset;
if (keyEl.value) load();
</script>
</body>
</html>
