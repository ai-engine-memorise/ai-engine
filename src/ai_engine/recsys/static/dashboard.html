async function drawCohortStats(box){
  const qsParts=Object.entries(_coFilter).map(([k,v])=>k+"="+encodeURIComponent(v.join(",")));
  const fbq=Object.entries(_fbFilter).map(([q,r])=>`${q}:${r[0]}-${r[1]}`).join(",");
  if(fbq)qsParts.push("feedback="+encodeURIComponent(fbq));
  const qs=qsParts.join("&");
  const st=await api("/api/cohort/stats"+(qs?"?"+qs:""));
  box.innerHTML="";
  if(!st||!st.total_visitors){
    box.append(el("div",{class:"empty"},"No visitor models in memory. ",
      el("button",{class:"userchip",style:"margin-left:8px",onclick:e=>replayEvents(e.target)},"rebuild from event log")));
    return;
  }
  const refresh=()=>{drawCohortStats(box).catch(e=>{box.innerHTML="";failCard(box,e);});filterUsers();};
  const setF=(f,val)=>{                        // toggle val within the field's selection
    const cur=_coFilter[f]||[];
    _coFilter[f]=cur.includes(val)?cur.filter(x=>x!==val):cur.concat(val);
    if(!_coFilter[f].length)delete _coFilter[f];
    refresh();
  };
  // click = toggle one value; click-and-DRAG across items = select exactly the sweep
  const attachDragSelect=(container,field,itemSel)=>{
    let dragging=false,moved=false,vals=null;
    container.style.touchAction="none";
    container.onpointerdown=ev=>{
      const it=ev.target.closest(itemSel);if(!it||!container.contains(it)||!it.dataset.val)return;
      dragging=true;moved=false;vals=new Set([it.dataset.val]);
      it.classList.add("dragsel");
      container.setPointerCapture(ev.pointerId);
    };
    container.onpointermove=ev=>{
      if(!dragging)return;
      const el2=document.elementFromPoint(ev.clientX,ev.clientY);
      const it=el2&&el2.closest(itemSel);
      if(it&&container.contains(it)&&it.dataset.val&&!vals.has(it.dataset.val)){
        vals.add(it.dataset.val);moved=true;it.classList.add("dragsel");
      }
    };
    container.onpointerup=()=>{
      if(!dragging)return;dragging=false;
      const picked=[...vals];vals=null;
      if(moved){_coFilter[field]=picked;refresh();}
      else setF(field,picked[0]);
    };
  };
  const CAT=["var(--c-semantic)","var(--c-tag)","var(--c-geo)","var(--c-recency)"];
  const DEMO_LABEL={age:"Age",gender:"Gender",nationality:"Nationality",province:"Province",personal_connection:"WW2 connection",email_shared:"Email shared"};
  const SLBL=st.labels||{};                       // server-owned value labels (D3)
  const lab=(f,v)=>(SLBL[f]&&SLBL[f][v])||humanVal(f,v);

  // active-filter chip row: height is RESERVED even when empty, so toggling a
  // filter never pushes the layout below it down
  const head=el("div",{class:"row",style:"gap:9px;flex-wrap:wrap;align-items:center;min-height:30px;margin:0 0 8px"});
  const fl=Object.entries(_coFilter);
  const fbl=Object.entries(_fbFilter);
  if(fl.length||fbl.length){
    fl.forEach(([f,vals])=>vals.forEach(val=>head.append(el("button",{class:"filterchip",title:"remove this filter",onclick:()=>setF(f,val)},
      `${DEMO_LABEL[f]||f}: ${lab(f,val)}`,el("span",{class:"x"},"✕")))));
    fbl.forEach(([q,rng])=>head.append(el("button",{class:"filterchip",title:"remove this filter",
      onclick:()=>{delete _fbFilter[q];refresh();}},
      `${cap1(q.replace(/_/g," "))}: ${rng[0]===rng[1]?rng[0]:rng[0]+"–"+rng[1]}/5`,el("span",{class:"x"},"✕"))));
    head.append(el("button",{class:"morebtn",style:"margin:0",onclick:()=>{_coFilter={};_fbFilter={};refresh();}},"clear all"));
    head.append(el("span",{class:"small mut"},`${st.visitors} of ${st.total_visitors} visitors`));
  }
  box.append(head);

  // activity: one flat card with stat cells, not a row of boxed tiles
  const statsCard=el("div",{class:"card",style:"margin:0 0 20px;padding-top:18px;padding-bottom:18px"});
  statsCard.append(cohortStatRow(st));
  box.append(statsCard);
  const tlSlot=el("div");box.append(tlSlot);
  timelineCard().then(cd=>tlSlot.append(cd));   // unaffected by filters; data cached client-side

  // ordinal field (age) -> columns on tracks
  const colChart=(field,entries)=>{
    const m=Math.max(1,...entries.map(([,c])=>c)),sel=_coFilter[field]||[];
    const w=el("div",{class:"colchart"});
    for(const [val,cnt] of entries){
      const on=sel.includes(val),dim=sel.length&&!on;
      w.append(el("button",{class:"col","data-val":cnt?String(val):"",
        title:`${lab(field,val)}: ${cnt} visitor${cnt===1?"":"s"}`,style:cnt?"":"cursor:default"},
        el("span",{class:"cnt num"},cnt||""),
        el("div",{class:"track"},el("div",{class:"bar"+(on?" on":""),style:`height:${cnt?Math.max(10,Math.round(100*cnt/m)):0}%;${dim?"opacity:.35":""}`})),
        el("span",{class:"lbl"+(on?" on":"")},lab(field,val))));
    }
    attachDragSelect(w,field,".col");
    return w;
  };
  // few categories (gender) -> donut + clickable legend; colors follow the entity's
  // stable (alphabetical) position, so filtering never repaints survivors
  const pieChart=(field,entries)=>{
    const tot=entries.reduce((s,[,c])=>s+c,0)||1,sel=_coFilter[field]||[];
    const R=34,SW=16,C=48;
    let a0=-Math.PI/2,paths="";
    const nSegs=entries.filter(([,c])=>c>0).length;
    entries.forEach(([val,cnt],i)=>{
      if(!cnt)return;
      const cc=CAT[i%CAT.length],frac=cnt/tot,on=sel.includes(val),dim=sel.length&&!on;
      const tip=`${lab(field,val)}: ${cnt} · ${Math.round(100*frac)}%`;
      if(frac>=0.999){
        paths+=`<circle cx="${C}" cy="${C}" r="${R}" fill="none" stroke="${cc}" stroke-width="${SW}" style="cursor:pointer" data-val="${val}"><title>${tip}</title></circle>`;
      }else{
        const gap=nSegs>1?0.055:0,a1=a0+frac*2*Math.PI,s0=a0+gap/2,s1=a1-gap/2;
        const large=(s1-s0)>Math.PI?1:0;
        const x0=C+R*Math.cos(s0),y0=C+R*Math.sin(s0),x1=C+R*Math.cos(s1),y1=C+R*Math.sin(s1);
        paths+=`<path d="M ${x0.toFixed(2)} ${y0.toFixed(2)} A ${R} ${R} 0 ${large} 1 ${x1.toFixed(2)} ${y1.toFixed(2)}" fill="none" stroke="${cc}" stroke-width="${SW}" stroke-linecap="butt" style="cursor:pointer;${dim?"opacity:.35":""}" data-val="${val}"><title>${tip}</title></path>`;
        a0=a1;
      }
    });
    const svgbox=el("div",{style:"flex:0 0 auto",html:`<svg viewBox="0 0 96 96" width="88" height="88">${paths}</svg>`});
    svgbox.querySelectorAll("[data-val]").forEach(pth=>pth.addEventListener("click",()=>setF(field,pth.getAttribute("data-val"))));
    const leg=el("div",{style:"display:flex;flex-direction:column;gap:3px;align-items:flex-start"});
    entries.forEach(([val,cnt],i)=>{
      if(!cnt)return;
      const cc=CAT[i%CAT.length],on=sel.includes(val);
      leg.append(el("button",{class:"legchip"+(on?" on":""),title:`${lab(field,val)}: ${cnt} visitor${cnt===1?"":"s"}`,onclick:()=>setF(field,val)},
        el("span",{class:"sw",style:`background:${cc}`}),`${lab(field,val)} · ${Math.round(100*cnt/tot)}%`));
    });
    return el("div",{class:"row",style:"gap:14px;align-items:center;flex-wrap:wrap"},svgbox,leg);
  };
  // many categories -> horizontal rows; clickable when a field is given
  const distList=(rows,field)=>{
    const m=Math.max(1,...rows.map(r=>r.count)),tot=rows.reduce((s,r)=>s+r.count,0)||1,sel=(field?_coFilter[field]:null)||[];
    const d=el("div");
    for(const r of rows){
      const on=sel.includes(r.value),dim=sel.length&&!on;
      d.append(el("div",{class:"distrow"+(field?" click":""),title:`${r.label}: ${r.count} of ${tot}`,
        "data-val":field?String(r.value):""},
        el("div",{class:"small"+(on?" b":""),style:"overflow:hidden;text-overflow:ellipsis;white-space:nowrap"+(on?";font-weight:600":"")},r.label),
        el("div",{class:"barwrap",style:"min-width:0;height:12px"},
          el("div",{class:"seg",style:`width:${100*r.count/m}%;background:${r.color||'var(--accent)'};border-radius:0 4px 4px 0;${dim?"opacity:.35":""}`})),
        el("div",{class:"small num mut",style:"text-align:right;white-space:nowrap"},`${Math.round(100*r.count/tot)}%`)));
    }
    if(field)attachDragSelect(d,field,".distrow");
    return d;
  };

  // demographics: fields side by side in one compact card. LAYOUT IS FROZEN against
  // the unfiltered baseline: field order, category rows and chart type are all taken
  // from the full cohort's distribution, and a filter only changes counts/widths —
  // categories never appear/disappear and charts never switch type, so nothing moves.
  const FIELD_ORDER=["age","gender","nationality","province","personal_connection"];
  const demo=st.demographics||{};
  if(!fl.length)_coBaseline=demo;                 // (re)capture on every unfiltered load
  const baseDemo=_coBaseline||demo;
  const dfields=FIELD_ORDER.filter(f=>baseDemo[f]).concat(Object.keys(baseDemo).filter(f=>!FIELD_ORDER.includes(f)));
  if(dfields.length){
    // same card as the stat row: one compact statistics block, table right below
    const fg=el("div",{style:"display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px 64px;align-items:start;width:100%"});
    for(const field of dfields){
      const cur=demo[field]||{};
      // baseline categories, zero-filled where the filtered slice has none
      const keys=Object.keys(baseDemo[field]);
      let entries=keys.map(k=>[k,cur[k]||0]);
      if(field==="age"){
        // ordinal by the bucket's leading number; "under_16" sorts just before 16.
        const rank=v=>{const t=String(v);if(/^under/i.test(t))return (parseInt(t.replace(/\D+/g,""),10)||18)-0.5;
          const n=parseInt(t,10);return isNaN(n)?999:n;};
        entries.sort((a,b)=>rank(a[0])-rank(b[0]));
      }else{
        // biggest slice first; ORDER COMES FROM THE BASELINE COUNTS, so applying
        // a filter never reshuffles rows (only the bars/percentages change)
        const bd=baseDemo[field]||{};
        entries.sort((a,b)=>(bd[b[0]]||0)-(bd[a[0]]||0)||String(a[0]).localeCompare(String(b[0])));
      }
      const cellEl=el("div",{},el("div",{class:"eyebrow",style:"display:block;margin:6px 0 3px"},DEMO_LABEL[field]||cap1(field.replace(/_/g," "))));
      const nz=entries.filter(([,c])=>c>0).length;   // chart type follows the filtered slice
      if(field==="age")cellEl.append(colChart(field,entries));
      else if(nz<=3)cellEl.append(pieChart(field,entries.filter(([,c])=>c>0)));
      else{
        const listEl=distList(entries.map(([val,cnt])=>({label:lab(field,val),count:cnt,value:val})),field);
        const rws=[...listEl.querySelectorAll(".distrow")];
        if(rws.length>8){                  // top 8 visible, the rest behind an explicit toggle
          rws.slice(8).forEach(r=>r.style.display="none");
          const more=`show all ${rws.length} ▾`;
          const btn=el("button",{class:"morebtn",onclick:()=>{
            const open=rws[8].style.display==="none";
            rws.slice(8).forEach(r=>r.style.display=open?"":"none");
            btn.textContent=open?"show less ▴":more;}},more);
          listEl.append(btn);
        }
        cellEl.append(listEl);
      }
      fg.append(cellEl);
    }
    statsCard.append(el("div",{style:"border-top:1px solid var(--line);margin:18px 0 14px"}),fg);
  }

  // post-visit feedback: lives INSIDE the statistics card, below demographics.
  // Two-ended range selection per question: first click anchors [s,s], a click
  // outside the range extends it, a click inside clears it.
  const setFbRange=(q,sc)=>{
    const cur=_fbFilter[q];
    if(!cur)_fbFilter[q]=[sc,sc];
    else if(sc<cur[0])_fbFilter[q]=[sc,cur[1]];
    else if(sc>cur[1])_fbFilter[q]=[cur[0],sc];
    else delete _fbFilter[q];
    refresh();
  };
  const fbInner=el("div");
  api("/api/cohort/feedback"+(qs?"?"+qs:"")).then(rows=>{
    if(!(rows||[]).length)return;
    fbInner.append(el("div",{style:"border-top:1px solid var(--line);margin:18px 0 12px"}),
      el("div",{class:"eyebrow",style:"display:block;margin:0 0 4px"},"Post-visit feedback"));
    const fgrid=el("div",{style:"max-width:560px"});
    fgrid.append(el("div",{class:"distrow",style:"grid-template-columns:minmax(95px,155px) 260px;margin:0 0 2px"},
      el("span"),
      el("div",{style:"display:flex;justify-content:space-between"},
        el("span",{class:"fbanchor"},"disagree"),el("span",{class:"fbanchor"},"agree"))));
    for(const r of rows){
      const scale=r.scale||5;
      const pct=v=>((v-1)/(scale-1))*100;
      // variance band: middle half of answers (p25..p75) shaded behind the track
      const tot=Object.values(r.dist||{}).reduce((a,b)=>a+b,0)||1;
      const pctile=q=>{let cum=0;
        for(let sc=1;sc<=scale;sc++){cum+=(r.dist||{})[String(sc)]||0;
          if(cum>=q*tot)return sc;}
        return scale;};
      const p25=pctile(.25),p75=pctile(.75);
      const fill=el("span",{class:"fill"});
      const hA=el("span",{class:"h"}),hB=el("span",{class:"h"});
      const dr=el("div",{class:"dr"+(_fbFilter[r.question]?"":" idle"),
        "data-tip":`mean ${r.avg} · shaded band = middle half of answers · click a score or drag a range`},
        el("span",{class:"track"}),
        el("span",{class:"band",style:`left:${pct(p25)}%;width:${Math.max(2,pct(p75)-pct(p25))}%`}),
        fill,
        el("span",{class:"mean",style:`left:${pct(Math.min(scale,Math.max(1,r.avg)))}%`}),
        hA,hB);
      const paintSel=(a,b)=>{
        fill.style.left=pct(a)+"%";fill.style.width=(pct(b)-pct(a))+"%";
        hA.style.left=pct(a)+"%";hB.style.left=pct(b)+"%";
      };
      const cur0=_fbFilter[r.question];
      if(cur0)paintSel(cur0[0],cur0[1]);
      const scoreAt=ev=>{const rect=dr.getBoundingClientRect();
        const t=Math.min(1,Math.max(0,(ev.clientX-rect.left)/rect.width));
        return 1+Math.round(t*(scale-1));};
      let anchor=null,curSc=null,dragging=false;
      dr.onpointerdown=ev=>{dragging=true;dr.setPointerCapture(ev.pointerId);
        dr.classList.remove("idle");anchor=scoreAt(ev);curSc=anchor;
        paintSel(anchor,anchor);};
      dr.onpointermove=ev=>{if(!dragging)return;curSc=scoreAt(ev);
        paintSel(Math.min(anchor,curSc),Math.max(anchor,curSc));};
      dr.onpointerup=()=>{if(!dragging)return;dragging=false;
        const a=Math.min(anchor,curSc),b=Math.max(anchor,curSc);
        const prev=_fbFilter[r.question];
        if(prev&&prev[0]===a&&prev[1]===b)delete _fbFilter[r.question];  // same again = clear
        else _fbFilter[r.question]=[a,b];
        refresh();};
      fgrid.append(el("div",{class:"distrow",style:"grid-template-columns:minmax(95px,155px) 260px;margin:7px 0"},
        el("div",{class:"small",style:_fbFilter[r.question]?"font-weight:600":""},cap1(r.question.replace(/_/g," "))),
        dr));
    }
    fbInner.append(fgrid);
    statsCard.append(fbInner);
  }).catch(()=>{});

  // filters active -> show WHO matches right here (the table lives in the other
  // subtab); scrollable so any cohort size fits
  if(fl.length||Object.keys(_fbFilter).length){
    const rows=[...document.querySelectorAll("#utbl .urow")].filter(tr=>tr.style.display!=="none");
    const mc=el("div",{class:"card"},cardhead(`Matching visitors (${rows.length})`));
    if(rows.length){
      const wrap=el("div",{class:"row",style:"gap:6px;flex-wrap:wrap;max-height:180px;overflow-y:auto;padding-right:4px"});
      rows.forEach(tr=>{const id=tr.getAttribute("data-uid")||tr.getAttribute("data-id");
        wrap.append(el("button",{class:"userchip",onclick:()=>openUser(id,"profile")},id));});
      mc.append(wrap);
    }else mc.append(el("div",{class:"small mut"},"No visitor in the table matches this slice."));
    box.append(mc);
  }
}

      oninput:filterUsers,onkeydown:e=>{if(e.key==="Enter"){const q=search.value.trim();if(q)openUser(q,"profile");}}});
    const icon=el("span",{class:"searchicon",html:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M20.5 20.5l-4.2-4.2"/></svg>'});

        filterUsers();
      }},label)));
    box.append(el("div",{class:"row",style:"gap:14px;align-items:center;margin-bottom:20px;flex-wrap:wrap"},
      el("div",{class:"searchwrap",style:"flex:1;min-width:280px;margin:0"},icon,search),
      segBar));
    const tbl=el("table",{id:"utbl"});

      attrs["data-s-events"]=s.n_interactions!=null?s.n_interactions:0;
      attrs["data-s-positive"]=s.n_liked||0;

      tbl.append(el("tr",attrs,
        el("td",{},el("b",{class:"vlink",title:"open visitor",onclick:()=>openUser(u,"profile")},u)),
        el("td",{},p?personaPill("Cluster "+p.cluster+(p.falk_hint?" · "+p.falk_hint:""),Object.keys(PERSONA_COLORS).find(k=>(p.falk_hint||"").startsWith(k))):""),

      el("div",{id:"unone",style:"display:none;text-align:center;color:var(--mut);padding:30px 0 12px"},"No results")));
    setTimeout(filterUsers,0);   // apply any active demographic filter once the table is in the DOM
  });

  // learned segments — lazy
  lazyFill(segSlot,"loading segments…",async box=>{

  });
}

        el("div",{class:"row",style:"justify-content:space-between"},el("h3",{class:"mont",style:"margin:0;font-size:15px"},"Cluster "+p.cluster),personaPill(p.falk_hint,Object.keys(PERSONA_COLORS).find(k=>(p.falk_hint||"").startsWith(k)))),
        el("div",{class:"barwrap",style:"margin:11px 0 7px"},el("div",{class:"seg",style:`width:${100*p.size/total}%;background:var(--accent)`})),
        el("div",{class:"small mut",style:"margin-bottom:8px"},`${p.size} visitors / breadth ${fmt(p.breadth)}`),
        el("div",{},(p.top_tags||[]).map(t=>el("span",{class:"tag"},t.label))));
      const mems=p.members||[];

// lazy-load Leaflet only when a map is actually shown (other tabs stay offline-safe)
let _leafletP=null;
function ensureLeaflet(){
  if(window.L)return Promise.resolve(window.L);
  if(_leafletP)return _leafletP;
  _leafletP=new Promise((res,rej)=>{
    const l=document.createElement("link");l.rel="stylesheet";
    l.href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css";document.head.append(l);
    const s=document.createElement("script");s.src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js";
    s.onload=()=>res(window.L);s.onerror=rej;document.head.append(s);
  });
  return _leafletP;
}
// sortable header row for a table whose rows carry data-s-<key> attributes.
// Text columns start ascending, keys in `numeric` start descending; the arrow
// slot has fixed width so toggling never shifts column widths.
function makeSortable(tbl,cols,{rowClass,numeric=[]}={}){
  let sortKey=null,sortDir=1;
  const sortBy=key=>{
    const num=numeric.includes(key);
    sortDir=sortKey===key?-sortDir:(num?-1:1);sortKey=key;
    const rows=[...tbl.querySelectorAll("."+rowClass)];
    rows.sort((a,b)=>{
      const av=a.getAttribute("data-s-"+key)||"",bv=b.getAttribute("data-s-"+key)||"";
      return sortDir*(num?(parseFloat(av)||0)-(parseFloat(bv)||0)
                         :String(av).localeCompare(String(bv),undefined,{numeric:true}));
    });
    rows.forEach(r=>tbl.append(r));
    tbl.querySelectorAll("th.sortable .arrow").forEach(sp=>sp.textContent="");
    const arr=tbl.querySelector(`th[data-key="${key}"] .arrow`);if(arr)arr.textContent=sortDir>0?"↑":"↓";

function filterUsers(){const s=$("#usearch");const q=(s&&s.value||"").toLowerCase();let shown=0;
  for(const tr of document.querySelectorAll("#utbl .urow")){
    let hit=tr.getAttribute("data-id").includes(q);
    if(hit&&_anonFilter==="identified"&&tr.getAttribute("data-anon")==="1")hit=false;
    if(hit&&_anonFilter==="anon"&&tr.getAttribute("data-anon")!=="1")hit=false;
    if(hit)for(const [f,vals] of Object.entries(_coFilter)){
      if(!vals.includes(tr.getAttribute("data-f-"+f)||"")){hit=false;break;}}
    if(hit)for(const [q,rng] of Object.entries(_fbFilter)){
      const sc=parseInt(tr.getAttribute("data-fb-"+q)||"",10);
      if(isNaN(sc)||sc<rng[0]||sc>rng[1]){hit=false;break;}}
    tr.style.display=hit?"":"none";if(hit)shown++;
  }
  const uc=$("#ucount");if(uc)uc.textContent=String(shown);   // live count in the column header
  const none=$("#unone");if(none)none.style.display=shown?"none":"";}

    el("span",{class:"pill "+(exp.is_cold?"cold":"warm")},exp.is_cold?"cold start":"warm")));
  // primary stats
  const chip=(n,l)=>el("div",{class:"statchip"},el("div",{class:"n"},String(n)),el("div",{class:"l"},l));
  hero.append(el("div",{class:"statchips"},
    chip(c.viewed||0,"viewed"),chip(c.positives||0,"engaged"),chip(c.negatives||0,"dismissed"),
    chip(pct(beh.avg_dwell_ratio),"avg dwell"),chip(pct(beh.completion_rate),"completion"),
    chip(pct(beh.depth),"depth")));
  // data-driven summary now comes from the server verbalizer (behaviour-led prose)
  if(exp.summary)hero.append(el("p",{class:"summ",style:"margin:.7rem 0 0;line-height:1.6",html:mdInline(exp.summary)}));
  v.append(hero);

  // ===== two-column body: identity (left) · behaviour (right) =====
  const left=el("div"),right=el("div");

  // ===== LEFT: one card — demographics, then personalization answers below;
  //            survey completion shown as pills in the header. =====
  const KEYLABEL={personal_connection:"WW2 connection"};
  const kvList=(obj,capVal,stripQ)=>{const dl=el("dl",{class:"kv"});
    const n=Object.keys(obj||{}).length;
    if(n>3)dl.style.gridTemplateColumns="max-content 1fr max-content 1fr";  // full-width card: 2 pairs per row
    const rating=a=>el("span",{style:"display:inline-flex;align-items:center;gap:9px"},
      el("span",{class:"barwrap",style:"width:74px;min-width:74px;height:8px"},
        el("span",{class:"seg",style:`width:${Math.round(100*a.score/(a.scale||5))}%;background:var(--accent)`})),
      el("span",{class:"small num"},`${a.score}/${a.scale||5}`),
      el("span",{class:"small mut"},a.label||""));
    Object.entries(obj||{}).forEach(([k,a])=>dl.append(
      el("dt",{title:k},cap1((stripQ?k.replace(/^(q:)?(personalization_)?/,""):KEYLABEL[k]||k).replace(/_/g," "))),
      el("dd",{},(a&&typeof a==="object"&&!Array.isArray(a)&&a.score!=null)?rating(a)
        :Array.isArray(a)?a.join(", "):(capVal?humanVal(k,a):String(a)))));
    return dl;};
  const spill=(label,done)=>el("span",{class:"statusbadge "+(done?"done":"pending"),title:done?"survey completed":"survey not completed"},
    el("span",{class:"dot"}),label+(done?" ✓":""));
  const pc=el("div",{class:"card"});
  pc.append(el("div",{class:"cardhead-row"},
    el("div",{class:"cardhead",style:"margin:0"},"Visitor profile"),
    el("div",{class:"row",style:"gap:6px;flex-wrap:wrap"},
      spill("Pre-survey",surv.completed_demographic),
      spill("Personalization",surv.completed_personalization))));
  // demographics
  const demoPairs=Object.entries(demo).filter(([,x])=>x!=null&&x!=="");
  pc.append(el("div",{class:"eyebrow",style:"display:block;margin-bottom:6px"},"Demographics"));
  pc.append(demoPairs.length?kvList(Object.fromEntries(demoPairs),true,false):el("div",{class:"small mut"},"no answers recorded"));
  // personalization (below demographics, same card) — hidden entirely when empty
  if(surv.personalization&&Object.keys(surv.personalization).length){
    pc.append(el("div",{class:"eyebrow",style:"display:block;margin:15px 0 6px"},"Personalization"));
    pc.append(kvList(surv.personalization,true,true));
  }
  // background + post-visit feedback: collapsible so the card stays short
  const foldSection=(label,obj)=>{
    if(!obj||!Object.keys(obj).length)return;
    const n=Object.keys(obj).length;
    const det=el("details",{class:"members",style:"margin-top:13px"});
    det.append(el("summary",{},`${label} (${n})`));
    const inner=el("div",{style:"margin-top:8px"});inner.append(kvList(obj,false,true));
    det.append(inner);pc.append(det);
  };
  foldSection("Visit background",surv.background||null);
  foldSection("Post-visit feedback",surv.feedback||null);
  if(!surv.background&&!surv.feedback&&surv.other&&Object.keys(surv.other).length)
    foldSection("Other answers",surv.other);   // old server fallback
  v.append(pc);   // profile spans the full width; model/behaviour grid follows below

  // ----- RIGHT: dynamic user model -----
  const dm=el("div",{class:"card"},cardhead("Dynamic user model"));
  let dmEmpty=true;
  if(model.tag_affinity&&model.tag_affinity.length){
    dm.append(el("div",{class:"eyebrow",style:"display:block;margin-bottom:7px"},"Leans toward"));
    dm.append(tagList(model.tag_affinity.map(t=>[t.key,t.weight])));dmEmpty=false;
  }
  if(model.tag_aversion&&model.tag_aversion.length){
    dm.append(el("div",{class:"eyebrow",style:"display:block;margin:16px 0 7px"},"Avoids"));
    dm.append(tagList(model.tag_aversion.map(t=>[t.key,t.weight]),{signed:true}));dmEmpty=false;
  }
  if(dmEmpty)dm.append(el("div",{class:"small mut"},"No tag signal yet: visitor has not engaged with content."));
  right.append(dm);
  // ----- RIGHT: trajectory -----
  if(exp.trajectory&&exp.trajectory.length)right.append(el("div",{class:"card"},cardhead("Trajectory"),
    el("div",{class:"small"},exp.trajectory.join("   →   "))));

  // profile card already spans full width above; model/evidence cards follow full-width
  v.append(right);
}

async function renderHistory(v){
  let h;try{h=await api(`/api/usermodel/history?user_id=${encodeURIComponent($("#uid").value)}`);}catch(e){failCard(v,e);return;}
  if(!h||!h.event_count){v.append(el("div",{class:"empty"},"No activity for ",el("b",{},$("#uid").value),". Ingest events for this user first."));return;}
  const dwell=d=>d!=null?Math.round(d)+"s":"";
  const dur=s=>{if(s==null)return "";s=Math.round(s);return s>=3600?`${Math.floor(s/3600)}h ${Math.floor(s%3600/60)}m`:s>=60?`${Math.floor(s/60)}m ${s%60}s`:s+"s"};



  // ----- session blocks widget: sessions as blocks, click to expand a scrollable
  //       lane of what happened inside (panels / collections / content / surveys) -----
  (()=>{
    const evsAsc=[...h.events].reverse();          // server sends newest-first
    const T={PANEL:"var(--c-recency)",COLLECTION:"var(--c-geo)",CONTENT:"var(--c-affinity)",SURVEY:"var(--c-tag)",POI:"var(--c-semantic)"};
    const spans=[];const open={};
    for(const e of evsAsc){
      const ev=e.event||"";
      const kind=ev.startsWith("PANEL_VIEW")?"PANEL":ev.startsWith("COLLECTION_VIEW")?"COLLECTION"
                :ev.startsWith("CONTENT_VIEW")?"CONTENT":ev.startsWith("SURVEY")?"SURVEY":null;
      if(!kind)continue;
      const prettyLoc=t=>String(t).replace(/^(poi:)?AiARLocation/,"").replace(/(?<=[a-z])(?=[A-Z0-9])/g," ");
      const label=kind==="CONTENT"?(e.title||e.content_id||"content")
                 :kind==="PANEL"?((e.meta&&(e.meta.panel_name||e.meta.panel_id))||"panel")
                 :kind==="COLLECTION"?prettyLoc((e.meta&&(e.meta.collection_name||e.meta.collection_id))||"collection")
                 :((e.meta&&(e.meta.survey_id||e.meta.survey))||"survey");
      const key=kind+"|"+label;
      if(ev.endsWith("_STARTED")||ev==="SURVEY_PRESENTED"){open[key]={kind,label,start:e.ts,e};}
      else if(ev.endsWith("_ENDED")||ev==="SURVEY_SUBMITTED"||ev==="SURVEY_DISMISSED"){
        const o=open[key]||{kind,label,start:null,e};delete open[key];
        const dur=(o.start&&e.ts)?(new Date(e.ts)-new Date(o.start))/1000:null;
        const outcome=(e.meta&&e.meta.reason)||e.end_reason
          ||(ev==="SURVEY_SUBMITTED"?"submitted":ev==="SURVEY_DISMISSED"?"dismissed":null);
        spans.push({...o,end:e.ts,dur,ended:ev,outcome,content_id:e.content_id||o.e.content_id});
      }
    }
    // map picks (which POI was selected) attach to the panel/span they happened
    // in; only orphan picks become their own blocks
    const picks=evsAsc.filter(e=>e.meta&&e.meta.clicked_label)
      .map(e=>({ts:e.ts,label:e.meta.clicked_label}));
    const claimed=new Set();
    for(const sp of spans){
      if(!sp.start)continue;
      const endPlus=sp.end?new Date(new Date(sp.end).getTime()+5000).toISOString():null;
      const hitIx=picks.findIndex((pk,ix)=>!claimed.has(ix)&&pk.ts>=sp.start&&(!endPlus||pk.ts<=endPlus));
      if(hitIx>=0){sp.pick=picks[hitIx].label;claimed.add(hitIx);}
    }
    picks.forEach((pk,ix)=>{if(!claimed.has(ix))
      spans.push({kind:"POI",label:pk.label,start:pk.ts,end:pk.ts,dur:null});});
    spans.sort((a,b)=>String(a.start||"").localeCompare(String(b.start||"")));
    Object.values(open).forEach(o=>spans.push({...o,end:null,dur:null,ended:null,content_id:o.e.content_id}));
    const dur2=s2=>{if(s2==null)return "";s2=Math.round(s2);
      if(s2>=3600)return `${Math.floor(s2/3600)}h ${Math.floor(s2%3600/60)}m`;
      return s2>=60?`${Math.floor(s2/60)}m ${s2%60}s`:s2+"s"};
    const wrap=el("div");
    const lane=el("div",{class:"sesslane"});
    (h.sessions||[]).slice().reverse().forEach((sess,ix)=>{
      if(sess.kind==="survey"){
        // pre/post questionnaire: its own distinct block, not a "session"
        const ok=sess.ended==="SURVEY_SUBMITTED";
        const ICO_OK='<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="var(--c-affinity)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><polyline points="8.5 12.5 11 15 15.5 9.5"/></svg>';
        const ICO_NO='<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="var(--mut)" stroke-width="2.2" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><path d="M9 9l6 6M15 9l-6 6"/></svg>';
        const svBlk=el("button",{class:"sessblk surveyblk"},
          el("div",{class:"row",style:"justify-content:space-between;align-items:center;gap:8px"},
            el("div",{class:"t",style:"margin:0"},cap1(sess.session_id||"survey")),
            el("span",{style:"line-height:0","data-tip":ok?"submitted":"dismissed",html:ok?ICO_OK:ICO_NO})),
          el("div",{class:"small mut num"},(sess.start||"").replace("T"," ").slice(5,16)),
          el("div",{class:"small mut"},dur2(sess.duration_seconds)));
        // expand: the survey's own events (presented / answered per page / outcome)
        const svDetail=el("div",{class:"sessdetail",style:"display:none"});
        const svLane=el("div",{class:"spanlane"});
        const inBlk=e=>e.ts&&sess.start&&sess.end&&e.ts>=sess.start&&e.ts<=sess.end;
        evsAsc.filter(e=>inBlk(e)&&(e.event||"").startsWith("SURVEY")).forEach(e=>{
          const m=e.meta||{};
          const kindLbl=e.event==="SURVEY_PRESENTED"?"presented"
                      :e.event==="SURVEY_ANSWERED"?("answered"+(m.current_page!=null?` · page ${m.current_page}`:""))
                      :e.event==="SURVEY_SUBMITTED"?"submitted":"dismissed";
          const nAns=m.answers?Object.keys(m.answers).length:0;
          svLane.append(el("div",{class:"spanblk",style:"--sb:var(--c-tag)",
            "data-tip":`${(e.ts||"").replace("T"," ").slice(11,19)}${nAns?` · ${nAns} answer${nAns===1?"":"s"}`:""}`},
            el("div",{class:"k",style:"color:var(--c-tag)"},"survey"),
            el("div",{class:"l"},kindLbl),
            el("div",{class:"small mut num"},(e.ts||"").slice(11,19))));
        });
        svDetail.append(svLane);
        svBlk.onclick=()=>{const openNow=svDetail.style.display==="none";
          wrap.querySelectorAll(".sessdetail").forEach(d2=>d2.style.display="none");
          wrap.querySelectorAll(".sessblk").forEach(b2=>b2.classList.remove("on"));
          svDetail.style.display=openNow?"":"none";svBlk.classList.toggle("on",openNow);};
        lane.append(svBlk);
        wrap.append(svDetail);
        return;
      }
      const inSess=sp=>sp.start&&sess.start&&sess.end&&sp.start>=sess.start&&sp.start<=sess.end;
      const mine=spans.filter(inSess);
      const svPills=(sess.surveys||[]).map(x=>el("span",{class:"pill "+(x.ended==="SURVEY_SUBMITTED"?"warm":"neutral"),
        style:"font-size:10.5px"},(x.survey?x.survey+" ":"survey ")+dur2(x.duration_seconds)));
      const blk=el("button",{class:"sessblk"},
        el("div",{class:"t"},cap1(sess.session_id||("session "+(ix+1)))),
        el("div",{class:"small mut num"},(sess.start||"").replace("T"," ").slice(5,16)),
        el("div",{class:"small mut"},`${dur2(sess.duration_seconds)} · ${sess.n_views} views · ${sess.n_events} events`),
        svPills.length?el("div",{class:"row",style:"gap:4px;flex-wrap:wrap;margin-top:5px"},svPills):"");
      const detail=el("div",{class:"sessdetail",style:"display:none"});
      const inner=el("div",{class:"spanlane"});
      const subWrap=el("div");                       // third level: a collection's content
      const colls=mine.filter(sp=>sp.kind==="COLLECTION");
      const inColl=(sp,cl)=>sp.start&&cl.start&&sp.start>=cl.start&&(!cl.end||sp.start<=cl.end);
      const mkBlk=sp=>{
        const tip=`${sp.kind.toLowerCase()} · ${(sp.start||"").replace("T"," ").slice(11,19)}`
          +(sp.dur!=null?" · "+dur2(sp.dur):"")
          +(sp.outcome?" · "+String(sp.outcome).replace(/_/g," "):"");
        const b=el("div",{class:"spanblk",style:`--sb:${T[sp.kind]}`,"data-tip":tip},
          el("div",{class:"k",style:`color:${T[sp.kind]}`},sp.kind==="POI"?"poi selected":sp.kind.toLowerCase()),
          el("div",{class:"l"},sp.label),
          el("div",{class:"small mut num"},sp.dur!=null?dur2(sp.dur):""),
          sp.pick?el("div",{class:"pick"},sp.pick):"");
        if(sp.kind==="CONTENT"&&sp.content_id){b.style.cursor="pointer";
          b.onclick=()=>openContentDetail(sp.content_id);b.title="open content card";}
        return b;
      };
      if(!mine.length)inner.append(el("span",{class:"small mut",style:"padding:8px"},"no panel / content activity recorded"));
      mine.forEach(sp=>{
        // content nests under the collection it was opened from — only orphans stay here
        if(sp.kind==="CONTENT"&&colls.some(cl=>inColl(sp,cl)))return;
        const b=mkBlk(sp);
        if(sp.kind==="COLLECTION"){
          const kids=mine.filter(sp2=>sp2.kind==="CONTENT"&&inColl(sp2,sp));
          if(kids.length){
            b.append(el("span",{class:"pill neutral",style:"font-size:10.5px;margin-top:4px;display:inline-block"},`${kids.length} stor${kids.length===1?"y":"ies"}`));
            b.style.cursor="pointer";
            const innerLane=el("div",{class:"spanlane",style:"padding-bottom:4px"});
            kids.forEach(k2=>innerLane.append(mkBlk(k2)));
            const sub=el("div",{class:"subpanel",style:"display:none"},
              el("div",{class:"subhead"},"inside ",sp.label),innerLane);
            subWrap.append(sub);
            b.onclick=()=>{const openNow=sub.style.display==="none";
              subWrap.querySelectorAll(":scope > .subpanel").forEach(d3=>d3.style.display="none");
              inner.querySelectorAll(".spanblk").forEach(x=>x.classList.remove("on"));
              sub.style.display=openNow?"":"none";b.classList.toggle("on",openNow);};
          }
        }
        inner.append(b);
      });
      detail.append(inner,subWrap);
      blk.onclick=()=>{const openNow=detail.style.display==="none";
        wrap.querySelectorAll(".sessdetail").forEach(d2=>d2.style.display="none");
        wrap.querySelectorAll(".sessblk").forEach(b2=>b2.classList.remove("on"));
        detail.style.display=openNow?"":"none";blk.classList.toggle("on",openNow);};
      const cell=el("div",{style:"display:flex;flex-direction:column"},blk);
      lane.append(cell);
      wrap.append(detail);
    });
    const card=el("div",{class:"card"},cardhead("Sessions"),lane,wrap);
    v.append(card);
  })();

  const at=el("table");
  at.append(el("tr",{},el("th",{},"content"),el("th",{},"visits"),el("th",{},"dwell"),el("th",{},"end reason"),el("th",{},"outcome")));
  for(const a of h.aggregates){const oc=a.outcome==="positive"?"warm":a.outcome==="negative"?"distractor":"neutral";
    at.append(el("tr",{},
      el("td",{},el("div",{class:"vlink",title:"open content card",onclick:()=>openContentDetail(a.content_id)},a.title||a.content_id),
        a.title?el("div",{class:"small mut num"},a.content_id):""),
      el("td",{class:"num"},a.visits),el("td",{class:"num"},dwell(a.dwell_seconds)),
      el("td",{class:"small mut"},a.end_reason||""),el("td",{},el("span",{class:"pill "+oc},a.outcome))));}
  v.append(el("div",{class:"card"},cardhead("Engaged content"),at));

  // ----- timeline: click a row to expand its full metadata (survey/panel ids …) -----
  const et=el("table");
  et.append(el("tr",{},el("th",{style:"width:18px"},""),el("th",{},"time"),el("th",{},"event"),el("th",{},"content"),el("th",{},"dwell"),el("th",{},"reason")));
  for(const e of h.events){
    const meta={...(e.meta||{})};
    if(e.session_id)meta.session_id=e.session_id;
    if(e.request_id)meta.request_id=e.request_id;
    const hasMeta=Object.keys(meta).length>0;
    const caret=el("span",{class:"small mut",style:"display:inline-block;transition:transform .12s"},hasMeta?"▸":"");
    const row=el("tr",{style:hasMeta?"cursor:pointer":""},
      el("td",{},caret),
      el("td",{class:"small mut num"},(e.ts||"").replace("T"," ").slice(0,19)),
      el("td",{class:"small"},(e.event||"").replace("CONTENT_","").replace(/_/g," ").toLowerCase()),
      el("td",{class:"small"},e.content_id
        ?el("span",{class:"vlink",title:"open content card",onclick:ev=>{ev.stopPropagation();openContentDetail(e.content_id);}},e.title||e.content_id)
        :""),
      el("td",{class:"num small"},e.dwell_seconds!=null?Math.round(e.dwell_seconds)+"s":""),
      el("td",{class:"small mut"},e.end_reason||""));
    et.append(row);
    if(hasMeta){
      const chips=Object.entries(meta).map(([k,val])=>el("span",{class:"tchip",style:"margin:2px"},
        el("span",{class:"fb"},k),
        el("span",{},typeof val==="object"?JSON.stringify(val):String(val))));
      const detail=el("tr",{style:"display:none"},
        el("td",{}),
        el("td",{colspan:"5",style:"padding-top:4px;padding-bottom:10px"},
          el("div",{class:"row",style:"gap:2px;flex-wrap:wrap"},chips)));
      et.append(detail);
      row.onclick=()=>{const open=detail.style.display==="none";
        detail.style.display=open?"":"none";caret.style.transform=open?"rotate(90deg)":"";};
    }
  }
  const rawDet=el("details",{style:"margin:2px 0 20px"},
    el("summary",{class:"rawlink"},`Raw event timeline (${h.event_count})`));
  const rawBox=el("div",{class:"card",style:"margin-top:10px"});rawBox.append(et);rawDet.append(rawBox);
  v.append(rawDet);
}

const DOCS_BASE="https://ai-engine-docs.eodyne.systems/";
async function renderPersonas(v){
  const docLink=url=>el("a",{class:"srclink",href:DOCS_BASE+url,target:"_blank",rel:"noopener",style:"margin-left:8px"},"docs ↗");
  const section=(title,lead,url)=>v.append(
    el("div",{class:"eyebrow",style:"display:block;margin:20px 0 4px"},title),
    el("div",{class:"small mut",style:"margin:0 0 10px"},lead,url?docLink(url):""));

  // 1. scoring signals: one tile per signal, keyed to the legend colours used everywhere
  section("Scoring signals","Each candidate story is scored 0 to 1 on five independent signals; the colours match every score-breakdown bar in this dashboard.","recsys/signals/");
  const sg=el("div",{class:"methodgrid"});
  METHODS["Scoring signals (each scored 0 to 1)"].forEach(([name,desc,key])=>sg.append(
    el("div",{class:"methodcard",style:`border-top-color:${COLORS[key]||'var(--accent)'}`},
      el("h4",{},el("span",{class:"sw",style:`background:${COLORS[key]||'var(--accent)'}`}),cap1(name)),
      el("p",{},desc))));
  v.append(sg);

  // 2. ranking pipeline: ordered steps, because order is the point
  section("Ranking pipeline","The signals fuse into one explainable score, then the list is shaped for diversity and exploration, in this order.","recsys/ranking/");
  const RANK_DOCS={"contextual bandit":"recsys/bandit-learning/"};
  const steps=el("div",{class:"steps"});
  METHODS["Ranking & exploration"].forEach(([name,desc],i)=>steps.append(

        eye.onclick=()=>{const show=inp.type==="password";inp.type=show?"text":"password";
          eye.classList.toggle("off",!show);eye.title=show?"hide key":"show key";};
        return el("div",{class:"keywrap"},inp,eye);
      })()),
    el("div",{class:"mfoot"},status,
      el("button",{class:"ghost",onclick:copy},"Copy"),
      el("button",{class:"primary",onclick:()=>ov.remove()},"Done"))));
  document.body.append(ov);
}

/* ===== ADMIN: runtime config — categorized + explained ===== */
const CFG_CATS=[
  {title:"Fusion weights",desc:"How much each scorer contributes to the final relevance score (each scorer outputs 0–1; aversion is a penalty).",
   fields:["fusion.semantic","fusion.tag","fusion.recency","fusion.aversion","fusion.geo"]},
  {title:"Engagement signals",desc:"After each story, the engine scores how much the visitor liked it on a −1 (disliked) … +1 (loved) scale. These four weights decide how much each behaviour counts; they should add up to about 1. The two cut-offs below turn that score into a like / neutral / dislike.",
   fields:["engagement.dwell","engagement.completion","engagement.revisit","engagement.survey","positive_threshold","negative_threshold","dwell_cap_ratio"]},
  {title:"Reading-time model",desc:"Estimates expected reading time, which dwell is measured against.",
   fields:["reading_speed_wps","img_extra_time"]},
  {title:"Recency & decay",desc:"How fast old signals fade, and the penalty for ignored impressions.",
   fields:["half_life_days","soft_negative_weight"]},
  {title:"Candidate generation & diversity",desc:"Pool size, how many results, and how varied they are.",
   fields:["pool_per_generator","final_limit","mmr_lambda","cold_start_min_positives","filter_reshow_when_exhausted"]},
  {title:"Geo",desc:"Location proximity scoring and radius, independent of tag filters.",
   fields:["geo_scale_m","geo_radius_m"]},
  {title:"Distractor / novelty",desc:"One deliberately off-profile item for exploration and serendipity.",
   fields:["distractor_enabled","distractor_strategy","distractor_probability","distractor_slots"]},
  {title:"Ranking policy",desc:"Static weighted fusion, or a learned LinUCB bandit whose prior is the fusion weights.",
   fields:["ranking_mode","bandit_alpha","bandit_ridge","bandit_explore","bandit_online"]},
];
const CFG_HELP={
  "fusion.semantic":["Semantic","Similarity to the visitor's whole-history taste centroid."],
  "fusion.tag":["Tag","Affinity-weighted overlap of visitor tags with the item's expert tags."],
  "fusion.recency":["Recency","Similarity to the most-recent view (sequence awareness)."],
  "fusion.aversion":["Aversion","Penalty (negative) for overlap with abandoned themes."],
  "fusion.geo":["Geo","Proximity to the request location; scored only when one is given."],
  "engagement.dwell":["Time spent reading","How much the time-on-story counts. Spending the full expected reading time signals real interest."],
  "engagement.completion":["Read to the end","How much finishing counts. Tapping “next” is positive; leaving early / abandoning is negative."],
  "engagement.revisit":["Came back to it","How much returning to the same story counts as interest."],
  "engagement.survey":["Star rating","How much an explicit 1–5 rating counts (3 = neutral, 5 = loved)."],
  "positive_threshold":["“Liked it” cut-off","Score at or above this is treated as a like: the story’s themes are added to the visitor’s taste."],
  "negative_threshold":["“Disliked it” cut-off","Score at or below this is treated as a dislike: those themes get penalised in future picks."],
  "dwell_cap_ratio":["Max reading credit","Caps how much extra time can count, so one very long visit can’t dominate (2 = up to twice the expected time)."],
  "reading_speed_wps":["Reading speed (wps)","Words per second for the estimate (~4.2 ≈ 250 wpm)."],
  "img_extra_time":["Image time (s)","Seconds added to the estimate for an image."],
  "half_life_days":["Half-life (days)","Exponential decay of a signal's weight over time."],
  "soft_negative_weight":["Soft-negative","Penalty for content shown but not viewed (impressions)."],
  "pool_per_generator":["Pool / generator","Candidates each generator contributes before ranking."],
  "final_limit":["Result count","How many items the final ranking returns."],
  "mmr_lambda":["MMR λ","Relevance (1) vs diversity (0) in the diversity re-rank."],
  "cold_start_min_positives":["Cold-start min likes","Positives needed before a visitor is treated as warm."],
  "filter_reshow_when_exhausted":["Reshow when exhausted","Within a filter/location, re-show seen content rather than return empty."],
  "geo_scale_m":["Geo scale (m)","Distance falloff exp(−d/scale); ~camp-sized."],
  "geo_radius_m":["Geo radius (m)","Default radius when a geo filter is requested."],
  "distractor_enabled":["Enabled","Inject one off-profile novelty item."],
  "distractor_strategy":["Strategy","How the novelty item is chosen."],
  "distractor_probability":["Probability","1.0 = every request; 0.5 = every other."],
  "distractor_slots":["Slots","1-based positions; one picked at random (e.g. [3,4])."],
  "ranking_mode":["Mode","static = weighted fusion; bandit = learned LinUCB."],
  "bandit_alpha":["Alpha","UCB exploration strength (0 = greedy)."],
  "bandit_ridge":["Ridge","Prior strength: how tightly θ holds the fusion weights."],
  "bandit_explore":["Explore","Add the UCB bonus when serving with the bandit."],
  "bandit_online":["Online","Update weights live as reward events arrive (vs offline batch)."],
};
const CFG_TAB={"Fusion weights":"Fusion","Engagement signals":"Engagement","Reading-time model":"Reading","Recency & decay":"Recency","Candidate generation & diversity":"Candidates","Geo":"Geo","Distractor / novelty":"Distractor","Ranking policy":"Ranking"};
const CFG_ENUMS={distractor_strategy:["max_dissimilar","unexplored_theme","random"],ranking_mode:["static","bandit"]};
function _cfgCtl(path,val){
  let inp;
  // fusion weights edit as colored bars (same colors as the policy weights table):
  // read-only = a filled bar, edit mode = a draggable slider with live value
  if(path.startsWith("fusion.")&&typeof val==="number"){
    const f=path.slice(7),c=COLORS[f]||"var(--accent)",neg=f==="aversion";
    const wrap=el("div",{class:"wslider"});
    inp=el("input",{type:"range",min:neg?-1:0,max:neg?0:1,step:"0.01",value:String(val)});
    inp.dataset.t="num";inp.dataset.path=path;
    const out=el("span",{class:"wval num"},Number(val).toFixed(2));
    const paintFill=()=>{const v=Number(inp.value),pct=Math.round(100*Math.abs(v));
      inp.style.background=`linear-gradient(to ${neg?"left":"right"},${c} 0 ${pct}%,var(--track) ${pct}% 100%)`;
      inp.style.setProperty("--wc",c);out.textContent=Number(v).toFixed(2);};
    inp.oninput=paintFill;paintFill();
    wrap.append(inp,out);return wrap;
  }
  if(CFG_ENUMS[path]){inp=el("select",{class:"f"});CFG_ENUMS[path].forEach(o=>{const op=el("option",{value:o},o);if(o===val)op.selected=true;inp.append(op);});inp.dataset.t="str";}
  else if(typeof val==="boolean"){inp=el("input",{type:"checkbox"});inp.checked=val;inp.dataset.t="bool";}
  else if(typeof val==="number"){inp=el("input",{class:"f",type:"number",step:Number.isInteger(val)?"1":"any",value:String(val)});inp.dataset.t="num";}
  else if(Array.isArray(val)||(val&&typeof val==="object")){inp=el("input",{class:"f",value:JSON.stringify(val)});inp.dataset.t="json";}
  else{inp=el("input",{class:"f",value:val??""});inp.dataset.t="str";}
  inp.dataset.path=path;return inp;
}
function cfgRow(path,val){
  const m=CFG_HELP[path]||[path,""];
  return el("div",{class:"cfgrow"},
    el("div",{},el("div",{class:"cfglabel"},m[0]),
      m[1]?el("div",{class:"cfghelp"},m[1]):"",
      el("div",{class:"cfgpath"},path)),
    el("div",{class:"cfgctl"},_cfgCtl(path,val)));
}
// download the tenant's full parquet event log as tar.gz (fetch carries the key header)
async function exportEvents(btn){
  const old=btn.textContent;btn.textContent="preparing…";btn.disabled=true;
  try{
    const r=await fetch(base()+"/api/export/events",{headers:headers()});
    if(!r.ok)throw new Error(r.status+" "+r.statusText);
    const blob=await r.blob();
    const a=el("a",{href:URL.createObjectURL(blob),download:`event-log-${new Date().toISOString().slice(0,10)}.tar.gz`});
    document.body.append(a);a.click();a.remove();
  }catch(e){alert("export failed: "+e);}
  btn.textContent=old;btn.disabled=false;
}
// rebuild visitor models from the durable parquet log (recovery after a redis wipe)
async function replayEvents(btn){
  if(!await confirmModal({title:"Rebuild visitor models",
    body:"Replay the event log back into the live visitor models? Safe to re-run; takes a moment.",
    action:"Rebuild"}))return;
  const old=btn.textContent;btn.textContent="replaying…";btn.disabled=true;
  try{
    const r=await postJSON("/api/replay-events",{});
    alert(`replayed ${r.events} events for ${r.visitors} visitors (${r.files} files, ${r.skipped} skipped)`);
    paint();
  }catch(e){alert("replay failed: "+e);btn.textContent=old;btn.disabled=false;}
}
async function renderConfig(v){
  let cfg; try{cfg=await api("/api/config");}catch(e){failCard(v,e);return;}
  const t=$("#tenant").value.trim();
  const flat={};
  for(const [k,val] of Object.entries(cfg)){
    if(val&&typeof val==="object"&&!Array.isArray(val))for(const [k2,v2] of Object.entries(val))flat[k+"."+k2]=v2;
    else flat[k]=val;
  }
  // read-only by default; Edit unlocks Cancel / Save. No card, no title — just the action.
  const ICO_EDIT='<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/></svg>';
  const actions=cfgEdit
    ? [el("button",{class:"userchip",onclick:resetConfig},"Reset to baseline"),
       el("button",{class:"ghost",onclick:()=>{cfgEdit=false;paint();}},"Cancel"),
       el("button",{class:"primary",onclick:saveConfig},"Save & apply")]
    : [el("button",{class:"btn-outline",onclick:()=>{cfgEdit=true;paint();}},
        el("span",{style:"line-height:0",html:ICO_EDIT}),"Edit")];
  v.append(el("div",{class:"row",style:"justify-content:flex-end;gap:9px;margin:0 0 10px"},
    el("span",{id:"cfgstatus",class:"small mut"},""),...actions));
  // build category panels (ALL kept in the DOM so edits survive tab switches and Save collects every field)
  const cats=[];const used=new Set();
  for(const cat of CFG_CATS){
    const present=cat.fields.filter(f=>f in flat);
    if(present.length){cats.push({title:cat.title,desc:cat.desc,fields:present});present.forEach(f=>used.add(f));}
  }
  const leftover=Object.keys(flat).filter(f=>!used.has(f));
  if(leftover.length)cats.push({title:"Other",desc:"",fields:leftover});
  if(cfgTab&&!cats.some(c=>c.title===cfgTab))cfgTab=null;
  if(!cfgTab)cfgTab=cats[0]&&cats[0].title;

  const bar=el("div",{class:"subtabs",style:"flex-wrap:wrap"});
  cats.forEach(c=>bar.append(el("button",{class:"subtab"+(c.title===cfgTab?" on":""),["data-cat"]:c.title,
    onclick:()=>{cfgTab=c.title;showCfgTab();}},CFG_TAB[c.title]||c.title)));
  v.append(bar);

  const form=el("div",{id:"cfgform"});
  cats.forEach(c=>{
    const panel=el("div",{class:"cfgpanel",["data-cat"]:c.title,style:c.title===cfgTab?"":"display:none"});
    const card=el("div",{class:"card"});
    card.append(cardhead(c.title));
    if(c.desc)card.append(el("div",{class:"small mut",style:"margin:-7px 0 6px"},c.desc));
    c.fields.forEach(f=>card.append(cfgRow(f,flat[f])));
    panel.append(card);
    // the live policy state lives with the params that shape it
    if(c.title==="Ranking policy"){
      const slot=el("div");panel.append(slot);
      lazyFill(slot,"loading live policy state…",box=>policyCards(box));
    }
    form.append(panel);
  });
  v.append(form);
  if(!cfgEdit)for(const e of form.querySelectorAll("[data-path]"))e.disabled=true;   // read-only until Edit
}
function showCfgTab(){
  for(const b of document.querySelectorAll(".subtab[data-cat]"))b.classList.toggle("on",b.getAttribute("data-cat")===cfgTab);
  for(const p of document.querySelectorAll(".cfgpanel"))p.style.display=(p.getAttribute("data-cat")===cfgTab)?"":"none";
}
function _collectConfig(){
  const patch={};
  for(const e of document.querySelectorAll("#cfgform [data-path]")){
    const parts=e.dataset.path.split("."); let val;
    if(e.dataset.t==="bool")val=e.checked;
    else if(e.dataset.t==="num")val=Number(e.value);
    else if(e.dataset.t==="json"){try{val=JSON.parse(e.value);}catch(x){throw new Error("bad JSON in "+e.dataset.path);}}
    else val=e.value;
    if(parts.length===1)patch[parts[0]]=val; else (patch[parts[0]]=patch[parts[0]]||{})[parts[1]]=val;
  }
  return patch;
}
async function saveConfig(){
  let patch; try{patch=_collectConfig();}catch(e){$("#cfgstatus").textContent=e.message;return;}
  const r=await fetch(base()+"/api/config",{method:"PUT",headers:{...headers(),"Content-Type":"application/json"},body:JSON.stringify(patch)});
  $("#cfgstatus").textContent=r.ok?"applied ✓":("error "+r.status); if(r.ok){cfgEdit=false;setTimeout(paint,400);}
}
async function resetConfig(){
  if(!await confirmModal({title:"Reset config",
    body:"Drop the runtime override and revert to the env/default baseline?",
    action:"Reset",danger:true}))return;
  const r=await fetch(base()+"/api/config/reset",{method:"POST",headers:headers()});
  $("#cfgstatus").textContent=r.ok?"reset ✓":("error "+r.status); if(r.ok){cfgEdit=false;setTimeout(paint,400);}
}

/* ===== sidebar nav ===== */
function buildNav(){const nav=$("#tabs");nav.innerHTML="";
  // flat list, no category labels
  GROUPS.forEach(g=>{
    for(const name of Object.keys(g.tabs)){
      const ic=ICONS[ICON_OF[name]]||"";
      const b=el("button",{class:"navitem",title:name,onclick:()=>setTab(name)},
        el("span",{class:"ico",html:`<svg viewBox="0 0 24 24">${ic}</svg>`}).firstChild,
        el("span",{class:"lbl"},name));
      b.dataset.t=name;nav.append(b);
    }});}

/* ===== API-key modal ===== */
const overlay=$("#overlay"),mstatus=$("#mstatus");
function openModal(){
  $("#key").value=localStorage.getItem("ins_key")||"";
  mstatus.textContent="";mstatus.className="mstatus";
  overlay.classList.add("show");setTimeout(()=>$("#key").focus(),60);
}
function closeModal(){overlay.classList.remove("show");}
async function connect(){
  const k=$("#key").value.trim(),t=$("#tenant").value.trim();
  localStorage.setItem("ins_key",k);
  mstatus.textContent="connecting…";mstatus.className="mstatus";
  let live=false;try{const r=await fetch(base()+"/health");live=r.ok;}catch(e){}
  if(!live){mstatus.textContent="cannot reach server";mstatus.className="mstatus err";setConn(false);return;}
  // if a key was given, validate it against a guarded route
  if(k){
    try{
      const r=await fetch(base()+"/api/config",{headers:{"X-API-Key":k,...(t?{"X-Tenant-Id":t}:{})}});
      if(r.status===401){mstatus.textContent="key rejected";mstatus.className="mstatus err";return;}
    }catch(e){}
  }
  mstatus.textContent="connected ✓";mstatus.className="mstatus ok";
  setConn(true);loadWhoami();
  setTimeout(()=>{closeModal();paint();},350);
}
function setConn(ok){const c=$("#conn");c.classList.toggle("ok",!!ok);c.title=ok?"connected":"not connected";}
async function ping(){try{const r=await fetch(base()+"/health");setConn(r.ok);if(r.ok){loadWhoami();
  try{const v=(await r.json()).version;if(v&&v!=="unknown")$("#appver").textContent="· v"+String(v).replace(/^v/,"");}catch(e){}
}}catch(e){setConn(false);}}
// Tenant is key-derived (never spoofable). Show the resolved name + scope in the sidebar.
async function loadWhoami(){
  try{const w=await api("/api/whoami");
    $("#tenantname").textContent=w.tenant||"default";
    const sc=w.scope==="global"?"global key":w.scope==="tenant"?"tenant key":"public";
    $("#conn").title="connected · "+sc;
  }catch(e){$("#tenantname").textContent=($("#tenant").value.trim()||"default");}
}

/* ===== routing & boot ===== */
function applyHash(){
  const h=location.hash||"";
  cfgEdit=false;                              // leaving (or re-entering) any view auto-cancels Config edits
  const um=h.match(/^#\/user\/([^/]+)(?:\/([^/]+))?/);
  const rm=h.match(/^#\/rec\/([^/]+)/);
  if(rm){recCtx=decodeURIComponent(rm[1]);userCtx=null;paint();return;}
  if(um){recCtx=null;userCtx={id:decodeURIComponent(um[1]),sub:um[2]||"profile"};$("#uid").value=userCtx.id;paint();return;}
  recCtx=null;userCtx=null;const s=h.replace(/^#\/?/,"");const n=BY_SLUG[s];
  if(n){current=n;paint();}else{setTab(current);}
}

$("#uid").value=localStorage.getItem("ins_uid")||"u1";
$("#tenant").value=localStorage.getItem("ins_tenant")||"";
$("#key").value=localStorage.getItem("ins_key")||"";
document.documentElement.dataset.theme=localStorage.getItem("ins_theme")||"light";
if(localStorage.getItem("ins_navmin")==="1")document.body.classList.add("nav-min");

for(const b of ["uid","tenant"])$("#"+b).addEventListener("change",()=>{localStorage.setItem("ins_"+b,$("#"+b).value);if(b==="tenant"){_cohortDom=null;paint();}});
$("#theme").onclick=()=>{const t=document.documentElement.dataset.theme==="dark"?"light":"dark";document.documentElement.dataset.theme=t;localStorage.setItem("ins_theme",t);};
const _navToggle=()=>{document.body.classList.toggle("nav-min");localStorage.setItem("ins_navmin",document.body.classList.contains("nav-min")?"1":"0");};
$("#navtoggle").onclick=e=>{e.stopPropagation();_navToggle();};
document.querySelector(".side-brand").onclick=()=>{if(document.body.classList.contains("nav-min"))_navToggle();};
$("#openkey").onclick=openModal;
$("#connect").onclick=connect;
$("#cancelkey").onclick=closeModal;
$("#keytoggle").onclick=()=>{const i=$("#key"),b=$("#keytoggle");const show=i.type==="password";
  i.type=show?"text":"password";b.classList.toggle("off",!show);b.title=show?"hide key":"show key";i.focus();};
$("#key").addEventListener("keydown",e=>{if(e.key==="Enter")connect();});
overlay.addEventListener("click",e=>{if(e.target===overlay)closeModal();});
window.addEventListener("hashchange",applyHash);
// MUI-style ripple on sidebar buttons: spawn a circle at the press point, sized to
// cover the button, fade it out. Delegated so rebuilt nav items keep working.
document.addEventListener("pointerdown",e=>{
  const b=e.target.closest(".navitem");if(!b)return;
  const r=b.getBoundingClientRect(),d=Math.max(r.width,r.height)*2;
  const s=el("span",{class:"ripple",style:`width:${d}px;height:${d}px;left:${e.clientX-r.left-d/2}px;top:${e.clientY-r.top-d/2}px`});
  b.append(s);s.addEventListener("animationend",()=>s.remove());
});

buildNav();ping();
// land on the requested page (deep-link) or default; show the key dialog first run.
const startSlug=(location.hash||"").replace(/^#\/?/,"");
if(BY_SLUG[startSlug])current=BY_SLUG[startSlug];
if(!location.hash)location.hash="#/"+slug(current);else applyHash();
if(!localStorage.getItem("ins_key")&&!localStorage.getItem("ins_seen")){localStorage.setItem("ins_seen","1");openModal();}
</script>
