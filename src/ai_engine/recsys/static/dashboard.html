<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>AI-Engine Dashboard, MEMORISE</title>
<!-- ai-engine favicon (Memorise) -->
<link rel="icon" href="/favicon.ico" sizes="any"/>
<link rel="icon" type="image/svg+xml" href="/static/favicon/ai-engine-search.svg"/>
<link rel="icon" type="image/svg+xml" href="/static/favicon/ai-engine-search-white.svg" media="(prefers-color-scheme: dark)"/>
<link rel="icon" type="image/png" sizes="32x32" href="/static/favicon/png-light/favicon-32.png"/>
<link rel="icon" type="image/png" sizes="16x16" href="/static/favicon/png-light/favicon-16.png"/>
<link rel="apple-touch-icon" sizes="180x180" href="/static/favicon/apple-touch-icon.png"/>
<link rel="manifest" href="/static/favicon/site.webmanifest"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;1,8..60,400&family=Roboto+Mono&display=swap');
/* MEMORISE brand, sober archival greige: warm gray + parchment, muted bronze accent. */
:root[data-theme="light"]{
  --bg:#FAF8F4; --panel:#ffffff; --line:#E0D8C9; --fg:#2B2820; --mut:#7A7464;
  --primary:#6B6457; --primary-dark:#423D34; --accent:#A8895B; --accent-t:rgba(168,137,91,.13);
  --link:#8A6F3F; --code:#F2EFE9; --track:#EDE8DE; --shadow:rgba(107,100,87,.16);
  --sidebar:#2F2B24; --sidebar-fg:#E8E1D3; --sidebar-mut:#A79C88; --sidebar-line:#ffffff12;
}
:root[data-theme="dark"]{
  --bg:#1C1B18; --panel:#26241F; --line:#3A372F; --fg:#E8E4DC; --mut:#A89F8E;
  --primary:#8A8273; --primary-dark:#26241F; --accent:#CDB78C; --accent-t:rgba(205,183,140,.14);
  --link:#CDB78C; --code:#26241F; --track:#201E1A; --shadow:rgba(0,0,0,.4);
  --sidebar:#16150F; --sidebar-fg:#E8E1D3; --sidebar-mut:#8E8472; --sidebar-line:#ffffff10;
}
:root{--serif:'Source Serif 4',Georgia,serif}
:root{--c-semantic:#4F6276;--c-affinity:#5E7355;--c-tag:#A8895B;--c-recency:#7A5C6E;--c-aversion:#9C5B4F;--c-geo:#4E7E78;--rad:12px;--side-w:248px;--side-w-min:64px}
*{box-sizing:border-box}
body{margin:0;font-family:var(--serif);font-size:14.5px;line-height:1.55;background:var(--bg);color:var(--fg);-webkit-font-smoothing:antialiased}
h1,h2,h3,.mont{font-family:Montserrat,sans-serif;font-weight:600;letter-spacing:-.015em}

/* ===== app shell ===== */
.layout{display:flex;min-height:100vh}
aside.sidebar{position:sticky;top:0;height:100vh;width:var(--side-w);flex:0 0 var(--side-w);
  background:var(--sidebar);color:var(--sidebar-fg);display:flex;flex-direction:column;
  border-right:1px solid var(--sidebar-line);transition:width .18s ease;z-index:30}
body.nav-min aside.sidebar{width:var(--side-w-min);flex-basis:var(--side-w-min)}
.side-brand{display:flex;align-items:center;gap:10px;height:58px;padding:0 16px 0 22px;flex:0 0 auto;
  border-bottom:1px solid var(--sidebar-line);white-space:nowrap;overflow:hidden}
.ring{width:24px;height:24px;flex:0 0 auto}
.ring .r{fill:none;stroke:var(--accent);stroke-width:2;transform-origin:center;animation:spin 9s linear infinite}
.ring .c{fill:var(--accent);transform-origin:center;animation:pulse 1.9s ease-in-out infinite}
@keyframes spin{to{transform:rotate(360deg)}}@keyframes pulse{0%,100%{opacity:.45}50%{opacity:1}}
.side-brand .name{font-family:Montserrat,sans-serif;font-weight:700;font-size:18px;user-select:none;-webkit-user-select:none}
.side-brand .name span{color:var(--accent)}
.side-brand .brand-logo{width:27px;height:27px;object-fit:contain;flex:0 0 auto}
body.nav-min .side-brand .name{display:none}
.side-toggle{margin-left:auto;background:transparent;border:0;color:var(--sidebar-mut);cursor:pointer;padding:5px;border-radius:7px;line-height:0}
.side-toggle:hover{background:#ffffff12;color:var(--sidebar-fg)}
.side-toggle svg{transition:transform .18s ease}
body.nav-min .side-brand{justify-content:center;padding:14px 0;cursor:pointer}
body.nav-min .side-toggle{display:none}
body.nav-min .side-brand:hover .brand-logo{opacity:.8}
body.nav-min .side-toggle{margin:0}
body.nav-min .side-toggle svg{transform:rotate(180deg)}

/* top padding tuned so the first item's top edge lines up with the page title (Qdrant-style) */
nav.side-nav{flex:1 1 auto;overflow-y:auto;padding:20px 10px 14px}
nav.side-nav::-webkit-scrollbar{width:7px}nav.side-nav::-webkit-scrollbar-thumb{background:#ffffff18;border-radius:9px}
.navitem{display:flex;align-items:center;gap:17px;width:100%;border:0;background:transparent;color:var(--sidebar-fg);
  padding:10px 12px;border-radius:9px;font-family:Montserrat,sans-serif;font-weight:500;font-size:15px;cursor:pointer;text-align:left;
  margin:2px 0;transition:.13s;white-space:nowrap;position:relative;overflow:hidden}
/* MUI-style press ripple */
.ripple{position:absolute;border-radius:50%;background:currentColor;opacity:.22;transform:scale(0);
  animation:ripple .55s ease-out forwards;pointer-events:none}
@keyframes ripple{to{transform:scale(1);opacity:0}}
.navitem svg{flex:0 0 20px;width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.8;opacity:.82}
.navitem:hover{background:#ffffff10}
.navitem.on{background:var(--accent);color:#221a0c}
[data-theme="dark"] .navitem.on{color:#1c1b18}
.navitem.on svg{opacity:1}
body.nav-min .navitem{justify-content:center;padding:10px 0}
body.nav-min .navitem .lbl{display:none}
body.nav-min .navitem.on::after{content:"";position:absolute;right:0;top:8px;bottom:8px;width:3px;border-radius:3px;background:var(--accent)}  /* right:0 — overflow:hidden (ripple) would clip anything outside */

.side-docs-wrap{flex:0 0 auto;padding:2px 10px 8px}
.side-docs{display:inline-flex;align-items:center;gap:6px;padding:6px 0 6px 12px;color:var(--sidebar-mut);
  text-decoration:none;font-family:Montserrat,sans-serif;font-weight:500;font-size:12.5px;white-space:nowrap}
.side-docs .ext{width:11px;height:11px;flex:0 0 auto}
.side-docs:hover{color:var(--sidebar-fg)}
.side-docs:hover .lbl{text-decoration:underline}
body.nav-min .side-docs{padding:6px 0;width:100%;justify-content:center}
body.nav-min .side-docs .lbl{display:none}
.side-foot{flex:0 0 auto;border-top:1px solid var(--sidebar-line);padding:13px 14px 13px 22px;display:flex;align-items:center;gap:8px}
.foot-tenant{font-family:'Roboto Mono',monospace;font-weight:400;font-size:11px;color:var(--sidebar-mut);
  letter-spacing:.01em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.side-foot .conn{margin-left:auto;flex:0 0 auto}
.conn{display:flex;align-items:center}
.conn .dot{width:9px;height:9px;border-radius:50%;background:#9C5B4F;flex:0 0 auto}
.conn.ok .dot{background:#7fae6e;box-shadow:0 0 0 3px #7fae6e30}
body.nav-min .side-foot{justify-content:center;padding:13px 0}
body.nav-min .foot-lbl,body.nav-min .foot-tenant{display:none}
body.nav-min .side-foot .conn{margin:0}
.side-version{font-family:'Roboto Mono',monospace;font-size:11px;color:var(--sidebar-mut);white-space:nowrap;flex:0 0 auto}
.side-version:empty{display:none}
body.nav-min .side-version{display:none}

/* ===== main ===== */
main{flex:1 1 auto;min-width:0}
.page{max-width:none;margin:0;padding:18px 28px 90px}
.pagehead{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin:0 0 22px;flex-wrap:wrap}
.pagehead h1{margin:0;font-size:34px;font-weight:700;color:var(--primary-dark)}
[data-theme="dark"] .pagehead h1{color:var(--fg)}
.pagehead .sub{font-size:13px;color:var(--mut);margin-top:5px;max-width:560px}
.eyebrow{font-size:11.5px;letter-spacing:.11em;text-transform:uppercase;color:var(--accent);font-weight:700}
.iconbtn{background:var(--panel);border:1px solid var(--line);color:var(--fg);border-radius:8px;padding:7px 9px;cursor:pointer;line-height:1}
.iconbtn:hover{border-color:var(--accent)}

/* top bar */
.topbar{position:sticky;top:0;z-index:25;display:flex;align-items:center;gap:12px;
  padding:14px 28px;background:var(--panel);border-bottom:1px solid var(--line)}
.tb-field{display:flex;align-items:center;gap:7px}
.tb-field label{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--mut);font-weight:700}
.tb-field input{background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:6px 9px;font:inherit;font-size:13px;color:var(--fg);width:130px}
.tb-field input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-t)}
.tb-spacer{flex:1}
/* borderless key icon (Qdrant style) */
.tb-icon{background:transparent;border:0;color:var(--mut);cursor:pointer;line-height:0;padding:6px;border-radius:8px;display:flex;align-items:center}
.tb-icon:hover{color:var(--accent);background:var(--accent-t)}
.tb-icon svg{width:19px;height:19px}
/* light/dark slider — both icons present, knob slides */
.themeswitch{position:relative;width:58px;height:28px;border-radius:999px;border:1px solid var(--line);
  background:var(--bg);cursor:pointer;padding:0;display:flex;align-items:center;justify-content:space-between;flex:0 0 auto}
.themeswitch svg{width:15px;height:15px;margin:0 7px;z-index:1}
.themeswitch .ic-sun{color:#C99A4E}.themeswitch .ic-moon{color:#8C8475}
.themeswitch .knob{position:absolute;top:2px;left:2px;width:24px;height:24px;border-radius:50%;
  background:var(--panel);box-shadow:0 1px 3px var(--shadow);transition:transform .2s ease;z-index:0}
[data-theme="dark"] .themeswitch .knob{transform:translateX(30px)}

/* visitor search + drill-down */
.searchwrap{position:relative;margin-bottom:20px}
.searchicon{position:absolute;left:15px;top:50%;transform:translateY(-50%);color:var(--mut);line-height:0;pointer-events:none}
.searchicon svg{width:22px;height:22px}
.searchbar{width:100%;background:var(--panel);border:1px solid var(--line);border-radius:10px;
  padding:11px 16px 11px 46px;font:inherit;font-size:15px;color:var(--fg)}
.searchbar:hover{border-color:var(--accent)}
.searchbar:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-t)}
.searchbar::placeholder{color:var(--mut)}
.urow:hover{background:var(--accent-t)}
.subtabs{display:flex;gap:4px;margin:0 0 18px;border-bottom:1px solid var(--line)}
.subtab{border:0;background:transparent;color:var(--mut);font-family:Montserrat,sans-serif;font-weight:500;font-size:14px;
  padding:9px 16px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:.13s}
.subtab:hover{color:var(--fg)}
/* session blocks widget */
.sesslane{display:flex;align-items:flex-start;gap:12px;overflow-x:auto;padding:2px 2px 12px}
.sesslane::-webkit-scrollbar,.spanlane::-webkit-scrollbar{height:7px}
.sesslane::-webkit-scrollbar-thumb,.spanlane::-webkit-scrollbar-thumb{background:var(--line);border-radius:9px}
.sesslane::-webkit-scrollbar-track,.spanlane::-webkit-scrollbar-track{background:transparent}
.sesslane,.spanlane{scrollbar-width:thin;scrollbar-color:var(--line) transparent}
.sessblk{flex:0 0 auto;display:flex;flex-direction:column;align-items:stretch;justify-content:flex-start;min-width:200px;min-height:96px;text-align:left;background:var(--panel);border:1px solid var(--line);
  border-radius:13px;padding:13px 16px;cursor:pointer;font-family:inherit;color:var(--fg);
  transition:border-color .15s,box-shadow .15s,transform .15s}
.sessblk:hover{border-color:var(--accent);box-shadow:0 5px 16px var(--shadow);transform:translateY(-1px)}
.sessblk.on{border-color:var(--accent);box-shadow:0 5px 16px var(--shadow)}
.sessblk.on .t{color:var(--accent)}
.sessblk .t{font-family:Montserrat,sans-serif;font-weight:600;font-size:14px;margin-bottom:3px;color:var(--primary-dark)}
.sessblk.surveyblk{cursor:pointer;font-family:inherit;color:var(--fg);background:color-mix(in srgb,var(--c-tag) 7%,var(--panel));
  box-shadow:inset 0 0 0 1px color-mix(in srgb,var(--c-tag) 30%,transparent);border-color:transparent}
.sessblk.surveyblk:hover{transform:none;box-shadow:inset 0 0 0 1.5px var(--c-tag)}
.sessblk.surveyblk.on{box-shadow:inset 0 0 0 1.5px var(--c-tag)}
.sessblk.surveyblk .t{color:var(--c-tag)}
[data-theme="dark"] .sessblk .t{color:var(--fg)}
.sessdetail{margin-top:8px;border-top:1px dashed var(--line);padding-top:8px}
.subpanel{margin:2px 0 8px;border-radius:12px;padding:10px 13px 4px;
  background:color-mix(in srgb,var(--c-geo) 6%,var(--panel));
  box-shadow:inset 0 0 0 1px color-mix(in srgb,var(--c-geo) 22%,transparent)}
.subhead{font-family:Montserrat,sans-serif;font-size:10px;font-weight:700;letter-spacing:.07em;
  text-transform:uppercase;color:var(--c-geo);margin-bottom:8px}
summary.rawlink{list-style:none;cursor:pointer;display:inline-block;font-size:12.5px;color:var(--mut)}
summary.rawlink::-webkit-details-marker{display:none}
summary.rawlink:hover{text-decoration:underline;color:var(--fg)}
.spanlane{display:flex;gap:8px;overflow-x:auto;padding:2px 2px 12px}
.spanblk{flex:0 0 auto;min-width:110px;max-width:190px;border:0;border-radius:10px;padding:8px 12px;
  background:color-mix(in srgb,var(--sb,#888) 9%,var(--panel));box-shadow:inset 0 0 0 1px color-mix(in srgb,var(--sb,#888) 28%,transparent);
  transition:box-shadow .13s,transform .13s}
.spanblk:hover{box-shadow:inset 0 0 0 1.5px var(--sb,#888),0 4px 12px var(--shadow)}
.spanblk.on{box-shadow:inset 0 0 0 1.5px var(--sb,#888)}
.spanblk .k{font-size:8.5px;letter-spacing:.09em;text-transform:uppercase;font-weight:700;opacity:.85}
.spanblk .l{font-family:Montserrat,sans-serif;font-size:12.5px;font-weight:600;margin:3px 0 2px;
  overflow-wrap:anywhere}
.spanblk .pick{font-size:11px;font-weight:600;color:var(--c-semantic);margin-top:2px;overflow-wrap:anywhere}
/* demographics as 100%-stacked clickable bars */
.stackbar{display:flex;height:26px;border-radius:7px;overflow:hidden;background:var(--track);width:100%}
.sseg{border:0;padding:0;cursor:pointer;position:relative;display:flex;align-items:center;justify-content:center;
  min-width:3px;transition:filter .12s,opacity .12s}
.sseg:hover{filter:brightness(1.13)}
.sseg.on{box-shadow:inset 0 0 0 2px var(--fg)}
.slbl{font-family:Montserrat,sans-serif;font-size:10.5px;font-weight:600;color:#fff;
  text-shadow:0 1px 2px rgba(0,0,0,.3);white-space:nowrap;overflow:hidden;padding:0 5px}
/* post-visit feedback: dual-handle range over a 1..5 track, mean = dark tick */
.fbanchor{font-size:9.5px;color:var(--mut);text-transform:uppercase;letter-spacing:.04em;padding:0 3px}
.dr{position:relative;height:24px;min-width:0}
.drnum{position:absolute;top:21px;transform:translateX(-50%);font-size:9.5px;color:var(--mut);
  font-variant-numeric:tabular-nums;pointer-events:none}
.dr .track{position:absolute;left:0;right:0;top:6px;height:12px;border-radius:7px;background:var(--track)}
.dr .fill{position:absolute;top:6px;height:12px;border-radius:7px;background:var(--accent)}
.dr .mean{position:absolute;top:2px;width:2px;height:20px;background:var(--fg);border-radius:1px;transform:translateX(-1px);opacity:.8}
.dr input[type=range]{position:absolute;left:0;right:0;top:0;width:100%;height:24px;margin:0;background:none;
  border:0;outline:none;-webkit-appearance:none;appearance:none;pointer-events:none}
.dr input[type=range]::-webkit-slider-runnable-track{-webkit-appearance:none;appearance:none;background:transparent;height:24px}
.dr input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;pointer-events:auto;width:15px;height:15px;
  margin-top:4.5px;border-radius:50%;background:var(--panel);border:2.5px solid var(--accent);box-shadow:0 1px 3px var(--shadow);cursor:grab}
.dr input[type=range]::-moz-range-track{background:transparent;height:24px}
.dr input[type=range]::-moz-range-thumb{pointer-events:auto;width:11px;height:11px;border-radius:50%;
  background:var(--panel);border:2.5px solid var(--accent);box-shadow:0 1px 3px var(--shadow);cursor:grab}
.dr{cursor:pointer;touch-action:none;user-select:none}
.dr .band{position:absolute;top:6px;height:12px;border-radius:7px;
  background:color-mix(in srgb,var(--accent) 24%,var(--track));pointer-events:none}
.dr .h{position:absolute;top:3.5px;width:15px;height:15px;border-radius:50%;background:var(--panel);
  border:2.5px solid var(--accent);box-shadow:0 1px 3px var(--shadow);transform:translateX(-50%);pointer-events:none}
/* idle = no active filter on this question: no fill, no handles */
.dr.idle .fill,.dr.idle .h{display:none}
.dragsel{outline:2px solid var(--accent);outline-offset:-2px;border-radius:7px}
/* visitors-per-day chart */
.tlchart{display:flex;align-items:flex-end;gap:2px;height:130px}
.tlcol{flex:1;min-width:0;height:100%;display:flex;align-items:flex-end;border-radius:3px}
.tlcol:hover{background:var(--accent-t)}
.tlstack{width:100%;display:flex;flex-direction:column;justify-content:flex-end;height:100%}
.tlbar{width:100%;background:var(--accent)}
.tlbar:first-child{border-radius:3px 3px 0 0}
.tlbar.anon{background:var(--track);border:1px solid var(--line);border-bottom:0}
/* rich chart tooltip (structured: date header + series rows) */
.charttip{position:fixed;z-index:120;background:var(--panel);border:1px solid var(--line);border-radius:10px;
  box-shadow:0 10px 30px var(--shadow);padding:9px 13px;pointer-events:none;display:none;min-width:180px;
  font-family:Montserrat,sans-serif}
.charttip .ct-head{font-size:11.5px;font-weight:700;color:var(--mut);margin-bottom:6px}
.charttip .ct-row{display:flex;align-items:center;gap:8px;font-size:12.5px;padding:2.5px 0;color:var(--fg)}
.charttip .ct-row b{margin-left:auto;font-variant-numeric:tabular-nums;padding-left:14px}
.ct-dot{width:8px;height:8px;border-radius:50%;flex:0 0 auto}
.tlwrap{display:flex;gap:9px}
.tlaxis{display:flex;flex-direction:column;justify-content:space-between;height:130px;min-width:26px;
  text-align:right;font-size:10.5px;color:var(--mut);font-variant-numeric:tabular-nums;line-height:1}
.tlplot{position:relative}
.tlgrid{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:space-between;pointer-events:none}
.tlgrid span{display:block;height:0;border-top:1px dashed var(--line);opacity:.6}
.tlgrid span:last-child{border-top:1px solid var(--line);opacity:1}
.tlticks{display:flex;gap:2px;margin-top:6px}
.tltick{flex:1;min-width:0;text-align:center;font-size:10.5px;color:var(--mut);white-space:nowrap;font-variant-numeric:tabular-nums}
/* snapshot table (Qdrant-style rows) */
.snaptbl td{padding-top:18px;padding-bottom:18px}
.snapico{width:36px;height:36px;border-radius:9px;background:var(--accent-t);color:var(--accent);
  display:inline-flex;align-items:center;justify-content:center;flex:0 0 auto}
.snapico svg{width:18px;height:18px}
.btn-outline{display:inline-flex;align-items:center;gap:7px;border:1.5px solid var(--accent);color:var(--accent);
  background:transparent;border-radius:9px;padding:8px 16px;font-family:Montserrat,sans-serif;
  font-size:13px;font-weight:600;cursor:pointer;line-height:1}
.btn-outline:hover{background:var(--accent-t)}
.btn-outline:disabled{opacity:.5;cursor:default}
.btn-outline.danger{border-color:var(--c-aversion);color:var(--c-aversion)}
.btn-outline.danger:hover{background:#9C5B4F14}
/* snapshot download state: mini progress bar -> check icon */
.dlstate{display:inline-flex;align-items:center;flex:0 0 auto;line-height:0}
.dlstate:empty{display:none}   /* zero footprint until a download starts */
.dlbar{display:inline-block;width:44px;height:6px;border-radius:4px;background:var(--track);overflow:hidden}
.dlfill{display:block;height:100%;width:0;background:var(--accent);transition:width .15s}
/* small segmented control (All | Identified | Anonymous) */
.segctl{display:inline-flex;align-items:stretch;border:1px solid var(--line);border-radius:10px;overflow:hidden;flex:0 0 auto;align-self:center;height:42px}
.segctl button{border:0;background:var(--panel);padding:0 16px;font-family:Montserrat,sans-serif;
  font-size:12.5px;font-weight:500;color:var(--mut);cursor:pointer;white-space:nowrap}
.segctl button+button{border-left:1px solid var(--line)}
.segctl button:hover{color:var(--fg)}
.segctl button.on{background:var(--accent-t);color:var(--accent);font-weight:600}
.subtab.on{color:var(--accent);border-bottom-color:var(--accent)}
.backlink{background:transparent;border:0;color:var(--mut);font:inherit;font-size:12px;font-weight:600;
  cursor:pointer;padding:0;margin-bottom:7px;display:block}
.backlink:hover{color:var(--accent)}

/* compact eval result rows */
.evrow{display:flex;align-items:center;gap:10px;padding:7px 9px;border:1px solid var(--line);border-radius:9px;
  margin-bottom:6px;cursor:pointer;background:var(--panel);transition:border-color .12s,background .12s}
.evrow:hover{border-color:var(--accent);background:var(--accent-t)}
.evrank{font-family:'Roboto Mono',monospace;font-size:11px;color:var(--mut);flex:0 0 auto;min-width:24px}
.evthumb{width:38px;height:38px;border-radius:7px;object-fit:cover;flex:0 0 auto;background:var(--code)}
.evthumb.ph{background:var(--code);border:1px solid var(--line)}
.evtitle{flex:1;min-width:0;font-weight:600;font-size:13.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* item detail card — memorial UI styling */
.idcard{width:min(620px,100%);max-height:90vh;overflow-y:auto;background:var(--panel);border:1px solid var(--line);
  border-radius:20px;padding:22px;display:flex;flex-direction:column;gap:13px;position:relative;box-shadow:0 30px 80px var(--shadow)}
.id-close{position:absolute;top:12px;right:14px;border:0;background:transparent;color:var(--mut);font-size:19px;cursor:pointer;line-height:1;z-index:1}
.id-close:hover{color:var(--accent)}
.id-img{width:100%;max-height:320px;object-fit:cover;border-radius:14px;border:1px solid var(--line);background:var(--code)}
.id-title{margin:0;font-size:21px;color:var(--primary-dark);padding-right:26px;line-height:1.25}
[data-theme="dark"] .id-title{color:var(--fg)}
.id-meta{display:grid;grid-template-columns:max-content 1fr;gap:5px 16px;margin:0;font-size:13px}
.id-meta dt{font-weight:700;color:var(--fg)}
.id-meta dd{margin:0;color:var(--mut);font-family:'Roboto Mono',monospace;font-size:12.5px;word-break:break-word}
.id-text{margin:0;line-height:1.65;color:var(--fg);white-space:pre-wrap}
.id-tags{display:flex;flex-wrap:wrap;gap:5px}
.id-link{align-self:flex-start;border-radius:999px;padding:9px 17px;border:1px solid var(--line);color:var(--fg);
  text-decoration:none;background:var(--code);font-weight:600;font-size:13px;font-family:Montserrat,sans-serif}
.id-link:hover{border-color:var(--accent);color:var(--accent)}

/* config page */
.cfgbar{position:sticky;top:48px;z-index:15}
.cfgrow{display:grid;grid-template-columns:1fr 210px;gap:18px;align-items:center;padding:11px 0}
.cfgrow+.cfgrow{border-top:1px solid var(--line)}
.cfglabel{font-family:Montserrat,sans-serif;font-weight:600;font-size:13.5px}
.cfghelp{font-size:12.5px;color:var(--mut);margin-top:2px;line-height:1.45}
.cfgpath{font-family:'Roboto Mono',monospace;font-size:10.5px;color:var(--mut);opacity:.55;margin-top:3px}
.cfgctl{justify-self:end;width:100%;display:flex;justify-content:flex-end;align-items:center}
.cfgctl input.f,.cfgctl select.f{width:100%;max-width:200px;font-family:'Roboto Mono',monospace;font-size:13px;
  padding:8px 12px;border-radius:9px;background:var(--bg);transition:border-color .15s,box-shadow .15s,background .15s}
.cfgctl input.f[type=number],.cfgctl input.f[data-t="num"]{text-align:right}
.cfgctl input[type=number]{-moz-appearance:textfield;appearance:textfield}
.cfgctl input[type=number]::-webkit-outer-spin-button,
.cfgctl input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.cfgctl input.f:hover:not(:disabled),.cfgctl select.f:hover:not(:disabled){border-color:var(--accent)}
.cfgctl input.f:focus,.cfgctl select.f:focus{background:var(--panel);border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-t)}
.cfgctl select.f{cursor:pointer;font-family:Montserrat,sans-serif}
.cfgctl input[type=checkbox]{width:20px;height:20px;cursor:pointer;accent-color:var(--accent)}
/* fusion-weight bar slider (edit = draggable thumb, read-only = plain bar) */
.wslider{display:flex;align-items:center;gap:10px;width:100%;max-width:200px}
.wslider input[type=range]{-webkit-appearance:none;appearance:none;flex:1;min-width:0;height:12px;border-radius:7px;
  border:0;outline:none;cursor:pointer;margin:0}
.wslider input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:17px;height:17px;border-radius:50%;
  background:var(--panel);border:2.5px solid var(--wc,var(--accent));box-shadow:0 1px 3px var(--shadow);cursor:grab}
.wslider input[type=range]::-moz-range-thumb{width:14px;height:14px;border-radius:50%;
  background:var(--panel);border:2.5px solid var(--wc,var(--accent));box-shadow:0 1px 3px var(--shadow);cursor:grab}
.wslider input[type=range]:disabled{cursor:default}
.wslider input[type=range]:disabled::-webkit-slider-thumb{opacity:0}
.wslider input[type=range]:disabled::-moz-range-thumb{opacity:0}
.wslider .wval{font-size:12.5px;width:42px;text-align:right;flex:0 0 auto}
.cfgctl input:disabled,.cfgctl select:disabled{background:var(--code);color:var(--fg);opacity:.9;cursor:default;border-color:transparent}

/* key icon rotated −45° for a hanging-key look */
.tb-icon svg,.keyglyph svg{transform:rotate(-45deg)}

.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--rad);padding:22px 24px;margin-bottom:20px;
      transition:border-color .2s,box-shadow .2s,transform .2s}
.card.lift:hover{border-color:var(--accent);box-shadow:0 6px 20px var(--shadow);transform:translateY(-2px)}
.cardhead{font-family:Montserrat,sans-serif;font-weight:600;font-size:16px;margin:0 0 16px;color:var(--primary-dark)}
[data-theme="dark"] .cardhead{color:var(--fg)}
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.mut{color:var(--mut)} .small{font-size:12px}
.num{font-variant-numeric:tabular-nums}
.tag{display:inline-block;background:var(--code);border:1px solid var(--line);border-radius:999px;padding:2px 11px;margin:2px;font-size:12px}

/* pills */
.pill{display:inline-block;border-radius:7px;padding:3px 10px;font-size:12px;font-weight:600;border:1px solid transparent;white-space:nowrap}
.pill.cold{background:#A8895B22;color:#8A6F3F;border-color:#A8895B4d}
.pill.warm{background:#5E735522;color:#4c6045;border-color:#5E73554d}
.pill.distractor{background:#9C5B4F22;color:#9C5B4F;border-color:#9C5B4F4d}
.pill.bandit{background:#4F627622;color:#42566b;border-color:#4F62764d}
.pill.neutral{background:var(--code);color:var(--mut);border-color:var(--line)}
[data-theme="dark"] .pill.cold{color:#CDB78C}[data-theme="dark"] .pill.warm{color:#9cc090}
[data-theme="dark"] .pill.bandit{color:#8fb4d8}[data-theme="dark"] .pill.distractor{color:#d89a8e}

/* tables */
table{width:100%;border-collapse:collapse;font-size:14px}
th,td{text-align:left;padding:14px;border-bottom:1px solid var(--line);vertical-align:middle}
th{color:var(--mut);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.07em;
  font-family:Montserrat,sans-serif;background:var(--code);border-bottom:none;padding-top:11px;padding-bottom:11px}
tr:last-child td{border-bottom:0}
/* tables bleed to the card edges so row separators run the full width (Qdrant-style) */
.card>table{width:calc(100% + 48px);margin-left:-24px;margin-right:-24px}
.card>table th:first-child,.card>table td:first-child{padding-left:24px}
.card>table th:last-child,.card>table td:last-child{padding-right:24px}
/* table as the card's first element: header band sits flush with the card top */
.card>table:first-child{margin-top:-22px}
.card>table:first-child th:first-child{border-top-left-radius:var(--rad)}
.card>table:first-child th:last-child{border-top-right-radius:var(--rad)}
/* ...and as the last element: no dead space under the final row */
.card>table:last-child{margin-bottom:-22px}
.card>table:last-child tr:last-child td:first-child{border-bottom-left-radius:var(--rad)}
.card>table:last-child tr:last-child td:last-child{border-bottom-right-radius:var(--rad)}
td b{font-family:Montserrat,sans-serif;font-weight:600}
tbody tr{transition:background .12s}
tbody tr:hover{background:var(--accent-t)}
/* visitors table: no row-hover wash; the id itself is the link */
#utbl tr:hover{background:transparent}
.vlink{cursor:pointer}
.vlink:hover{text-decoration:underline;color:var(--accent)}

/* bars */
.barwrap{display:flex;height:16px;border-radius:8px;overflow:hidden;background:var(--track);min-width:150px}
.seg{height:100%}
.diverge{position:relative;height:16px;background:var(--track);border-radius:8px;overflow:hidden;min-width:150px}
.diverge .ctr{position:absolute;left:50%;top:0;bottom:0;width:1px;background:var(--line)}
.diverge .fill{position:absolute;top:2px;bottom:2px;border-radius:5px}
.legend{display:flex;flex-wrap:wrap;gap:4px 14px;margin-top:10px}
.legend span{font-size:11px;color:var(--mut)}
.sw{display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:5px;vertical-align:middle}

/* metric cards */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(178px,1fr));gap:12px}
.metric-card{background:var(--panel);border:1px solid var(--line);border-top:3px solid var(--accent);border-radius:var(--rad);padding:15px 16px;transition:.2s}
.metric-card:hover{box-shadow:0 6px 20px var(--shadow);transform:translateY(-2px)}
.metric{font-family:Montserrat,sans-serif;font-size:27px;font-weight:700;color:var(--primary-dark);line-height:1.1}
[data-theme="dark"] .metric{color:var(--accent)}
.metric+div{margin-top:4px}
/* visitor profile layout */
.pgrid{display:grid;grid-template-columns:minmax(0,340px) minmax(0,1fr);gap:14px;align-items:start}
.pgrid>div{min-width:0;display:flex;flex-direction:column}
@media(max-width:920px){.pgrid{grid-template-columns:1fr}}
.hero .ptype{font-family:Montserrat,sans-serif;font-size:23px;font-weight:700;color:var(--primary-dark);line-height:1.15;margin:2px 0 0}
[data-theme="dark"] .hero .ptype{color:var(--fg)}
.statchips{display:flex;gap:10px;flex-wrap:wrap;margin-top:13px}
.statchip{background:var(--code);border:1px solid var(--line);border-radius:10px;padding:8px 13px;min-width:76px}
.statchip .n{font-family:Montserrat,sans-serif;font-size:20px;font-weight:700;color:var(--primary-dark);line-height:1.1}
[data-theme="dark"] .statchip .n{color:var(--accent)}
.statchip .l{font-size:11px;color:var(--mut);letter-spacing:.04em}
.persona-sub{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-top:14px;font-size:12.5px;color:var(--mut)}
.persona-sub b{color:var(--fg);font-weight:600;text-transform:capitalize}
.cardhead-row{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:14px}
.kv{display:grid;grid-template-columns:max-content 1fr;gap:5px 14px;font-size:13px;align-items:baseline}
.kv dt{color:var(--mut);white-space:nowrap}
.kv dd{margin:0;color:var(--fg);overflow-wrap:anywhere}
.surveyflag{display:flex;align-items:center;gap:7px;justify-content:space-between;margin-bottom:5px}
.statusbadge{display:inline-flex;align-items:center;gap:6px;font-size:10.5px;font-weight:700;letter-spacing:.03em;text-transform:uppercase;padding:3px 10px;border-radius:999px;border:1px solid var(--line)}
.statusbadge .dot{width:6px;height:6px;border-radius:50%;background:currentColor}
.statusbadge.done{background:var(--accent-t);color:var(--accent);border-color:transparent}
.statusbadge.pending{background:transparent;color:var(--mut)}
.tagrow{display:grid;grid-template-columns:minmax(110px,200px) minmax(0,1fr) 46px;gap:12px;align-items:center;margin:6px 0}
.tagrow .barwrap{min-width:0}   /* the global 150px floor would overflow narrow cards */
.tagrow .lab{min-width:0;line-height:1.15}
.tagrow .lab .fb{font-size:9px;letter-spacing:.06em;text-transform:uppercase;color:var(--mut);display:block}
.tagrow .lab .t{font-size:13px;color:var(--fg);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:block;text-transform:capitalize}
.tagrow .val{font-size:12px;color:var(--mut);text-align:right;font-variant-numeric:tabular-nums}
.morebtn{margin-top:8px;background:transparent;border:0;color:var(--accent);font:inherit;font-size:12px;font-weight:600;cursor:pointer;padding:2px 0}
.morebtn:hover{text-decoration:underline}

input.f,select.f{background:var(--panel);color:var(--fg);border:1px solid var(--line);border-radius:8px;padding:6px 10px;font:inherit;font-size:13px}
input.f:focus,select.f:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-t)}
button.primary{background:var(--accent);color:#221a0c;border:1px solid transparent;border-radius:8px;padding:7px 16px;font:inherit;font-weight:600;cursor:pointer}
[data-theme="dark"] button.primary{color:#1c1b18}
button.primary:hover{filter:brightness(1.05)}
button.primary.danger{background:var(--c-aversion);color:#fff}
button.primary:disabled{opacity:.45;cursor:default;filter:none}
.err{color:#9C5B4F} code{background:var(--code);padding:1px 6px;border-radius:5px;font-size:12px;font-family:'Roboto Mono',monospace}
.num{font-family:'Roboto Mono',monospace}
.empty{padding:26px;text-align:center;color:var(--mut);border:1px dashed var(--line);border-radius:var(--rad)}
/* taxonomy tag chip: facet badge + clean label (+ weight on overlap hits) */
.tchip{display:inline-flex;align-items:center;gap:7px;background:var(--code);border:1px solid var(--line);border-radius:999px;padding:3px 11px 3px 5px;font-size:12px;margin:2px}
.tchip .fb{font-size:9px;letter-spacing:.06em;text-transform:uppercase;color:var(--mut);border:1px solid var(--line);border-radius:999px;padding:1px 7px;background:var(--bg)}
.tchip .w{font-size:11px;color:var(--mut);font-variant-numeric:tabular-nums}
.tchip.hit{background:#5E735514;border-color:#5E735555;color:#5E7355}
.tchip.hit .fb{color:#5E7355;border-color:#5E735555;background:transparent}
.tchip.hit .w{color:#5E7355;opacity:.75}
/* cohort statistics */
.distrow{display:grid;grid-template-columns:minmax(95px,155px) minmax(0,1fr) 70px;gap:12px;align-items:center;margin:9px 0}
/* instant tooltip (native title is too slow to discover) */
[data-tip]{position:relative;cursor:help}
[data-tip]:hover::after{content:attr(data-tip);position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);
  background:var(--panel);color:var(--fg);font-family:Montserrat,sans-serif;font-size:11.5px;font-weight:500;
  letter-spacing:normal;text-transform:none;padding:7px 13px;border-radius:9px;border:1px solid var(--line);
  white-space:nowrap;z-index:60;pointer-events:none;box-shadow:0 8px 24px var(--shadow)}
[data-tip]:hover::before{content:"";position:absolute;bottom:calc(100% + 3px);left:50%;transform:translateX(-50%) rotate(45deg);
  width:9px;height:9px;background:var(--panel);border-right:1px solid var(--line);border-bottom:1px solid var(--line);
  z-index:61;pointer-events:none}
th.sortable{cursor:pointer;user-select:none;white-space:nowrap}
th.sortable:hover{color:var(--fg)}
th.sortable .arrow{display:inline-block;width:11px;font-size:10px;color:var(--accent)}  /* fixed width: arrow can't shift columns */
.distrow.click{cursor:pointer;border-radius:6px}
.distrow.click:hover>.small:first-child{color:var(--fg)}
.statrow{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px 24px}
.statcell .statval{font-family:Montserrat,sans-serif;font-size:25px;font-weight:700;color:var(--primary-dark);line-height:1.2}
[data-theme="dark"] .statcell .statval{color:var(--accent)}
.colchart{display:flex;align-items:flex-end;justify-content:center;gap:6px;margin:4px 0 2px}
.colchart .col{flex:1;max-width:46px;min-width:0;display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:0;padding:0;cursor:pointer;font:inherit}
.colchart .track{width:100%;max-width:26px;height:44px;background:var(--track);border-radius:5px;display:flex;align-items:flex-end;overflow:hidden}
.colchart .bar{width:100%;background:var(--accent);border-radius:4px 4px 0 0;transition:.15s}
.colchart .col:hover .bar{filter:brightness(1.1)}
.colchart .bar.on{background:var(--primary-dark)}
[data-theme="dark"] .colchart .bar.on{background:var(--fg)}
.colchart .cnt{font-size:10.5px;color:var(--mut);min-height:13px;opacity:0;transition:.15s}
.colchart .col:hover .cnt{opacity:1}
.colchart .lbl{font-size:10.5px;color:var(--mut);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
.colchart .lbl.on{color:var(--fg);font-weight:600}
.filterchip{display:inline-flex;align-items:center;gap:7px;background:var(--accent-t);border:1px solid var(--accent);color:var(--link);border-radius:999px;padding:3px 11px;font:inherit;font-size:12px;font-weight:600;cursor:pointer}
.filterchip .x{opacity:.7}
.filterchip:hover .x{opacity:1}
.legchip{display:inline-flex;align-items:center;gap:6px;background:transparent;border:0;padding:2px 4px;border-radius:6px;font:inherit;font-size:12px;color:var(--mut);cursor:pointer}
.legchip:hover{color:var(--fg)}
.legchip.on{color:var(--fg);font-weight:600}
/* collection map widget: basemap + linked side list + year strip */
.mapwrap{display:grid;grid-template-columns:minmax(0,1fr) 270px;gap:16px}
@media(max-width:920px){.mapwrap{grid-template-columns:1fr}}
.lmap{height:360px;border-radius:12px;background:var(--track);overflow:hidden;z-index:0}
.lmap .leaflet-tile-pane{filter:sepia(.32) saturate(.72) brightness(1.02)}   /* tone tiles to the house palette */
[data-theme="dark"] .lmap .leaflet-tile-pane{filter:saturate(.55) brightness(.92)}
.lmap .leaflet-tooltip{background:var(--fg);color:var(--bg);border:0;border-radius:6px;font-size:11.5px;box-shadow:0 4px 14px var(--shadow)}
.glowdot{filter:drop-shadow(0 0 6px rgba(168,137,91,.85))}
.mapside{min-width:0}
.sider{display:grid;grid-template-columns:minmax(0,1fr) 74px 32px;gap:8px;align-items:center;padding:5px 6px;border-radius:7px;cursor:pointer}
.sider:hover{background:var(--accent-t)}
.timeline{position:absolute;left:14px;right:14px;bottom:12px;z-index:800;
  background:color-mix(in srgb,var(--panel) 80%,transparent);backdrop-filter:blur(7px);
  border:1px solid var(--line);border-radius:12px;padding:9px 16px 6px}
.tl-row{display:flex;justify-content:space-between;position:relative}
.tl-row:before{content:"";position:absolute;left:8px;right:8px;top:11px;height:2px;background:var(--line);border-radius:2px}
.tl-cell{position:relative;flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:0;padding:0;cursor:pointer;font:inherit}
.tl-slot{height:22px;display:flex;align-items:center;justify-content:center}
.tl-dot{border-radius:50%;background:var(--accent);border:2px solid var(--panel);box-shadow:0 0 7px rgba(168,137,91,.85);transition:.15s;z-index:1}
.tl-cell:hover .tl-dot{transform:scale(1.25)}
.tl-cell.on .tl-dot{background:var(--primary-dark);box-shadow:0 0 11px rgba(66,61,52,.8)}
[data-theme="dark"] .tl-cell.on .tl-dot{background:var(--fg)}
.tl-cell.dim .tl-dot{opacity:.3!important;box-shadow:none}
.tl-year{font-size:10.5px;color:var(--mut);font-variant-numeric:tabular-nums}
.tl-cell.on .tl-year{color:var(--fg);font-weight:700}
/* methods page */
.methodgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:12px;margin:0 0 6px}
.methodcard{background:var(--panel);border:1px solid var(--line);border-top:3px solid var(--accent);border-radius:var(--rad);padding:14px 16px}
.methodcard h4{margin:0 0 6px;font-size:13.5px;display:flex;gap:8px;align-items:center}
.methodcard p{margin:0;font-size:12.5px;color:var(--mut);line-height:1.55}
.steps{padding:2px 0}
.step{display:flex;gap:14px;position:relative;padding-bottom:18px}
.step:last-child{padding-bottom:0}
.step:not(:last-child):after{content:"";position:absolute;left:13px;top:28px;bottom:2px;width:1px;background:var(--line)}
.stepnum{width:26px;height:26px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12.5px;font-weight:700;flex:0 0 auto}
/* rec-detail compact item rows */
.reccard{display:flex;gap:13px;padding:12px 15px;margin:8px 0;align-items:flex-start}
.recthumb{width:48px;height:48px;border-radius:9px;object-fit:cover;flex:0 0 auto;background:var(--code);cursor:pointer}
.recthumb.ph{display:inline-block;border:1px solid var(--line)}
.recbody{flex:1;min-width:0}
.reclink{cursor:pointer}
.reclink:hover{color:var(--accent)}
.srclink{font-size:11.5px;font-weight:600;color:var(--accent);text-decoration:none;margin-left:auto;white-space:nowrap}
.srclink:hover{text-decoration:underline}
/* rec-detail "why served" facts: equal columns, wrap cleanly, no separators to dangle */
.metagrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px 20px;align-items:start}
/* lazy-loading section placeholder */
.lazyload{display:flex;align-items:center;justify-content:center;gap:9px;padding:26px;color:var(--mut);font-size:13px;border:1px dashed var(--line);border-radius:var(--rad)}
.lazyload .spin{width:15px;height:15px;border:2px solid var(--line);border-top-color:var(--accent);border-radius:50%;animation:lspin .7s linear infinite;flex:none}
@keyframes lspin{to{transform:rotate(360deg)}}
/* kebab action menu (⋮) */
.kebab{position:relative;display:inline-block}
.kebab>button{background:transparent;border:0;color:var(--mut);cursor:pointer;padding:4px 12px;border-radius:8px;font-size:18px;line-height:1}
.kebab>button:hover{background:var(--accent-t);color:var(--fg)}
.kmenu{position:absolute;right:0;top:calc(100% + 4px);z-index:80;background:var(--panel);border:1px solid var(--line);
  border-radius:10px;box-shadow:0 12px 30px var(--shadow);min-width:170px;padding:6px;display:none}
.kmenu.show{display:block}
.kmenu button{display:block;width:100%;text-align:left;background:transparent;border:0;padding:8px 11px;border-radius:7px;
  font-family:Montserrat,sans-serif;font-size:13px;color:var(--fg);cursor:pointer}
.kmenu button:hover{background:var(--accent-t)}
.kmenu button.danger{color:var(--c-aversion)}
.userchip{background:var(--code);border:1px solid var(--line);border-radius:7px;padding:3px 9px;font-size:12px;cursor:pointer;color:var(--fg);font-family:inherit;font-variant-numeric:tabular-nums}
.userchip:hover{border-color:var(--accent);color:var(--accent)}
details.members{margin-top:11px;border-top:1px solid var(--line);padding-top:9px}
details.members summary{cursor:pointer;list-style:none;font-size:12px;color:var(--mut);font-weight:600}
details.members summary::-webkit-details-marker{display:none}
details.members summary:hover{color:var(--accent)}
details.members[open] summary{margin-bottom:8px}
pre{white-space:pre-wrap;word-break:break-word}

/* ===== API-key modal ===== */
.overlay{position:fixed;inset:0;background:rgba(28,24,18,.55);backdrop-filter:blur(3px);z-index:100;
  display:none;align-items:center;justify-content:center;padding:20px}
.overlay.show{display:flex}
.modal{width:min(440px,100%);background:var(--panel);border:1px solid var(--line);border-radius:16px;
  box-shadow:0 24px 60px var(--shadow);overflow:hidden;animation:pop .18s ease}
@keyframes pop{from{transform:translateY(8px) scale(.98);opacity:0}to{transform:none;opacity:1}}
.modal .mhead{display:flex;align-items:center;gap:11px;padding:18px 22px 6px}
.modal .mhead .ring{width:26px;height:26px}
.modal .mhead h2{margin:0;font-size:17px;color:var(--primary-dark)}
[data-theme="dark"] .modal .mhead h2{color:var(--fg)}
.modal .mbody{padding:8px 22px 4px}
.modal .mbody p{color:var(--mut);font-size:13px;margin:0 0 16px}
.field{margin-bottom:13px}
.field label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:var(--mut);font-weight:700;margin-bottom:5px}
.field input{width:100%;background:var(--bg);color:var(--fg);border:1px solid var(--line);border-radius:9px;padding:9px 11px;font:inherit;font-size:14px}
.field input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-t)}
.field .hint{font-size:11px;color:var(--mut);margin-top:4px}
.keywrap{position:relative}
.keywrap input{padding-right:40px}
.eye{position:absolute;right:6px;top:50%;transform:translateY(-50%);background:transparent;border:0;cursor:pointer;
  color:var(--mut);padding:6px;border-radius:7px;line-height:0}
.eye:hover{color:var(--accent);background:var(--accent-t)}
.eye svg{width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:1.8}
.eye.off svg .slash{display:none}
.mfoot{display:flex;align-items:center;gap:10px;padding:6px 22px 20px}
.mfoot .mstatus{font-size:12.5px;font-weight:600;margin-right:auto}
.mfoot .mstatus.ok{color:#5E7355}.mfoot .mstatus.err{color:#9C5B4F}
button.ghost{background:var(--panel);color:var(--fg);border:1px solid var(--line);border-radius:8px;padding:7px 16px;font:inherit;font-weight:600;cursor:pointer}
button.ghost:hover{border-color:var(--accent)}
.linkbtn{background:transparent;border:0;color:var(--link);font:inherit;font-size:13px;font-weight:600;cursor:pointer;text-decoration:underline;padding:0}
.keyglyph{margin-bottom:8px;color:var(--accent)}
.keyglyph svg{width:30px;height:30px}
.toast{position:fixed;right:20px;bottom:20px;z-index:120;display:flex;flex-direction:column;gap:10px;max-width:380px}
.toast .card{background:var(--panel)}
</style>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="side-brand">
      <img class="brand-logo" src="/static/favicon/ai-engine-search-white-512.png" alt="AI-Engine"/>
      <span class="name">AI&#8209;<span>Engine</span></span>
      <button class="side-toggle" id="navtoggle" title="collapse sidebar">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M15 6l-6 6 6 6"/></svg>
      </button>
    </div>
    <nav class="side-nav" id="tabs"></nav>
    <div class="side-docs-wrap">
      <a class="side-docs" href="https://ai-engine-docs.eodyne.systems" target="_blank" rel="noopener" title="documentation">
        <span class="lbl">Docs</span>
        <svg class="ext" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
      </a>
    </div>
    <div class="side-foot">
      <span class="foot-tenant" id="tenantname" title="active tenant"></span>
      <span class="side-version" id="appver" title="running release"></span>
      <span class="conn" id="conn" title="not connected"><span class="dot"></span></span>
    </div>
  </aside>

  <main>
    <header class="topbar">
      <input id="tenant" type="hidden"/>
      <input id="uid" type="hidden"/>
      <div class="tb-spacer"></div>
      <button class="tb-icon" id="openkey" title="API key / connection" aria-label="API key">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="7" cy="12" r="3.7"/><circle cx="7" cy="12" r="1" fill="currentColor" stroke="none"/><path d="M10.7 12H21M18 12v3.4M14.7 12v2.6"/></svg>
      </button>
      <button class="themeswitch" id="theme" title="toggle light / dark" aria-label="toggle theme">
        <svg class="ic-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 3v2.2M12 18.8V21M3 12h2.2M18.8 12H21M5.2 5.2l1.6 1.6M17.2 17.2l1.6 1.6M18.8 5.2l-1.6 1.6M6.8 17.2l-1.6 1.6"/></svg>
        <svg class="ic-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8Z"/></svg>
        <span class="knob"></span>
      </button>
    </header>
    <div class="page" id="view"></div>
  </main>
</div>

<div id="toast" class="toast"></div>

<!-- API-key popup -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="mhead">
      <h2>Set API Key</h2>
    </div>
    <div class="mbody">
      <p>This instance of AI&#8209;Engine might be protected by an API key. If so, enter it to continue. It is stored only in this browser.</p>
      <div class="field">
        <div class="keywrap">
          <input id="key" type="password" placeholder="API key" autocomplete="off"/>
          <button type="button" id="keytoggle" class="eye off" title="show key" aria-label="show key">
            <svg viewBox="0 0 24 24"><path d="M2 12s3.6-7 10-7 10 7 10 7-3.6 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/><line class="slash" x1="3" y1="3" x2="21" y2="21"/></svg>
          </button>
        </div>
      </div>
    </div>
    <div class="mfoot">
      <span class="mstatus" id="mstatus"></span>
      <button class="ghost" id="cancelkey">Cancel</button>
      <button class="primary" id="connect">Connect</button>
    </div>
  </div>
</div>

<script>
const FEAT=["semantic","tag","recency","aversion","geo"];
const COLORS={semantic:"var(--c-semantic)",affinity:"var(--c-affinity)",tag:"var(--c-tag)",recency:"var(--c-recency)",aversion:"var(--c-aversion)",geo:"var(--c-geo)",popularity:"#999"};
const $=(s,el=document)=>el.querySelector(s);
const el=(t,a={},...kids)=>{const e=document.createElement(t);for(const k in a){if(k==="class")e.className=a[k];else if(k==="html")e.innerHTML=a[k];else if(k.startsWith("on"))e[k]=a[k];else e.setAttribute(k,a[k]);}for(const k of kids.flat())e.append(k&&k.nodeType?k:document.createTextNode(k??""));return e;};
const base=()=>window.location.origin;   // dashboard is served by the API itself, so same-origin
const headers=()=>{const h={};const k=$("#key").value.trim();if(k)h["X-API-Key"]=k;const t=$("#tenant").value.trim();if(t)h["X-Tenant-Id"]=t;return h;};
async function api(path){const r=await fetch(base()+path,{headers:headers()});if(!r.ok)throw new Error(r.status+" "+r.statusText+", "+path);return (await r.json()).result;}
const fmt=x=>(typeof x==="number")?(Math.round(x*1000)/1000):x;
const cap1=s=>String(s).replace(/^\w/,c=>c.toUpperCase());   // capitalize first letter only
const mdInline=t=>String(t??"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\*\*(.+?)\*\*/g,"<strong>$1</strong>");
// one fixed colour per Falk persona, used everywhere the persona appears
const PERSONA_COLORS={Explorer:"#4F6276",Hobbyist:"#5E7355","Experience-Seeker":"#A8895B",Recharger:"#7A5C6E",Facilitator:"#4E7E78"};
function personaPill(label,type,extra=""){const c=PERSONA_COLORS[type];
  if(!c)return el("span",{class:"pill neutral",style:extra},label);
  return el("span",{class:"pill",style:`background:${c}22;color:${c};border-color:${c}66;${extra}`},label);}
const cardhead=t=>el("h3",{class:"cardhead"},t);
// No key (or 401/403) -> show a quiet blank prompt, never a red "unauthorized".
const isAuth=e=>/\b(401|403)\b/.test(String(e));
function failCard(v,e){
  if(isAuth(e)||!$("#key").value.trim()){
    v.append(el("div",{class:"empty"},
      el("div",{class:"keyglyph",html:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="7" cy="12" r="3.7"/><circle cx="7" cy="12" r="1" fill="currentColor" stroke="none"/><path d="M10.7 12H21M18 12v3.4M14.7 12v2.6"/></svg>'}),"Add an API key to view this.",
      el("div",{style:"margin-top:10px"},el("button",{class:"userchip",onclick:openModal},"Enter API key"))));
    return;
  }
  v.append(el("div",{class:"card err"},String(e)));
}
// Fill `slot` lazily: show a spinner immediately, swap in the loader's output when it
// resolves. The loader appends into the fresh container it is given. Keeps the page
// shell paintable while slow endpoints (parquet scans, event-buffer sweeps) run.
function lazyFill(slot,label,loader){
  const ph=el("div",{class:"lazyload"},el("span",{class:"spin"}),label);
  slot.append(ph);
  const box=el("div");
  Promise.resolve().then(()=>loader(box))
    .then(()=>ph.replaceWith(box))
    .catch(e=>{const w=el("div");failCard(w,e);ph.replaceWith(w);});
}
function breakdownBar(bd){
  const wrap=el("div",{class:"barwrap"});
  const pos=FEAT.filter(f=>f!=="aversion").map(f=>[f,Math.max(0,bd[f]||0)]);
  const tot=pos.reduce((s,[,v])=>s+v,0)+Math.abs(bd.aversion||0)||1;
  for(const [f,v] of pos){if(v>0)wrap.append(el("div",{class:"seg",style:`width:${100*v/tot}%;background:${COLORS[f]}`,title:`${f}: ${fmt(v)}`}));}
  if(bd.aversion)wrap.append(el("div",{class:"seg",style:`width:${100*Math.abs(bd.aversion)/tot}%;background:${COLORS.aversion}`,title:`aversion: ${fmt(bd.aversion)}`}));
  return wrap;
}
function legend(){const d=el("div",{class:"legend"});for(const f of FEAT)d.append(el("span",{},el("span",{class:"sw",style:`background:${COLORS[f]}`}),f));return d;}
function diverge(v,mx,color){
  const pct=50*Math.min(Math.abs(v)/(mx||1),1);
  const fill=v>=0?`left:50%;width:${pct}%;background:${color}`:`left:${50-pct}%;width:${pct}%;background:var(--c-aversion)`;
  return el("div",{class:"diverge"},el("div",{class:"ctr"}),el("div",{class:"fill",style:fill}));
}
function valueBars(pairs,{signed=false,max=null}={}){
  const m=max??Math.max(0.0001,...pairs.map(([,v])=>Math.abs(v)));
  const box=el("div");
  for(const [label,v] of pairs)box.append(el("div",{class:"row",style:"margin:5px 0"},
    el("div",{class:"small",style:"width:215px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"},label),
    el("div",{class:"barwrap",style:"flex:1;max-width:360px"},el("div",{class:"seg",style:`width:${100*Math.abs(v)/m}%;background:${signed&&v<0?'var(--c-aversion)':'var(--accent)'}`})),
    el("div",{class:"small num mut",style:"width:52px;text-align:right"},fmt(v))));
  return box;
}
// taxonomy facet path -> short human label (the prefix before ':' in a tag key)
const FACET_LABELS={"theme_what":"theme","theme_how.type_of_stores":"story type",
  "place_where.camp_areas":"area","location":"location",
  "person_who.city_village_country":"origin","person_who.age_group":"age",
  "person_who.province_netherlands":"province","person_who.gender_and_age":"gender"};
function prettyKey(key){
  const i=String(key).indexOf(":");
  const facetPath=i<0?"":key.slice(0,i);
  let label=(i<0?key:key.slice(i+1)).replace(/^from:\s*/i,"").replace(/_/g," ").trim();
  const facet=FACET_LABELS[facetPath]||(facetPath.split(".").pop()||"").replace(/_/g," ");
  return {facet,label:label||""};
}
// humanize a stored demographic value: "45_54"->"45–54","65_plus"->"65+","male"->"Male"
function humanVal(k,v){
  v=String(v);
  if(k==="age"){if(/^under[_\s]?\d+/i.test(v))return "<"+v.replace(/\D+/g,"");return v.replace(/_plus$/,"+").replace(/_/g,"–");}
  // underscores -> spaces (keep hyphens: "Zuid-Holland"); title-case each word
  return v.replace(/_/g," ").replace(/(^|[\s-])\w/g,c=>c.toUpperCase());
}
// one taxonomy tag as a chip: facet badge + clean label; weight shown on overlap hits
function tagChip(key,weight){
  const {facet,label}=prettyKey(key);
  const c=el("span",{class:"tchip"+(weight!=null?" hit":""),title:key});
  if(facet)c.append(el("span",{class:"fb"},facet));
  c.append(el("span",{},label));
  if(weight!=null)c.append(el("span",{class:"w"},fmt(weight)));
  return c;
}
// tag affinity/aversion list: facet badge + clean label + bar, capped with a show-all toggle.
// `hi` = Set of normalized keys to highlight green (e.g. affinities matched by served items).
function tagList(pairs,{signed=false,top=6,hi=null}={}){
  const m=Math.max(0.0001,...pairs.map(([,v])=>Math.abs(v)));
  const box=el("div");
  const norm=k=>String(k).toLowerCase().trim();
  const mkRow=([key,v])=>{const {facet,label}=prettyKey(key);
    const hit=hi&&hi.has(norm(key));
    return el("div",{class:"tagrow"+(hit?" hit":"")},
      el("div",{class:"lab"},facet?el("span",{class:"fb"},facet):"",el("span",{class:"t",title:key},label)),
      el("div",{class:"barwrap"},el("div",{class:"seg",style:`width:${100*Math.abs(v)/m}%;background:${hit?'#5E7355':signed&&v<0?'var(--c-aversion)':'var(--accent)'}`})),
      el("div",{class:"val",style:hit?"color:#5E7355;font-weight:600":""},fmt(v)));};
  pairs.slice(0,top).forEach(p=>box.append(mkRow(p)));
  if(pairs.length>top){
    const extra=el("div",{style:"display:none"});
    pairs.slice(top).forEach(p=>extra.append(mkRow(p)));
    const more=`show all ${pairs.length} ▾`;
    const btn=el("button",{class:"morebtn",onclick:()=>{const open=extra.style.display==="none";
      extra.style.display=open?"":"none";btn.textContent=open?"show less ▴":more;}},more);
    box.append(extra,btn);
  }
  return box;
}

/* ===== icons (sidebar) ===== */
const ICONS={
  cohort:'<circle cx="9" cy="8" r="3"/><circle cx="17" cy="10" r="2.4"/><path d="M3 19c0-3 3-5 6-5s6 2 6 5M15 18c.4-2 2-3 4-3s3 .7 3.5 2"/>',
  content:'<rect x="4" y="3" width="16" height="18" rx="2"/><path d="M8 8h8M8 12h8M8 16h5"/>',
  traffic:'<path d="M4 12h4l2 5 4-12 2 7h4"/>',
  request:'<circle cx="11" cy="11" r="6"/><path d="M20 20l-4.5-4.5"/>',
  user:'<circle cx="12" cy="8" r="3.4"/><path d="M5 20c0-3.5 3-6 7-6s7 2.5 7 6"/>',
  history:'<circle cx="12" cy="12" r="8"/><path d="M12 7v5l3 2"/>',
  tenants:'<g transform="rotate(-45 12 12)"><circle cx="7" cy="12" r="3.7"/><circle cx="7" cy="12" r="1" fill="currentColor" stroke="none"/><path d="M10.7 12H21M18 12v3.4M14.7 12v2.6"/></g>',
  config:'<circle cx="12" cy="12" r="3"/><path d="M12 3v3M12 18v3M3 12h3M18 12h3M5.6 5.6l2.1 2.1M16.3 16.3l2.1 2.1M18.4 5.6l-2.1 2.1M7.7 16.3l-2.1 2.1"/>',
  personas:'<path d="M4 14c0 3 3 5 5 5 1.5 0 2-1 3-1s1.5 1 3 1c2 0 5-2 5-5 0-4-3-9-5-9-1.5 0-2 1-3 1s-1.5-1-3-1c-2 0-5 5-5 9Z"/>',
  evaluate:'<path d="M9 3h6M10 3v6l-4.5 8a2 2 0 0 0 1.8 3h9.4a2 2 0 0 0 1.8-3L14 9V3M7.5 15h9"/>',
  info:'<circle cx="12" cy="12" r="8.5"/><path d="M12 11v5"/><circle cx="12" cy="8" r="0.6" fill="currentColor"/>',
};
const slug=n=>n.toLowerCase().replace(/\s+/g,"-");

const GROUPS=[
  {label:"Overview",   tabs:{Cohort:renderCohort,Content:renderContent,Traffic:renderTraffic}},
  {label:"Evaluation", tabs:{"Synthetic users":renderEval}},
  {label:"Admin",      tabs:{"Access Tokens":renderTenants,Config:renderConfig}},
];
const ICON_OF={Cohort:"cohort",Content:"content",Traffic:"traffic","Synthetic users":"evaluate","Access Tokens":"tenants",Config:"config"};
const ALL=Object.assign({},...GROUPS.map(g=>g.tabs));
const BY_SLUG={};Object.keys(ALL).forEach(n=>BY_SLUG[slug(n)]=n);
let current="Cohort";
let userCtx=null;            // {id, sub} when drilled into a single visitor (from the Cohort table)
let recCtx=null;             // request_id when drilled into a single recommendation (from the Traffic table)
let cfgTab=null;             // active Config category subtab
let cohortTab="overview";    // Cohort subtab: overview | stats | snapshot
let _anonFilter="identified"; // visitors table slice: all | identified | anon
let _fbFilter={};             // {question: [min,max]} — post-visit feedback score ranges
let _cohortDom=null;         // {node,ts}: rendered Cohort view, reattached on return
                             // from a visitor drill-down instead of refetching everything
let cfgEdit=false;           // Config is read-only until Edit is clicked
const USER_SUBS=[["profile","Profile",renderUser],["history","History",renderHistory],["recommend","Recommendations",renderRequest]];

function setTab(n){if(!ALL[n])return;userCtx=null;recCtx=null;cfgEdit=false;current=n;const s=slug(n);if(location.hash!=="#/"+s)location.hash="#/"+s;else paint();}
function openUser(id,sub){id=String(id).trim();if(!id)return;sub=sub||"profile";cfgEdit=false;recCtx=null;
  $("#uid").value=id;localStorage.setItem("ins_uid",id);
  const h=`#/user/${encodeURIComponent(id)}/${sub}`;if(location.hash!==h)location.hash=h;else paint();}
function paint(){
  const navActive=recCtx?"Traffic":userCtx?"Cohort":current;
  for(const b of document.querySelectorAll(".navitem"))b.classList.toggle("on",b.dataset.t===navActive);
  const v=$("#view");v.innerHTML="";
  if(recCtx){renderRecDetail(v);return;}
  if(userCtx){renderUserDetail(v);return;}
  v.append(el("div",{class:"pagehead"},
    el("div",{},el("h1",{},current)),
    (current==="Config"||current==="Access Tokens"||current==="Synthetic users"||current==="Cohort")?"":el("button",{class:"iconbtn",title:"refresh",onclick:()=>{_cohortDom=null;paint();}},"↻")));
  // Cohort keeps its rendered DOM across visitor drill-downs: back = reattach,
  // no refetch, scroll/filters/subtab intact. Refresh button forces a rebuild.
  if(current==="Cohort"&&_cohortDom&&Date.now()-_cohortDom.ts<300000){
    v.append(_cohortDom.node);return;
  }
  const host=el("div");v.append(host);
  if(current==="Cohort")_cohortDom={node:host,ts:Date.now()};
  ALL[current](host).catch(e=>failCard(host,e));
}
function renderUserDetail(v){
  const {id,sub}=userCtx;const fn=(USER_SUBS.find(s=>s[0]===sub)||USER_SUBS[0])[2];
  v.append(el("div",{class:"pagehead"},
    el("div",{},
      el("button",{class:"backlink",onclick:()=>setTab("Cohort")},"← Cohort"),
      el("h1",{},"Visitor ",el("span",{style:"color:var(--accent)"},id))),
    el("button",{class:"iconbtn",title:"refresh",onclick:paint},"↻")));
  const bar=el("div",{class:"subtabs"});
  USER_SUBS.forEach(([key,label])=>bar.append(el("button",{class:"subtab"+(key===sub?" on":""),onclick:()=>openUser(id,key)},label)));
  v.append(bar);
  const host=el("div");v.append(host);
  fn(host).catch(e=>failCard(host,e));
}

let _recBack=null;   // where the rec drill-down was opened from
function openRec(rid){
  rid=String(rid||"").trim();if(!rid)return;
  _recBack=location.hash&&!location.hash.startsWith("#/rec/")?location.hash:_recBack;
  userCtx=null;cfgEdit=false;
  const h=`#/rec/${encodeURIComponent(rid)}`;
  if(location.hash!==h)location.hash=h;else paint();
}

async function timelineCard(){
  if(_tlData===null){try{_tlData=await api("/api/cohort/timeline");}catch(e){_tlData=[];}}
  const card=el("div",{class:"card"});
  const title=cardhead("Visitors per day");title.style.margin="0";
  const seg=el("div",{class:"segctl"});

  const draw=()=>{
    host.innerHTML="";

    if(!rows.length){host.append(el("div",{class:"small mut"},"No activity recorded."));return;}
    const byDate=Object.fromEntries(rows.map(r=>[r.date,r]));
    const days=[];
    for(let d=new Date(rows[0].date+"T00:00:00Z");;d.setUTCDate(d.getUTCDate()+1)){
      const k=d.toISOString().slice(0,10);
      days.push(byDate[k]||{date:k,visitors:0,events:0});
      if(k>=rows[rows.length-1].date)break;
    }
    let view=days;
    if(_tlRange==="30")view=days.slice(-30);
    if(_tlRange==="7")view=days.slice(-7);
    const m=Math.max(1,...view.map(r=>r.visitors));
    // nice y ceiling (1/2/5 x 10^k) so axis labels are round numbers
    const pow=Math.pow(10,Math.floor(Math.log10(m)));
    const nm=[1,2,5,10].map(x=>x*pow).find(x=>x>=m)||m;
    const w=el("div",{class:"tlchart"});
    const WD=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];

      const resp=r.responded||0,anon=(r.anonymous!=null?r.anonymous:r.visitors-resp);
      const hR=r.visitors?Math.round(100*resp/nm):0, hA=r.visitors?Math.round(100*anon/nm):0;
      const col=el("div",{class:"tlcol"},
        el("div",{class:"tlstack"},
          el("div",{class:"tlbar anon",style:`height:${anon?Math.max(2,hA):0}%`}),
          el("div",{class:"tlbar",style:`height:${resp?Math.max(2,hR):0}%`})));
      col.onmouseenter=()=>{
        const d=new Date(r.date+"T00:00:00Z");
        const head=`${WD[d.getUTCDay()]}, ${d.getUTCDate()} ${MONL[d.getUTCMonth()]} ${d.getUTCFullYear()}`;
        showChartTip(col,
          `<div class="ct-head">${head}</div>`+
          `<div class="ct-row"><span class="ct-dot" style="background:var(--accent)"></span>Survey responded<b>${resp}</b></div>`+
          `<div class="ct-row"><span class="ct-dot" style="background:var(--track);border:1px solid var(--line)"></span>Anonymous<b>${anon}</b></div>`);
      };
      col.onmouseleave=hideChartTip;
      w.append(col);
    });
    // x ticks: one per bar slot, labelled every Nth bar so ~8 dates show, aligned
    // under their columns
    const MON=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    const fmtD=iso=>{const [,m,d]=iso.split("-");return parseInt(d,10)+" "+MON[parseInt(m,10)-1];};
    const step=Math.max(1,Math.ceil(view.length/8));
    const ticks=el("div",{class:"tlticks"});
    view.forEach((r,i)=>{
      const isLast=i===view.length-1;
      const show=i%step===0||(isLast&&(view.length-1)%step>=step/2);
      ticks.append(el("span",{class:"tltick"},show?fmtD(r.date):""));
    });
    host.append(el("div",{style:"display:flex;gap:12px;justify-content:flex-end;margin:-6px 0 4px;font-size:11px;color:var(--mut)"},
      el("span",{style:"display:inline-flex;align-items:center"},el("span",{class:"sw",style:"background:var(--accent);width:8px;height:8px"}),"survey"),
      el("span",{style:"display:inline-flex;align-items:center"},el("span",{class:"sw",style:"background:var(--track);border:1px solid var(--line);width:8px;height:8px"}),"anonymous")),
      el("div",{class:"tlwrap"},
        el("div",{class:"tlaxis"},el("span",{},String(nm)),el("span",{},String(Math.round(nm/2))),el("span",{},"0")),
        el("div",{style:"flex:1;min-width:0"},
          el("div",{class:"tlplot"},
            el("div",{class:"tlgrid"},el("span"),el("span"),el("span")),
            w),
          ticks)));
  };
  [["all","All"],["30","Month"],["7","Week"]].forEach(([k,label])=>
    seg.append(el("button",{class:k===_tlRange?"on":"","data-k":k,onclick:()=>{_tlRange=k;
      seg.querySelectorAll("button").forEach(b=>b.classList.toggle("on",b.dataset.k===k));draw();}},label)));
  card.append(el("div",{class:"row",style:"justify-content:space-between;align-items:center"},title,seg),host);
  draw();
