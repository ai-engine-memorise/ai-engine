<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>AI-Engine Dashboard, MEMORISE</title>
<!-- ai-engine favicon (Memorise) -->
<link rel="icon" href="/favicon.ico" sizes="any"/>
<link rel="icon" type="image/svg+xml" href="/static/favicon/ai-engine-search.svg"/>
<link rel="icon" type="image/svg+xml" href="/static/favicon/ai-engine-search-white.svg" media="(prefers-color-scheme: dark)"/>
<link rel="icon" type="image/png" sizes="32x32" href="/static/favicon/png-light/favicon-32.png"/>
<link rel="icon" type="image/png" sizes="16x16" href="/static/favicon/png-light/favicon-16.png"/>
<link rel="apple-touch-icon" sizes="180x180" href="/static/favicon/apple-touch-icon.png"/>
<link rel="manifest" href="/static/favicon/site.webmanifest"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;1,8..60,400&family=Roboto+Mono&display=swap');
/* MEMORISE brand, sober archival greige: warm gray + parchment, muted bronze accent. */
:root[data-theme="light"]{
  --bg:#FAF8F4; --panel:#ffffff; --line:#E0D8C9; --fg:#2B2820; --mut:#7A7464;
  --primary:#6B6457; --primary-dark:#423D34; --accent:#A8895B; --accent-t:rgba(168,137,91,.13);
  --link:#8A6F3F; --code:#F2EFE9; --track:#EDE8DE; --shadow:rgba(107,100,87,.16);
  --sidebar:#2F2B24; --sidebar-fg:#E8E1D3; --sidebar-mut:#A79C88; --sidebar-line:#ffffff12;
}
:root[data-theme="dark"]{
  --bg:#1C1B18; --panel:#26241F; --line:#3A372F; --fg:#E8E4DC; --mut:#A89F8E;
  --primary:#8A8273; --primary-dark:#26241F; --accent:#CDB78C; --accent-t:rgba(205,183,140,.14);
  --link:#CDB78C; --code:#26241F; --track:#201E1A; --shadow:rgba(0,0,0,.4);
  --sidebar:#16150F; --sidebar-fg:#E8E1D3; --sidebar-mut:#8E8472; --sidebar-line:#ffffff10;
}
:root{--serif:'Source Serif 4',Georgia,serif}
:root{--c-semantic:#4F6276;--c-affinity:#5E7355;--c-tag:#A8895B;--c-recency:#7A5C6E;--c-aversion:#9C5B4F;--c-geo:#4E7E78;--maxw:1320px;--rad:12px;--side-w:248px;--side-w-min:64px}
*{box-sizing:border-box}
body{margin:0;font-family:var(--serif);font-size:14.5px;line-height:1.55;background:var(--bg);color:var(--fg);-webkit-font-smoothing:antialiased}
h1,h2,h3,.mont{font-family:Montserrat,sans-serif;font-weight:600;letter-spacing:-.015em}

/* ===== app shell ===== */
.layout{display:flex;min-height:100vh}
aside.sidebar{position:sticky;top:0;height:100vh;width:var(--side-w);flex:0 0 var(--side-w);
  background:var(--sidebar);color:var(--sidebar-fg);display:flex;flex-direction:column;
  border-right:1px solid var(--sidebar-line);transition:width .18s ease;z-index:30}
body.nav-min aside.sidebar{width:var(--side-w-min);flex-basis:var(--side-w-min)}
.side-brand{display:flex;align-items:center;gap:10px;height:58px;padding:0 16px;flex:0 0 auto;
  border-bottom:1px solid var(--sidebar-line);white-space:nowrap;overflow:hidden}
.ring{width:24px;height:24px;flex:0 0 auto}
.ring .r{fill:none;stroke:var(--accent);stroke-width:2;transform-origin:center;animation:spin 9s linear infinite}
.ring .c{fill:var(--accent);transform-origin:center;animation:pulse 1.9s ease-in-out infinite}
@keyframes spin{to{transform:rotate(360deg)}}@keyframes pulse{0%,100%{opacity:.45}50%{opacity:1}}
.side-brand .name{font-family:Montserrat,sans-serif;font-weight:700;font-size:14.5px}
.side-brand .name span{color:var(--accent)}
.side-brand .brand-logo{width:27px;height:27px;object-fit:contain;flex:0 0 auto}
.side-brand .brand-dark{display:none}
[data-theme="dark"] .side-brand .brand-light{display:none}
[data-theme="dark"] .side-brand .brand-dark{display:inline-block}
body.nav-min .side-brand .name{display:none}
.side-toggle{margin-left:auto;background:transparent;border:0;color:var(--sidebar-mut);cursor:pointer;padding:5px;border-radius:7px;line-height:0}
.side-toggle:hover{background:#ffffff12;color:var(--sidebar-fg)}
.side-toggle svg{transition:transform .18s ease}
body.nav-min .side-brand{justify-content:center;padding:0 6px;gap:2px}
body.nav-min .side-toggle{margin:0}
body.nav-min .side-toggle svg{transform:rotate(180deg)}

nav.side-nav{flex:1 1 auto;overflow-y:auto;padding:10px 10px 14px}
nav.side-nav::-webkit-scrollbar{width:7px}nav.side-nav::-webkit-scrollbar-thumb{background:#ffffff18;border-radius:9px}
.navgroup{margin-bottom:12px}
.grouplbl{font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:var(--sidebar-mut);font-weight:700;padding:6px 10px 4px}
body.nav-min .grouplbl{text-align:center;font-size:8px;padding:6px 0 4px;letter-spacing:.04em}
.navitem{display:flex;align-items:center;gap:11px;width:100%;border:0;background:transparent;color:var(--sidebar-fg);
  padding:9px 11px;border-radius:9px;font-family:inherit;font-weight:600;font-size:13.5px;cursor:pointer;text-align:left;
  margin:1px 0;transition:.13s;white-space:nowrap;position:relative}
.navitem svg{flex:0 0 18px;width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.8;opacity:.82}
.navitem:hover{background:#ffffff10}
.navitem.on{background:var(--accent);color:#221a0c}
[data-theme="dark"] .navitem.on{color:#1c1b18}
.navitem.on svg{opacity:1}
body.nav-min .navitem{justify-content:center;padding:10px 0}
body.nav-min .navitem .lbl{display:none}
body.nav-min .navitem.on::after{content:"";position:absolute;right:-10px;top:8px;bottom:8px;width:3px;border-radius:3px;background:var(--accent)}

.side-foot{flex:0 0 auto;border-top:1px solid var(--sidebar-line);padding:13px 14px;display:flex;align-items:center;gap:8px}
.foot-tenant{font-family:'Roboto Mono',monospace;font-weight:400;font-size:11px;color:var(--sidebar-mut);
  letter-spacing:.01em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.side-foot .conn{margin-left:auto;flex:0 0 auto}
.conn{display:flex;align-items:center}
.conn .dot{width:9px;height:9px;border-radius:50%;background:#9C5B4F;flex:0 0 auto}
.conn.ok .dot{background:#7fae6e;box-shadow:0 0 0 3px #7fae6e30}
body.nav-min .side-foot{justify-content:center;padding:13px 0}
body.nav-min .foot-lbl,body.nav-min .foot-tenant{display:none}
body.nav-min .side-foot .conn{margin:0}

/* ===== main ===== */
main{flex:1 1 auto;min-width:0}
.page{max-width:var(--maxw);margin:0 auto;padding:26px 52px 80px}
.pagehead{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin:0 0 20px;flex-wrap:wrap}
.pagehead .eyebrow{margin:0 0 5px}
.pagehead h1{margin:0;font-size:23px;color:var(--primary-dark)}
[data-theme="dark"] .pagehead h1{color:var(--fg)}
.pagehead .sub{font-size:13px;color:var(--mut);margin-top:5px;max-width:560px}
.eyebrow{font-size:11px;letter-spacing:.11em;text-transform:uppercase;color:var(--accent);font-weight:700}
.iconbtn{background:var(--panel);border:1px solid var(--line);color:var(--fg);border-radius:8px;padding:7px 9px;cursor:pointer;line-height:1}
.iconbtn:hover{border-color:var(--accent)}

/* top bar */
.topbar{position:sticky;top:0;z-index:25;display:flex;align-items:center;gap:12px;
  padding:10px 52px;background:var(--panel);border-bottom:1px solid var(--line)}
.tb-field{display:flex;align-items:center;gap:7px}
.tb-field label{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--mut);font-weight:700}
.tb-field input{background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:6px 9px;font:inherit;font-size:13px;color:var(--fg);width:130px}
.tb-field input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-t)}
.tb-spacer{flex:1}
/* borderless key icon (Qdrant style) */
.tb-icon{background:transparent;border:0;color:var(--mut);cursor:pointer;line-height:0;padding:6px;border-radius:8px;display:flex;align-items:center}
.tb-icon:hover{color:var(--accent);background:var(--accent-t)}
.tb-icon svg{width:19px;height:19px}
/* light/dark slider — both icons present, knob slides */
.themeswitch{position:relative;width:58px;height:28px;border-radius:999px;border:1px solid var(--line);
  background:var(--bg);cursor:pointer;padding:0;display:flex;align-items:center;justify-content:space-between;flex:0 0 auto}
.themeswitch svg{width:15px;height:15px;margin:0 7px;z-index:1}
.themeswitch .ic-sun{color:#C99A4E}.themeswitch .ic-moon{color:#8C8475}
.themeswitch .knob{position:absolute;top:2px;left:2px;width:24px;height:24px;border-radius:50%;
  background:var(--panel);box-shadow:0 1px 3px var(--shadow);transition:transform .2s ease;z-index:0}
[data-theme="dark"] .themeswitch .knob{transform:translateX(30px)}

/* visitor search + drill-down */
.searchwrap{position:relative;margin-bottom:16px}
.searchicon{position:absolute;left:15px;top:50%;transform:translateY(-50%);color:var(--mut);line-height:0;pointer-events:none}
.searchicon svg{width:18px;height:18px}
.searchbar{width:100%;background:var(--panel);border:1px solid var(--line);border-radius:10px;
  padding:12px 15px 12px 44px;font:inherit;font-size:15px;color:var(--fg)}
.searchbar:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-t)}
.searchbar::placeholder{color:var(--mut)}
.urow:hover{background:var(--accent-t)}
.subtabs{display:flex;gap:4px;margin:0 0 18px;border-bottom:1px solid var(--line)}
.subtab{border:0;background:transparent;color:var(--mut);font:inherit;font-weight:600;font-size:13.5px;
  padding:9px 16px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:.13s}
.subtab:hover{color:var(--fg)}
.subtab.on{color:var(--accent);border-bottom-color:var(--accent)}
.backlink{background:transparent;border:0;color:var(--mut);font:inherit;font-size:12px;font-weight:600;
  cursor:pointer;padding:0;margin-bottom:7px;display:block}
.backlink:hover{color:var(--accent)}

/* compact eval result rows */
.evrow{display:flex;align-items:center;gap:10px;padding:7px 9px;border:1px solid var(--line);border-radius:9px;
  margin-bottom:6px;cursor:pointer;background:var(--panel);transition:border-color .12s,background .12s}
.evrow:hover{border-color:var(--accent);background:var(--accent-t)}
.evrank{font-family:'Roboto Mono',monospace;font-size:11px;color:var(--mut);flex:0 0 auto;min-width:24px}
.evthumb{width:38px;height:38px;border-radius:7px;object-fit:cover;flex:0 0 auto;background:var(--code)}
.evthumb.ph{background:var(--code);border:1px solid var(--line)}
.evtitle{flex:1;min-width:0;font-weight:600;font-size:13.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* item detail card — memorial UI styling */
.idcard{width:min(620px,100%);max-height:90vh;overflow-y:auto;background:var(--panel);border:1px solid var(--line);
  border-radius:20px;padding:22px;display:flex;flex-direction:column;gap:13px;position:relative;box-shadow:0 30px 80px var(--shadow)}
.id-close{position:absolute;top:12px;right:14px;border:0;background:transparent;color:var(--mut);font-size:19px;cursor:pointer;line-height:1;z-index:1}
.id-close:hover{color:var(--accent)}
.id-img{width:100%;max-height:320px;object-fit:cover;border-radius:14px;border:1px solid var(--line);background:var(--code)}
.id-title{margin:0;font-size:21px;color:var(--primary-dark);padding-right:26px;line-height:1.25}
[data-theme="dark"] .id-title{color:var(--fg)}
.id-meta{display:grid;grid-template-columns:max-content 1fr;gap:5px 16px;margin:0;font-size:13px}
.id-meta dt{font-weight:700;color:var(--fg)}
.id-meta dd{margin:0;color:var(--mut);font-family:'Roboto Mono',monospace;font-size:12.5px;word-break:break-word}
.id-text{margin:0;line-height:1.65;color:var(--fg);white-space:pre-wrap}
.id-tags{display:flex;flex-wrap:wrap;gap:5px}
.id-link{align-self:flex-start;border-radius:999px;padding:9px 17px;border:1px solid var(--line);color:var(--fg);
  text-decoration:none;background:var(--code);font-weight:600;font-size:13px;font-family:Montserrat,sans-serif}
.id-link:hover{border-color:var(--accent);color:var(--accent)}

/* config page */
.cfgbar{position:sticky;top:48px;z-index:15}
.cfgrow{display:grid;grid-template-columns:1fr 210px;gap:18px;align-items:center;padding:11px 0}
.cfgrow+.cfgrow{border-top:1px solid var(--line)}
.cfglabel{font-family:Montserrat,sans-serif;font-weight:600;font-size:13.5px}
.cfghelp{font-size:12.5px;color:var(--mut);margin-top:2px;line-height:1.45}
.cfgpath{font-family:'Roboto Mono',monospace;font-size:10.5px;color:var(--mut);opacity:.55;margin-top:3px}
.cfgctl{justify-self:end;width:100%;display:flex;justify-content:flex-end;align-items:center}
.cfgctl input.f,.cfgctl select.f{width:100%;max-width:200px;font-family:'Roboto Mono',monospace;font-size:13px;
  padding:8px 12px;border-radius:9px;background:var(--bg);transition:border-color .15s,box-shadow .15s,background .15s}
.cfgctl input.f[type=number],.cfgctl input.f[data-t="num"]{text-align:right}
.cfgctl input[type=number]{-moz-appearance:textfield;appearance:textfield}
.cfgctl input[type=number]::-webkit-outer-spin-button,
.cfgctl input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.cfgctl input.f:hover:not(:disabled),.cfgctl select.f:hover:not(:disabled){border-color:var(--accent)}
.cfgctl input.f:focus,.cfgctl select.f:focus{background:var(--panel);border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-t)}
.cfgctl select.f{cursor:pointer;font-family:Montserrat,sans-serif}
.cfgctl input[type=checkbox]{width:20px;height:20px;cursor:pointer;accent-color:var(--accent)}
.cfgctl input:disabled,.cfgctl select:disabled{background:var(--code);color:var(--fg);opacity:.9;cursor:default;border-color:transparent}

/* key icon rotated −45° for a hanging-key look */
.tb-icon svg,.keyglyph svg{transform:rotate(-45deg)}

.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--rad);padding:16px 18px;margin-bottom:14px;
      transition:border-color .2s,box-shadow .2s,transform .2s}
.card.lift:hover{border-color:var(--accent);box-shadow:0 6px 20px var(--shadow);transform:translateY(-2px)}
.cardhead{font-family:Montserrat,sans-serif;font-weight:600;font-size:15px;margin:0 0 13px;color:var(--primary-dark)}
[data-theme="dark"] .cardhead{color:var(--fg)}
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.mut{color:var(--mut)} .small{font-size:12px}
.num{font-variant-numeric:tabular-nums}
.tag{display:inline-block;background:var(--code);border:1px solid var(--line);border-radius:999px;padding:2px 11px;margin:2px;font-size:12px}

/* pills */
.pill{display:inline-block;border-radius:7px;padding:3px 10px;font-size:12px;font-weight:600;border:1px solid transparent;white-space:nowrap}
.pill.cold{background:#A8895B22;color:#8A6F3F;border-color:#A8895B4d}
.pill.warm{background:#5E735522;color:#4c6045;border-color:#5E73554d}
.pill.distractor{background:#9C5B4F22;color:#9C5B4F;border-color:#9C5B4F4d}
.pill.bandit{background:#4F627622;color:#42566b;border-color:#4F62764d}
.pill.neutral{background:var(--code);color:var(--mut);border-color:var(--line)}
[data-theme="dark"] .pill.cold{color:#CDB78C}[data-theme="dark"] .pill.warm{color:#9cc090}
[data-theme="dark"] .pill.bandit{color:#8fb4d8}[data-theme="dark"] .pill.distractor{color:#d89a8e}

/* tables */
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{text-align:left;padding:8px 10px;border-bottom:1px solid var(--line);vertical-align:middle}
th{color:var(--mut);font-weight:700;font-size:10px;text-transform:uppercase;letter-spacing:.06em}
tbody tr{transition:background .12s}
tbody tr:hover{background:var(--accent-t)}
td:first-child,th:first-child{padding-left:2px} td:last-child,th:last-child{padding-right:2px}

/* bars */
.barwrap{display:flex;height:16px;border-radius:8px;overflow:hidden;background:var(--track);min-width:150px}
.seg{height:100%}
.diverge{position:relative;height:16px;background:var(--track);border-radius:8px;overflow:hidden;min-width:150px}
.diverge .ctr{position:absolute;left:50%;top:0;bottom:0;width:1px;background:var(--line)}
.diverge .fill{position:absolute;top:2px;bottom:2px;border-radius:5px}
.legend{display:flex;flex-wrap:wrap;gap:4px 14px;margin-top:10px}
.legend span{font-size:11px;color:var(--mut)}
.sw{display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:5px;vertical-align:middle}

/* metric cards */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(178px,1fr));gap:12px}
.metric-card{background:var(--panel);border:1px solid var(--line);border-top:3px solid var(--accent);border-radius:var(--rad);padding:15px 16px;transition:.2s}
.metric-card:hover{box-shadow:0 6px 20px var(--shadow);transform:translateY(-2px)}
.metric{font-family:Montserrat,sans-serif;font-size:27px;font-weight:700;color:var(--primary-dark);line-height:1.1}
[data-theme="dark"] .metric{color:var(--accent)}
.metric+div{margin-top:4px}

input.f,select.f{background:var(--panel);color:var(--fg);border:1px solid var(--line);border-radius:8px;padding:6px 10px;font:inherit;font-size:13px}
input.f:focus,select.f:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-t)}
button.primary{background:var(--accent);color:#221a0c;border:1px solid transparent;border-radius:8px;padding:7px 16px;font:inherit;font-weight:600;cursor:pointer}
[data-theme="dark"] button.primary{color:#1c1b18}
button.primary:hover{filter:brightness(1.05)}
.err{color:#9C5B4F} code{background:var(--code);padding:1px 6px;border-radius:5px;font-size:12px;font-family:'Roboto Mono',monospace}
.num{font-family:'Roboto Mono',monospace}
.empty{padding:26px;text-align:center;color:var(--mut);border:1px dashed var(--line);border-radius:var(--rad)}
.userchip{background:var(--code);border:1px solid var(--line);border-radius:7px;padding:3px 9px;font-size:12px;cursor:pointer;color:var(--fg);font-family:inherit;font-variant-numeric:tabular-nums}
.userchip:hover{border-color:var(--accent);color:var(--accent)}
details.members{margin-top:11px;border-top:1px solid var(--line);padding-top:9px}
details.members summary{cursor:pointer;list-style:none;font-size:12px;color:var(--mut);font-weight:600}
details.members summary::-webkit-details-marker{display:none}
details.members summary:hover{color:var(--accent)}
details.members[open] summary{margin-bottom:8px}
pre{white-space:pre-wrap;word-break:break-word}

/* ===== API-key modal ===== */
.overlay{position:fixed;inset:0;background:rgba(28,24,18,.55);backdrop-filter:blur(3px);z-index:100;
  display:none;align-items:center;justify-content:center;padding:20px}
.overlay.show{display:flex}
.modal{width:min(440px,100%);background:var(--panel);border:1px solid var(--line);border-radius:16px;
  box-shadow:0 24px 60px var(--shadow);overflow:hidden;animation:pop .18s ease}
@keyframes pop{from{transform:translateY(8px) scale(.98);opacity:0}to{transform:none;opacity:1}}
.modal .mhead{display:flex;align-items:center;gap:11px;padding:18px 22px 6px}
.modal .mhead .ring{width:26px;height:26px}
.modal .mhead h2{margin:0;font-size:17px;color:var(--primary-dark)}
[data-theme="dark"] .modal .mhead h2{color:var(--fg)}
.modal .mbody{padding:8px 22px 4px}
.modal .mbody p{color:var(--mut);font-size:13px;margin:0 0 16px}
.field{margin-bottom:13px}
.field label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:var(--mut);font-weight:700;margin-bottom:5px}
.field input{width:100%;background:var(--bg);color:var(--fg);border:1px solid var(--line);border-radius:9px;padding:9px 11px;font:inherit;font-size:14px}
.field input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-t)}
.field .hint{font-size:11px;color:var(--mut);margin-top:4px}
.keywrap{position:relative}
.keywrap input{padding-right:40px}
.eye{position:absolute;right:6px;top:50%;transform:translateY(-50%);background:transparent;border:0;cursor:pointer;
  color:var(--mut);padding:6px;border-radius:7px;line-height:0}
.eye:hover{color:var(--accent);background:var(--accent-t)}
.eye svg{width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:1.8}
.eye.off svg .slash{display:none}
.mfoot{display:flex;align-items:center;gap:10px;padding:6px 22px 20px}
.mfoot .mstatus{font-size:12.5px;font-weight:600;margin-right:auto}
.mfoot .mstatus.ok{color:#5E7355}.mfoot .mstatus.err{color:#9C5B4F}
button.ghost{background:var(--panel);color:var(--fg);border:1px solid var(--line);border-radius:8px;padding:7px 16px;font:inherit;font-weight:600;cursor:pointer}
button.ghost:hover{border-color:var(--accent)}
.linkbtn{background:transparent;border:0;color:var(--link);font:inherit;font-size:13px;font-weight:600;cursor:pointer;text-decoration:underline;padding:0}
.keyglyph{margin-bottom:8px;color:var(--accent)}
.keyglyph svg{width:30px;height:30px}
.toast{position:fixed;right:20px;bottom:20px;z-index:120;display:flex;flex-direction:column;gap:10px;max-width:380px}
.toast .card{background:var(--panel)}
</style>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="side-brand">
      <img class="brand-logo brand-light" src="/static/favicon/ai-engine-search-black-512.png" alt="AI-Engine"/>
      <img class="brand-logo brand-dark" src="/static/favicon/ai-engine-search-white-512.png" alt=""/>
      <span class="name">AI&#8209;Engine&nbsp;<span>Dashboard</span></span>
      <button class="side-toggle" id="navtoggle" title="collapse sidebar">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M15 6l-6 6 6 6"/></svg>
      </button>
    </div>
    <nav class="side-nav" id="tabs"></nav>
    <div class="side-foot">
      <span class="foot-tenant" id="tenantname" title="active tenant">—</span>
      <span class="conn" id="conn" title="not connected"><span class="dot"></span></span>
    </div>
  </aside>

  <main>
    <header class="topbar">
      <input id="tenant" type="hidden"/>
      <input id="uid" type="hidden"/>
      <div class="tb-spacer"></div>
      <button class="tb-icon" id="openkey" title="API key / connection" aria-label="API key">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="7" cy="12" r="3.7"/><circle cx="7" cy="12" r="1" fill="currentColor" stroke="none"/><path d="M10.7 12H21M18 12v3.4M14.7 12v2.6"/></svg>
      </button>
      <button class="themeswitch" id="theme" title="toggle light / dark" aria-label="toggle theme">
        <svg class="ic-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 3v2.2M12 18.8V21M3 12h2.2M18.8 12H21M5.2 5.2l1.6 1.6M17.2 17.2l1.6 1.6M18.8 5.2l-1.6 1.6M6.8 17.2l-1.6 1.6"/></svg>
        <svg class="ic-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8Z"/></svg>
        <span class="knob"></span>
      </button>
    </header>
    <div class="page" id="view"></div>
  </main>
</div>

<div id="toast" class="toast"></div>

<!-- API-key popup -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="mhead">
      <h2>Set API Key</h2>
    </div>
    <div class="mbody">
      <p>This instance of AI&#8209;Engine might be protected by an API key. If so, enter it to continue. It is stored only in this browser.</p>
      <div class="field">
        <div class="keywrap">
          <input id="key" type="password" placeholder="API key" autocomplete="off"/>
          <button type="button" id="keytoggle" class="eye off" title="show key" aria-label="show key">
            <svg viewBox="0 0 24 24"><path d="M2 12s3.6-7 10-7 10 7 10 7-3.6 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/><line class="slash" x1="3" y1="3" x2="21" y2="21"/></svg>
          </button>
        </div>
      </div>
    </div>
    <div class="mfoot">
      <span class="mstatus" id="mstatus"></span>
      <button class="ghost" id="cancelkey">Cancel</button>
      <button class="primary" id="connect">Connect</button>
    </div>
  </div>
</div>

<script>
const FEAT=["semantic","affinity","tag","recency","aversion","geo"];
const COLORS={semantic:"var(--c-semantic)",affinity:"var(--c-affinity)",tag:"var(--c-tag)",recency:"var(--c-recency)",aversion:"var(--c-aversion)",geo:"var(--c-geo)",popularity:"#999"};
const $=(s,el=document)=>el.querySelector(s);
const el=(t,a={},...kids)=>{const e=document.createElement(t);for(const k in a){if(k==="class")e.className=a[k];else if(k==="html")e.innerHTML=a[k];else if(k.startsWith("on"))e[k]=a[k];else e.setAttribute(k,a[k]);}for(const k of kids.flat())e.append(k&&k.nodeType?k:document.createTextNode(k??""));return e;};
const base=()=>window.location.origin;   // dashboard is served by the API itself, so same-origin
const headers=()=>{const h={};const k=$("#key").value.trim();if(k)h["X-API-Key"]=k;const t=$("#tenant").value.trim();if(t)h["X-Tenant-Id"]=t;return h;};
async function api(path){const r=await fetch(base()+path,{headers:headers()});if(!r.ok)throw new Error(r.status+" "+r.statusText+", "+path);return (await r.json()).result;}
const fmt=x=>(typeof x==="number")?(Math.round(x*1000)/1000):x;
const mdInline=t=>String(t??"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\*\*(.+?)\*\*/g,"<strong>$1</strong>");
// one fixed colour per Falk persona, used everywhere the persona appears
const PERSONA_COLORS={Explorer:"#4F6276",Hobbyist:"#5E7355","Experience-Seeker":"#A8895B",Recharger:"#7A5C6E",Facilitator:"#4E7E78"};
function personaPill(label,type,extra=""){const c=PERSONA_COLORS[type];
  if(!c)return el("span",{class:"pill neutral",style:extra},label);
  return el("span",{class:"pill",style:`background:${c}22;color:${c};border-color:${c}66;${extra}`},label);}
const cardhead=t=>el("h3",{class:"cardhead"},t);
// No key (or 401/403) -> show a quiet blank prompt, never a red "unauthorized".
const isAuth=e=>/\b(401|403)\b/.test(String(e));
function failCard(v,e){
  if(isAuth(e)||!$("#key").value.trim()){
    v.append(el("div",{class:"empty"},
      el("div",{class:"keyglyph",html:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="7" cy="12" r="3.7"/><circle cx="7" cy="12" r="1" fill="currentColor" stroke="none"/><path d="M10.7 12H21M18 12v3.4M14.7 12v2.6"/></svg>'}),"Add an API key to view this.",
      el("div",{style:"margin-top:10px"},el("button",{class:"userchip",onclick:openModal},"Enter API key"))));
    return;
  }
  v.append(el("div",{class:"card err"},String(e)));
}
// Discover known visitor ids (cluster members + recently served) so within-user
// pages let you PICK a user from the section instead of typing one blindly.
async function discoverUsers(){
  const set=new Set();
  try{const cl=await api("/api/clusters");(cl&&cl.profiles||[]).forEach(p=>(p.members||[]).forEach(u=>set.add(u)));}catch(e){}
  try{const sv=await api("/api/served/recent?n=200");(sv||[]).forEach(r=>r.user_id&&set.add(r.user_id));}catch(e){}
  return [...set].sort((a,b)=>String(a).localeCompare(String(b),undefined,{numeric:true}));
}

function breakdownBar(bd){
  const wrap=el("div",{class:"barwrap"});
  const pos=FEAT.filter(f=>f!=="aversion").map(f=>[f,Math.max(0,bd[f]||0)]);
  const tot=pos.reduce((s,[,v])=>s+v,0)+Math.abs(bd.aversion||0)||1;
  for(const [f,v] of pos){if(v>0)wrap.append(el("div",{class:"seg",style:`width:${100*v/tot}%;background:${COLORS[f]}`,title:`${f}: ${fmt(v)}`}));}
  if(bd.aversion)wrap.append(el("div",{class:"seg",style:`width:${100*Math.abs(bd.aversion)/tot}%;background:${COLORS.aversion}`,title:`aversion: ${fmt(bd.aversion)}`}));
  return wrap;
}
function legend(){const d=el("div",{class:"legend"});for(const f of FEAT)d.append(el("span",{},el("span",{class:"sw",style:`background:${COLORS[f]}`}),f));return d;}
function diverge(v,mx,color){
  const pct=50*Math.min(Math.abs(v)/(mx||1),1);
  const fill=v>=0?`left:50%;width:${pct}%;background:${color}`:`left:${50-pct}%;width:${pct}%;background:var(--c-aversion)`;
  return el("div",{class:"diverge"},el("div",{class:"ctr"}),el("div",{class:"fill",style:fill}));
}
function valueBars(pairs,{signed=false,max=null}={}){
  const m=max??Math.max(0.0001,...pairs.map(([,v])=>Math.abs(v)));
  const box=el("div");
  for(const [label,v] of pairs)box.append(el("div",{class:"row",style:"margin:5px 0"},
    el("div",{class:"small",style:"width:215px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"},label),
    el("div",{class:"barwrap",style:"flex:1;max-width:360px"},el("div",{class:"seg",style:`width:${100*Math.abs(v)/m}%;background:${signed&&v<0?'var(--c-aversion)':'var(--accent)'}`})),
    el("div",{class:"small num mut",style:"width:52px;text-align:right"},fmt(v))));
  return box;
}

/* ===== icons (sidebar) ===== */
const ICONS={
  cohort:'<circle cx="9" cy="8" r="3"/><circle cx="17" cy="10" r="2.4"/><path d="M3 19c0-3 3-5 6-5s6 2 6 5M15 18c.4-2 2-3 4-3s3 .7 3.5 2"/>',
  content:'<rect x="4" y="3" width="16" height="18" rx="2"/><path d="M8 8h8M8 12h8M8 16h5"/>',
  policy:'<path d="M4 19V5M4 19h16M8 16V9M12 16V6M16 16v-4"/>',
  traffic:'<path d="M4 12h4l2 5 4-12 2 7h4"/>',
  request:'<circle cx="11" cy="11" r="6"/><path d="M20 20l-4.5-4.5"/>',
  user:'<circle cx="12" cy="8" r="3.4"/><path d="M5 20c0-3.5 3-6 7-6s7 2.5 7 6"/>',
  history:'<circle cx="12" cy="12" r="8"/><path d="M12 7v5l3 2"/>',
  tenants:'<rect x="4" y="9" width="7" height="11" rx="1"/><rect x="13" y="4" width="7" height="16" rx="1"/><path d="M16 8h1M16 11h1M16 14h1"/>',
  config:'<circle cx="12" cy="12" r="3"/><path d="M12 3v3M12 18v3M3 12h3M18 12h3M5.6 5.6l2.1 2.1M16.3 16.3l2.1 2.1M18.4 5.6l-2.1 2.1M7.7 16.3l-2.1 2.1"/>',
  personas:'<path d="M4 14c0 3 3 5 5 5 1.5 0 2-1 3-1s1.5 1 3 1c2 0 5-2 5-5 0-4-3-9-5-9-1.5 0-2 1-3 1s-1.5-1-3-1c-2 0-5 5-5 9Z"/>',
  evaluate:'<path d="M9 3h6M10 3v6l-4.5 8a2 2 0 0 0 1.8 3h9.4a2 2 0 0 0 1.8-3L14 9V3M7.5 15h9"/>',
};
const slug=n=>n.toLowerCase().replace(/\s+/g,"-");

const GROUPS=[
  {label:"Overview",   tabs:{Cohort:renderCohort,Content:renderContent,Traffic:renderTraffic}},
  {label:"Evaluation", tabs:{"Synthetic users":renderEval}},
  {label:"Admin",      tabs:{Policy:renderPolicy,Tenants:renderTenants,Config:renderConfig}},
  {label:"Reference",  tabs:{Personas:renderPersonas}},
];
const ICON_OF={Cohort:"cohort",Content:"content",Policy:"policy",Traffic:"traffic","Synthetic users":"evaluate",Tenants:"tenants",Config:"config",Personas:"personas"};
const SUBTITLE={
  Cohort:"Search any visitor, or browse the learned segments. Open a visitor for their model, history and live recommendations.",
  Content:"Which items get seen, liked and abandoned across all visitors.",
  Policy:"The ranking policy: fusion weights, bandit theta and training health.",
  Traffic:"Serving counters and the tail of the served-impression log.",
  "Synthetic users":"Probe recommender behaviour with built-in or prompt-built personas — across scenarios, with metrics.",
  Tenants:"Create, inspect and delete tenant slices at runtime (no redeploy).",
  Config:"Live RecConfig: edit, apply and persist runtime overrides.",
  Personas:"How the engine reads a visitor — the research behind the labels.",
};
const ALL=Object.assign({},...GROUPS.map(g=>g.tabs));
const SCOPE={};GROUPS.forEach(g=>Object.keys(g.tabs).forEach(t=>SCOPE[t]=g.label));
const BY_SLUG={};Object.keys(ALL).forEach(n=>BY_SLUG[slug(n)]=n);
let current="Cohort";
let userCtx=null;            // {id, sub} when drilled into a single visitor (from the Cohort table)
let cfgTab=null;             // active Config category subtab
let cfgEdit=false;           // Config is read-only until Edit is clicked
const USER_SUBS=[["profile","Profile",renderUser],["history","History",renderHistory],["recommend","Recommend",renderRequest]];

function setTab(n){if(!ALL[n])return;userCtx=null;cfgEdit=false;current=n;const s=slug(n);if(location.hash!=="#/"+s)location.hash="#/"+s;else paint();}
function openUser(id,sub){id=String(id).trim();if(!id)return;sub=sub||"profile";cfgEdit=false;
  $("#uid").value=id;localStorage.setItem("ins_uid",id);
  const h=`#/user/${encodeURIComponent(id)}/${sub}`;if(location.hash!==h)location.hash=h;else paint();}
function paint(){
  const navActive=userCtx?"Cohort":current;
  for(const b of document.querySelectorAll(".navitem"))b.classList.toggle("on",b.dataset.t===navActive);
  const v=$("#view");v.innerHTML="";
  if(userCtx){renderUserDetail(v);return;}
  v.append(el("div",{class:"pagehead"},
    el("div",{},el("div",{class:"eyebrow"},SCOPE[current]),el("h1",{},current)),
    el("button",{class:"iconbtn",title:"refresh",onclick:paint},"↻")));
  const host=el("div");v.append(host);
  ALL[current](host).catch(e=>failCard(host,e));
}
function renderUserDetail(v){
  const {id,sub}=userCtx;const fn=(USER_SUBS.find(s=>s[0]===sub)||USER_SUBS[0])[2];
  v.append(el("div",{class:"pagehead"},
    el("div",{},
      el("button",{class:"backlink",onclick:()=>setTab("Cohort")},"← Cohort"),
      el("h1",{},"Visitor ",el("span",{style:"color:var(--accent)"},id))),
    el("button",{class:"iconbtn",title:"refresh",onclick:paint},"↻")));
  const bar=el("div",{class:"subtabs"});
  USER_SUBS.forEach(([key,label])=>bar.append(el("button",{class:"subtab"+(key===sub?" on":""),onclick:()=>openUser(id,key)},label)));
  v.append(bar);
  const host=el("div");v.append(host);
  fn(host).catch(e=>failCard(host,e));
}

/* ===== COHORT: visitor search + table, segments below ===== */
async function renderCohort(v){
  const r=await api("/api/clusters").catch(()=>null);
  const users=await discoverUsers();
  const u2c={};                                  // visitor id -> its cluster profile
  if(r&&r.profiles)r.profiles.forEach(p=>(p.members||[]).forEach(u=>u2c[u]=p));
  // per-visitor activity (interactions / last seen / liked) for the table
  const stats=await api("/api/users").catch(()=>[]);
  const ustat={}; (stats||[]).forEach(s=>ustat[s.user_id]=s);
  const rowIds=(stats&&stats.length)?stats.map(s=>s.user_id):users;   // /api/users is sorted by last seen
  const tsShort=t=>t?String(t).replace("T"," ").slice(0,16):"—";

  // search (wide, full-width, magnifier icon; Enter or row-click opens)
  const search=el("input",{class:"searchbar",id:"usearch",placeholder:"Search visitor id…",
    oninput:filterUsers,onkeydown:e=>{if(e.key==="Enter"){const q=search.value.trim();if(q)openUser(q,"profile");}}});
  const icon=el("span",{class:"searchicon",html:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M20.5 20.5l-4.2-4.2"/></svg>'});
  v.append(el("div",{class:"searchwrap"},icon,search));

  // visitors table
  if(rowIds.length){
    const tbl=el("table",{id:"utbl"});
    tbl.append(el("tr",{},el("th",{},"visitor"),el("th",{},"segment"),
      el("th",{class:"num"},"views"),el("th",{class:"num"},"liked"),el("th",{},"last seen"),el("th",{style:"width:80px"},"")));
    for(const u of rowIds){const p=u2c[u], s=ustat[u]||{};
      tbl.append(el("tr",{class:"urow","data-id":String(u).toLowerCase(),style:"cursor:pointer",onclick:()=>openUser(u,"profile")},
        el("td",{},el("b",{},u)),
        el("td",{},p?personaPill("Cluster "+p.cluster+(p.falk_hint?" · "+p.falk_hint:""),Object.keys(PERSONA_COLORS).find(k=>(p.falk_hint||"").startsWith(k))):el("span",{class:"mut small"},"—")),
        el("td",{class:"num"},s.n_interactions!=null?s.n_interactions:"—"),
        el("td",{class:"num",style:s.n_liked?"color:var(--c-affinity);font-weight:600":""},s.n_liked||"—"),
        el("td",{class:"small mut num"},tsShort(s.last_interaction)),
        el("td",{},el("button",{class:"userchip",onclick:e=>{e.stopPropagation();openUser(u,"profile");}},"open"))));
    }
    v.append(el("div",{class:"card"},cardhead(`Visitors (${rowIds.length})`),tbl,
      el("div",{id:"unone",class:"small mut",style:"margin-top:8px;display:none"},"no visitor matches the search."),
      el("div",{class:"small mut",style:"margin-top:8px"},"views = interactions in the event buffer · liked = positive signals · last seen = latest interaction or served impression.")));
  }else{
    v.append(el("div",{class:"empty"},"No known visitors yet — ingest events, or type an id above and Open."));
  }

  // learned segments
  if(r&&r.profiles&&r.profiles.length){
    const total=r.profiles.reduce((s,p)=>s+p.size,0)||1;
    v.append(el("div",{class:"eyebrow",style:"margin-top:14px;display:block"},`Segments · method ${r.method||"kmeans"}`));
    const g=el("div",{class:"grid",style:"grid-template-columns:repeat(auto-fill,minmax(260px,1fr))"});
    for(const p of r.profiles){
      const card=el("div",{class:"card lift",style:"margin:0"},
        el("div",{class:"row",style:"justify-content:space-between"},el("h3",{class:"mont",style:"margin:0;font-size:15px"},"Cluster "+p.cluster),personaPill(p.falk_hint,Object.keys(PERSONA_COLORS).find(k=>(p.falk_hint||"").startsWith(k)))),
        el("div",{class:"barwrap",style:"margin:11px 0 7px"},el("div",{class:"seg",style:`width:${100*p.size/total}%;background:var(--accent)`})),
        el("div",{class:"small mut",style:"margin-bottom:8px"},`${p.size} visitors / breadth ${fmt(p.breadth)}`),
        el("div",{},(p.top_tags||[]).map(t=>el("span",{class:"tag"},t.label))));
      const mems=p.members||[];
      if(mems.length){
        const det=el("details",{class:"members"});
        det.append(el("summary",{},`view ${mems.length} user${mems.length>1?"s":""}`));
        const box=el("div",{class:"row",style:"gap:5px"});
        for(const u of mems)box.append(el("button",{class:"userchip",title:"open this visitor",onclick:()=>openUser(u,"profile")},u));
        det.append(box);card.append(det);
      }
      g.append(card);
    }
    v.append(g);
  }else{
    v.append(el("div",{class:"small mut",style:"margin-top:12px"},"No cluster model yet — train one (",el("code",{},"python explain/cluster_train.py --method fcm"),") and set ",el("code",{},"CLUSTER_MODEL_PATH")," to see segments."));
  }
}
function filterUsers(){const q=($("#usearch").value||"").toLowerCase();let shown=0;
  for(const tr of document.querySelectorAll("#utbl .urow")){const hit=tr.getAttribute("data-id").includes(q);tr.style.display=hit?"":"none";if(hit)shown++;}
  const none=$("#unone");if(none)none.style.display=shown?"none":"";}
async function renderPolicy(v){
  const p=await api("/api/policy");
  const h=p.health;
  v.append(el("div",{class:"card"},el("div",{class:"row"},
    el("span",{class:"pill "+(p.mode==="bandit"?"bandit":"neutral")},"mode: "+p.mode),
    el("span",{class:"pill "+(p.trained?"warm":"cold")},p.trained?"trained weights":"prior only"),
    el("span",{class:"mut small"},`alpha ${p.alpha} / ridge ${p.ridge} / explore ${p.explore}`))));
  // training health banner
  if(h){
    const vc={cold:"cold",learning:"bandit",converged:"warm"}[h.verdict]||"neutral";
    const msg=h.verdict==="cold"?"needs more data":h.verdict==="learning"?"learning, keep collecting":"weights have stabilised";
    v.append(el("div",{class:"card"},el("div",{class:"row"},
      el("span",{class:"pill "+vc},"training: "+h.verdict),
      el("span",{class:"mut small"},`${h.n_updates} rewarded updates / mean confidence ${(h.mean_confidence*100).toFixed(0)}% / ${msg}`)),
      h.no_data&&h.no_data.length?el("div",{class:"small mut",style:"margin-top:7px"},"no data yet (still at prior): ",...h.no_data.map(f=>el("span",{class:"tag"},f))):""));
  }
  const mx=Math.max(0.0001,...p.theta.map(Math.abs),...p.prior.map(Math.abs));
  const tbl=el("table");
  tbl.append(el("tr",{},el("th",{},"feature"),el("th",{},"prior"),el("th",{},"learned"),el("th",{},"shift"),el("th",{style:"width:210px"},"weight (signed)"),el("th",{style:"width:130px"},"confidence")));
  p.feature_order.forEach((f,i)=>{const a=p.prior[i],b=p.theta[i],dl=b-a;const cf=h?h.confidence[i]:null;
    tbl.append(el("tr",{},
      el("td",{},el("span",{class:"sw",style:`background:${COLORS[f]||'#999'}`}),f),
      el("td",{class:"num mut"},fmt(a)),el("td",{class:"num"},fmt(b)),
      el("td",{class:"num small",style:`color:${Math.abs(dl)<1e-6?'var(--mut)':(dl>0?'var(--c-affinity)':'var(--c-aversion)')}`},(dl>=0?"+":"")+fmt(dl)),
      el("td",{},diverge(b,mx,COLORS[f])),
      el("td",{},cf==null?el("span",{class:"mut small"},"-"):el("div",{class:"barwrap",style:"max-width:120px"},el("div",{class:"seg",style:`width:${100*cf}%;background:${cf<0.34?'var(--c-aversion)':cf<0.67?'var(--c-tag)':'var(--c-affinity)'}`})))));});
  v.append(el("div",{class:"card"},cardhead("Ranking weights: prior vs learned"),tbl,
    el("div",{class:"small mut",style:"margin-top:8px"},"Weight bars are zero-centered (right = positive, left = penalty). Confidence rises as a weight sees more data; a flat/empty bar means that signal has not fired yet, so its weight is still the prior.")));
}
async function renderTraffic(v){

// recursively pull a {lat,lon} out of a payload's location-ish fields (memorial-UI parity)
function _latlon(p){
  const find=o=>{
    if(!o||typeof o!=="object")return null;
    if(Array.isArray(o)){for(const x of o){const r=find(x);if(r)return r;}return null;}
    const lat=o.lat??o.latitude, lon=o.lon??o.lng??o.longitude;
    if(typeof lat==="number"&&typeof lon==="number")return{lat,lon};
    for(const k in o){const r=find(o[k]);if(r)return r;}
    return null;
  };
  return find(p.locations)||find(p.geo_metadata)||find(p.location)||find({lat:p.lat,lon:p.lon});
}

function _collectConfig(){
  const patch={};
  for(const e of document.querySelectorAll("#cfgform [data-path]")){
    const parts=e.dataset.path.split("."); let val;
    if(e.dataset.t==="bool")val=e.checked;
    else if(e.dataset.t==="num")val=Number(e.value);
    else if(e.dataset.t==="json"){try{val=JSON.parse(e.value);}catch(x){throw new Error("bad JSON in "+e.dataset.path);}}
    else val=e.value;
    if(parts.length===1)patch[parts[0]]=val; else (patch[parts[0]]=patch[parts[0]]||{})[parts[1]]=val;
  }
  return patch;
}

  cfgEdit=false;                              // leaving (or re-entering) any view auto-cancels Config edits
  const um=h.match(/^#\/user\/([^/]+)(?:\/([^/]+))?/);
  if(um){userCtx={id:decodeURIComponent(um[1]),sub:um[2]||"profile"};$("#uid").value=userCtx.id;paint();return;}
  userCtx=null;const s=h.replace(/^#\/?/,"");const n=BY_SLUG[s];
  if(n){current=n;paint();}else{setTab(current);}
}

$("#uid").value=localStorage.getItem("ins_uid")||"u1";
$("#tenant").value=localStorage.getItem("ins_tenant")||"";
$("#key").value=localStorage.getItem("ins_key")||"";
document.documentElement.dataset.theme=localStorage.getItem("ins_theme")||"light";
if(localStorage.getItem("ins_navmin")==="1")document.body.classList.add("nav-min");

for(const b of ["uid","tenant"])$("#"+b).addEventListener("change",()=>{localStorage.setItem("ins_"+b,$("#"+b).value);if(b==="tenant")paint();});
$("#theme").onclick=()=>{const t=document.documentElement.dataset.theme==="dark"?"light":"dark";document.documentElement.dataset.theme=t;localStorage.setItem("ins_theme",t);};
$("#navtoggle").onclick=()=>{document.body.classList.toggle("nav-min");localStorage.setItem("ins_navmin",document.body.classList.contains("nav-min")?"1":"0");};
$("#openkey").onclick=openModal;
$("#connect").onclick=connect;
$("#cancelkey").onclick=closeModal;
$("#keytoggle").onclick=()=>{const i=$("#key"),b=$("#keytoggle");const show=i.type==="password";
  i.type=show?"text":"password";b.classList.toggle("off",!show);b.title=show?"hide key":"show key";i.focus();};
$("#key").addEventListener("keydown",e=>{if(e.key==="Enter")connect();});
overlay.addEventListener("click",e=>{if(e.target===overlay)closeModal();});
window.addEventListener("hashchange",applyHash);

buildNav();ping();
// land on the requested page (deep-link) or default; show the key dialog first run.
const startSlug=(location.hash||"").replace(/^#\/?/,"");
if(BY_SLUG[startSlug])current=BY_SLUG[startSlug];
if(!location.hash)location.hash="#/"+slug(current);else applyHash();
if(!localStorage.getItem("ins_key")&&!localStorage.getItem("ins_seen")){localStorage.setItem("ins_seen","1");openModal();}
</script>
</body>
</html>
