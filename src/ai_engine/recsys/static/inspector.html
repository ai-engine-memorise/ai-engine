<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>AI-Engine Inspector</title>
<style>
  :root{--bg:#0f1115;--panel:#171a21;--line:#262b36;--fg:#d7dce5;--mut:#8a93a6;--acc:#5b9dff;}
  *{box-sizing:border-box}
  body{margin:0;font:14px/1.5 system-ui,Segoe UI,Roboto,sans-serif;background:var(--bg);color:var(--fg)}
  header{padding:10px 16px;border-bottom:1px solid var(--line);display:flex;gap:8px;align-items:center;flex-wrap:wrap;background:var(--panel)}
  header h1{font-size:15px;margin:0 12px 0 0;font-weight:600}
  input,button,select{background:#0c0e12;color:var(--fg);border:1px solid var(--line);border-radius:6px;padding:6px 9px;font:inherit}
  button{cursor:pointer;background:#1d2230}
  button:hover{border-color:var(--acc)}
  button.primary{background:var(--acc);color:#06080d;border-color:var(--acc);font-weight:600}
  nav{display:flex;gap:4px;padding:8px 16px;border-bottom:1px solid var(--line);background:var(--panel)}
  nav button{border:none;background:transparent;color:var(--mut);padding:7px 12px;border-radius:6px}
  nav button.on{background:#222838;color:var(--fg)}
  main{padding:16px;max-width:1100px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:14px;margin-bottom:12px}
  .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .mut{color:var(--mut)} .small{font-size:12px}
  .tag{display:inline-block;background:#222838;border:1px solid var(--line);border-radius:999px;padding:2px 9px;margin:2px;font-size:12px}
  .pill{display:inline-block;border-radius:6px;padding:2px 8px;font-size:12px;font-weight:600}
  .pill.cold{background:#3a2a17;color:#f0b072}.pill.warm{background:#16321f;color:#5fd08a}
  .pill.distractor{background:#3a1730;color:#f07ad0}.pill.bandit{background:#1b2b3a;color:#6fb4ff}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{text-align:left;padding:6px 8px;border-bottom:1px solid var(--line)}
  th{color:var(--mut);font-weight:600}
  .barwrap{display:flex;height:16px;border-radius:4px;overflow:hidden;background:#0c0e12;min-width:160px}
  .seg{height:100%}
  .kv{display:grid;grid-template-columns:130px 1fr;gap:4px 10px}
  .num{font-variant-numeric:tabular-nums}
  .legend span{margin-right:10px;font-size:11px}
  .sw{display:inline-block;width:10px;height:10px;border-radius:2px;margin-right:3px;vertical-align:middle}
  .err{color:#ff7a7a}
  code{background:#0c0e12;padding:1px 5px;border-radius:4px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px}
  .metric{font-size:24px;font-weight:700}
</style>
</head>
<body>
<header>
  <h1>AI-Engine Inspector</h1>
  <input id="base" size="26" placeholder="http://localhost:8010"/>
  <input id="key" size="16" placeholder="X-API-Key (if set)"/>
  <input id="uid" size="12" placeholder="user_id" value="u1"/>
  <span id="conn" class="small mut">not connected</span>
</header>
<nav id="tabs"></nav>
<main id="view"></main>

<script>
const FEAT = ["semantic","affinity","tag","recency","aversion","geo"];
const COLORS = {semantic:"#5b9dff",affinity:"#5fd08a",tag:"#f0b072",recency:"#b48cff",aversion:"#ff6b6b",geo:"#43c9c2",popularity:"#888"};
const $ = (s,el=document)=>el.querySelector(s);
const el = (t,a={},...kids)=>{const e=document.createElement(t);for(const k in a){if(k==="class")e.className=a[k];else if(k==="html")e.innerHTML=a[k];else e.setAttribute(k,a[k]);}for(const k of kids.flat())e.append(k?.nodeType?k:document.createTextNode(k??""));return e;};
const base = ()=> ($("#base").value||"http://localhost:8010").replace(/\/$/,"");
const headers = ()=> { const h={}; const k=$("#key").value.trim(); if(k)h["X-API-Key"]=k; return h; };

async function api(path){
  const r = await fetch(base()+path,{headers:headers()});
  if(!r.ok) throw new Error(r.status+" "+r.statusText+" — "+path);
  return (await r.json()).result;
}
function fmt(x){return (typeof x==="number")?(Math.round(x*1000)/1000):x;}

// stacked bar for a score breakdown (positive segs left, aversion shown red on the right)
function breakdownBar(bd){
  const wrap = el("div",{class:"barwrap"});
  const pos = FEAT.filter(f=>f!=="aversion").map(f=>[f, Math.max(0,bd[f]||0)]);
  const tot = pos.reduce((s,[,v])=>s+v,0) + Math.abs(bd.aversion||0) || 1;
  for(const [f,v] of pos){ if(v>0) wrap.append(el("div",{class:"seg",style:`width:${100*v/tot}%;background:${COLORS[f]}`,title:`${f}: ${fmt(v)}`})); }
  if(bd.aversion) wrap.append(el("div",{class:"seg",style:`width:${100*Math.abs(bd.aversion)/tot}%;background:${COLORS.aversion}`,title:`aversion: ${fmt(bd.aversion)}`}));
  return wrap;
}
function legend(){ const d=el("div",{class:"legend small mut"}); for(const f of FEAT) d.append(el("span",{},el("span",{class:"sw",style:`background:${COLORS[f]}`}),f)); return d; }

// horizontal labelled value bars (affinity / theta etc.)
function valueBars(pairs,{signed=false,max=null}={}){
  const m = max ?? Math.max(0.0001,...pairs.map(([,v])=>Math.abs(v)));
  const box = el("div");
  for(const [label,v] of pairs){
    const w = 100*Math.abs(v)/m;
    box.append(el("div",{class:"row",style:"margin:3px 0"},
      el("div",{class:"small",style:"width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"},label),
      el("div",{class:"barwrap",style:"flex:1"},el("div",{class:"seg",style:`width:${w}%;background:${signed&&v<0?COLORS.aversion:"#5b9dff"}`})),
      el("div",{class:"small num mut",style:"width:54px;text-align:right"},fmt(v))));
  }
  return box;
}

// ---------- tabs ----------
const TABS = {
 "Request":renderRequest, "User model":renderUser, "Segments":renderSegments, "Policy":renderPolicy, "Traffic":renderTraffic
};
let current = "Request";
function setTab(name){ current=name; for(const b of $("#tabs").children) b.classList.toggle("on",b.textContent===name); render(); }
function render(){ const v=$("#view"); v.innerHTML=""; TABS[current](v).catch(e=>v.append(el("div",{class:"card err"},String(e)))); }

async function renderRequest(v){
  v.append(el("div",{class:"card"},el("div",{class:"row"},
    "filter", el("input",{id:"f_filter",size:"18",placeholder:"tag (optional)"}),
    "near", el("input",{id:"f_lat",size:"8",placeholder:"lat"}), el("input",{id:"f_lon",size:"8",placeholder:"lon"}),
    el("button",{class:"primary",onclick:"runRecommend()"},"Recommend"))));
  v.append(el("div",{id:"recout"}));
}
window.runRecommend = async ()=>{
  const out=$("#recout"); out.innerHTML="";
  let q=`/api/recommend?user_id=${encodeURIComponent($("#uid").value)}&include_content=true`;
  const f=$("#f_filter").value.trim(); if(f)q+=`&filter=${encodeURIComponent(f)}`;
  const la=$("#f_lat").value.trim(),lo=$("#f_lon").value.trim(); if(la&&lo)q+=`&near_lat=${la}&near_lon=${lo}`;
  try{
    const r=await api(q); const d=r.diagnostics||{};
    out.append(el("div",{class:"card"},el("div",{class:"row"},
      el("span",{class:"pill "+(r.strategy||"warm")},r.strategy),
      el("span",{class:"pill "+(d.ranking==="bandit"?"bandit":"")},"ranking: "+(d.ranking||"static")),
      el("span",{class:"mut small"},`pool ${d.pool_size} · generators ${(d.generators||[]).join("+")}`),
      d.cold_start_fallback?el("span",{class:"pill cold"},"cold-fallback"):"" ), legend()));
    const tbl=el("table"); tbl.append(el("tr",{},el("th",{},"rank"),el("th",{},"id"),el("th",{},"score"),el("th",{},"breakdown"),el("th",{},"title")));
    for(const it of r.items){
      const isD=it.role==="distractor";
      tbl.append(el("tr",{},
        el("td",{},isD?el("span",{class:"pill distractor"},"distr"):String(it.rank)),
        el("td",{},it.id),
        el("td",{class:"num"},fmt(it.relevance_score)),
        el("td",{},breakdownBar(it.breakdown||{})),
        el("td",{class:"small mut"},(it.content&&it.content.title)||"")));
    }
    out.append(el("div",{class:"card"},tbl));
  }catch(e){ out.append(el("div",{class:"card err"},String(e))); }
};

async function renderUser(v){
  let exp; try{ exp=await api(`/api/usermodel/explain?user_id=${encodeURIComponent($("#uid").value)}`);}catch(e){v.append(el("div",{class:"card err"},String(e)+" (set X-API-Key if INGEST_API_KEY is on)"));return;}
  if(!exp){ v.append(el("div",{class:"card mut"},"no model for this user — ingest some events first")); return; }
  const vt=exp.visitor_type||{};
  v.append(el("div",{class:"card"},
    el("div",{class:"row"},el("span",{class:"pill bandit"},"Falk: "+(vt.type||"?")),
      el("span",{class:"pill"},"Pekarik: "+exp.experience_preference),
      el("span",{class:"pill"},"style: "+exp.engagement_style),
      exp.is_cold?el("span",{class:"pill cold"},"cold"):el("span",{class:"pill warm"},"warm")),
    el("p",{class:"mut small"},vt.rationale?("“"+vt.rationale+"” · confidence "+fmt(vt.confidence)):""),
    el("p",{},exp.summary||"")));
  if(exp.trajectory&&exp.trajectory.length) v.append(el("div",{class:"card"},el("b",{},"trajectory "),el("span",{class:"mut"},exp.trajectory.join("  →  "))));
  if(exp.interests&&exp.interests.length) v.append(el("div",{class:"card"},el("b",{},"interests"),
    valueBars(exp.interests.map(i=>[i.label+(i.evidence&&i.evidence.length?` (${i.evidence.length})`:""),i.weight]))));
  if(exp.aversions&&exp.aversions.length) v.append(el("div",{class:"card"},el("b",{},"aversions"),
    valueBars(exp.aversions.map(i=>[i.label,i.weight]),{signed:false})));
  if(exp.cluster) v.append(el("div",{class:"card"},el("b",{},"segment "),
    el("span",{},"cluster "+(exp.cluster.dominant??exp.cluster.cluster)),
    exp.cluster.membership?el("div",{class:"small mut"},Object.entries(exp.cluster.membership).map(([k,p])=>`c${k}:${fmt(p)}`).join("  ")):"",
    el("div",{class:"small mut"},"shares "+(exp.cluster.shared_tags||[]).map(t=>t.label).join(", "))));
  v.append(el("details",{class:"card"},el("summary",{class:"mut"},"raw signals"),
    el("pre",{class:"small",html:JSON.stringify(exp.demographics||{},null,1)})));
}

async function renderSegments(v){
  const r=await api("/api/clusters").catch(e=>null);
  if(!r){ v.append(el("div",{class:"card mut"},"CLUSTER_MODEL_PATH not set — run explain/cluster_train.py")); return; }
  v.append(el("div",{class:"row mut small",style:"margin-bottom:8px"},"method: ",el("code",{},r.method||"kmeans")));
  const g=el("div",{class:"grid"});
  for(const p of r.profiles){
    g.append(el("div",{class:"card"},
      el("div",{class:"row"},el("b",{},"cluster "+p.cluster),el("span",{class:"mut small"},"n="+p.size),el("span",{class:"pill"},p.falk_hint)),
      el("div",{},(p.top_tags||[]).map(t=>el("span",{class:"tag"},t.label))),
      el("div",{class:"small mut"},"breadth "+fmt(p.breadth))));
  }
  v.append(g);
}

async function renderPolicy(v){
  const p=await api("/api/policy");
  v.append(el("div",{class:"card"},el("div",{class:"row"},
    el("span",{class:"pill "+(p.mode==="bandit"?"bandit":"")},"mode: "+p.mode),
    el("span",{class:"pill "+(p.trained?"warm":"cold")},p.trained?"trained θ":"prior only"),
    el("span",{class:"mut small"},`α=${p.alpha} ridge=${p.ridge} explore=${p.explore}`))));
  const tbl=el("table"); tbl.append(el("tr",{},el("th",{},"feature"),el("th",{},"prior θ0"),el("th",{},"θ"),el("th",{},"learned shift")));
  p.feature_order.forEach((f,i)=>{
    const a=p.prior[i],b=p.theta[i],dl=b-a;
    tbl.append(el("tr",{},el("td",{},el("span",{class:"sw",style:`background:${COLORS[f]||"#888"}`}),f),
      el("td",{class:"num"},fmt(a)),el("td",{class:"num"},fmt(b)),
      el("td",{class:"num",style:`color:${Math.abs(dl)<1e-6?"var(--mut)":(dl>0?"#5fd08a":"#ff6b6b")}`},(dl>=0?"+":"")+fmt(dl))));
  });
  v.append(el("div",{class:"card"},el("b",{},"weights: prior vs learned"),tbl));
}

async function renderTraffic(v){
  const m=await api("/api/metrics");
  const g=el("div",{class:"grid"});
  const card=(label,val)=>el("div",{class:"card"},el("div",{class:"metric num"},String(val)),el("div",{class:"mut small"},label));
  g.append(card("ingested events",m.ingests),card("recommends",m.recommends),
    card("cold rate",(m.cold_rate*100).toFixed(0)+"%"),card("avg pool",m.avg_pool),
    card("distractor rate",(m.distractor_rate*100).toFixed(0)+"%"));
  v.append(g);
  try{
    const rows=await api("/api/served/recent?n=40");
    if(rows&&rows.length){
      const tbl=el("table"); tbl.append(el("tr",{},el("th",{},"ts"),el("th",{},"user"),el("th",{},"strat"),el("th",{},"rank"),el("th",{},"#items"),el("th",{},"distractor")));
      for(const r of rows) tbl.append(el("tr",{},el("td",{class:"small mut"},(r.ts||"").replace("T"," ").slice(0,19)),
        el("td",{},r.user_id),el("td",{},r.strategy||""),el("td",{class:"small"},r.ranking||""),
        el("td",{class:"num"},(r.items||[]).length),el("td",{class:"small mut"},r.distractor_id||"")));
      v.append(el("div",{class:"card"},el("b",{},"recent served impressions"),tbl));
    }
  }catch(e){ v.append(el("div",{class:"card mut small"},"served log: "+e)); }
}

// ---------- boot ----------
$("#base").value = localStorage.getItem("ins_base") || window.location.origin || "http://localhost:8010";
$("#key").value = localStorage.getItem("ins_key") || "";
for(const b of ["base","key","uid"]) $("#"+b).addEventListener("change",()=>{localStorage.setItem("ins_"+b,$("#"+b).value);});
for(const name of Object.keys(TABS)){ const b=el("button",{},name); b.onclick=()=>setTab(name); $("#tabs").append(b); }
async function ping(){ try{ await fetch(base()+"/health"); $("#conn").textContent="● connected"; $("#conn").className="small"; $("#conn").style.color="#5fd08a"; }catch(e){ $("#conn").textContent="● offline"; $("#conn").style.color="#ff6b6b"; } }
$("#base").addEventListener("change",ping);
ping(); setTab("Request");
</script>
</body>
</html>
